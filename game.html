<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Ice Gaming - Game 1</title>
    <style>
        /* ===== FULL SCREEN DARK BACKGROUND ===== */
        /* Kiosk mode: fills the entire screen with no scrollbars or margins */
        /* On the cabinet, Chrome launches with --kiosk flag for true fullscreen */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            cursor: none; /* hide cursor on cabinet touchscreen */
            user-select: none; /* prevent text selection */
            -webkit-user-select: none;
        }
        canvas {
            display: block;
            touch-action: none; /* prevent browser zoom/scroll on touch */
        }
        /* Show cursor when not in fullscreen (for desktop development) */
        body:not(:fullscreen) { cursor: default; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script src="blackice-math-engine.js"></script>
    <script>
    /* =============================================================
       BLACK ICE GAMING - GAME 1
       Visual layer — rendering, animation, input, hardware I/O.
       All game math lives in blackice-math-engine.js (BlackIceMath).
       ============================================================= */

    // ===== MATH ENGINE ALIASES =====
    // Convenience references to commonly used BlackIceMath values
    var BM = BlackIceMath;
    var NUM_REELS = BM.reels.NUM_REELS;
    var NUM_ROWS = BM.reels.NUM_ROWS();
    var STRIP_LENGTH = BM.reels.STRIP_LENGTH;
    var PAYLINES = BM.pay.LINES;

    // ===== PERFORMANCE SYSTEM =====
    // FPS counter and quality settings for smooth 60fps on target hardware.
    // Shadow blur is the biggest bottleneck on Canvas — the quality toggle
    // lets us disable it on lower-end machines while keeping the game playable.
    let perfQuality = 'high';   // 'high' = all effects, 'low' = no shadows
    let fpsFrames = 0;
    let fpsLastTime = performance.now();
    let fpsDisplay = 60;

    // Update FPS counter (called each frame)
    function updateFPS() {
        fpsFrames++;
        const now = performance.now();
        if (now - fpsLastTime >= 1000) {
            fpsDisplay = fpsFrames;
            fpsFrames = 0;
            fpsLastTime = now;
            // Auto-downgrade quality if FPS drops below 45
            if (fpsDisplay < 45 && perfQuality === 'high') {
                perfQuality = 'low';
                console.log('[PERF] Auto-switched to low quality (FPS: ' + fpsDisplay + ')');
            }
        }
    }

    // Helper: only apply shadow blur if quality is high
    function setShadow(color, blur) {
        if (perfQuality === 'high') {
            ctx.shadowColor = color;
            ctx.shadowBlur = blur;
        }
    }

    function clearShadow() {
        if (perfQuality === 'high') {
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
        }
    }

    // Draw FPS counter in top-left (only visible in non-kiosk mode)
    function drawFPS() {
        ctx.save();
        ctx.globalAlpha = 0.5;
        ctx.fillStyle = fpsDisplay >= 55 ? '#44FF44' : fpsDisplay >= 30 ? '#FFAA00' : '#FF4444';
        ctx.font = '12px monospace';
        ctx.textAlign = 'left';
        ctx.fillText(fpsDisplay + ' FPS' + (perfQuality === 'low' ? ' [LOW]' : ''), 10, 20);
        ctx.restore();
    }

    // Expose quality toggle for operator menu
    window.setPerfQuality = function(q) { perfQuality = q; };

    // ===== CANVAS SETUP =====
    // The canvas is our drawing surface - like a digital whiteboard
    // We size it to 1920x1080 to match the cabinet monitor
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 1920;
    canvas.height = 1080;

    // Scale canvas to fit the browser window while keeping proportions
    function resizeCanvas() {
        const scaleX = window.innerWidth / canvas.width;
        const scaleY = window.innerHeight / canvas.height;
        const scale = Math.min(scaleX, scaleY);
        canvas.style.width = (canvas.width * scale) + 'px';
        canvas.style.height = (canvas.height * scale) + 'px';
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // ===== BILL ACCEPTOR & TITO TICKET PRINTER =====
    // Bill acceptors (like Pyramid Apex 7000) and TITO printers
    // communicate over RS-232 serial. Since the game runs in Chrome,
    // a small Node.js bridge service runs on the cabinet PC and relays
    // serial data over WebSocket to the game.
    //
    // Bridge service runs on ws://localhost:9100 and handles:
    // - Bill acceptor: receives bill-inserted events, sends enable/disable
    // - TITO printer: sends print-ticket commands, receives print-complete
    //
    // Protocol messages (JSON over WebSocket):
    // Bill inserted:  { type: "bill", amount: 100 }  (amount in cents)
    // Print ticket:   { type: "print", credits: 500, datetime: "..." }
    // Print complete: { type: "printed", success: true }
    // Enable accept:  { type: "enable_acceptor" }
    // Disable accept: { type: "disable_acceptor" }

    let hardwareBridge = null;
    let bridgeConnected = false;

    // Connect to the hardware bridge WebSocket
    function connectHardwareBridge() {
        try {
            hardwareBridge = new WebSocket('ws://localhost:9100');

            hardwareBridge.onopen = function() {
                bridgeConnected = true;
                // Enable the bill acceptor on connection
                hardwareBridge.send(JSON.stringify({ type: 'enable_acceptor' }));
                console.log('[HARDWARE] Bridge connected');
            };

            hardwareBridge.onmessage = function(event) {
                const msg = JSON.parse(event.data);

                if (msg.type === 'bill') {
                    // Bill inserted - convert cents to credits (1 cent = 1 credit)
                    const creditsToAdd = msg.amount;
                    credits += creditsToAdd;
                    if (typeof sasRecordBillIn === 'function') sasRecordBillIn(creditsToAdd);
                    playBillInsertSound();
                    console.log('[HARDWARE] Bill accepted: +' + creditsToAdd + ' credits');
                }

                if (msg.type === 'printed') {
                    console.log('[HARDWARE] Ticket printed: ' + (msg.success ? 'OK' : 'FAILED'));
                }
            };

            hardwareBridge.onclose = function() {
                bridgeConnected = false;
                // Auto-reconnect after 3 seconds
                setTimeout(connectHardwareBridge, 3000);
            };

            hardwareBridge.onerror = function() {
                bridgeConnected = false;
            };
        } catch (e) {
            // Bridge not available - game still works with keyboard coin input
            bridgeConnected = false;
        }
    }

    // Send a TITO print command to the hardware bridge
    function printTITOTicket(creditAmount) {
        if (!bridgeConnected || !hardwareBridge) return false;
        hardwareBridge.send(JSON.stringify({
            type: 'print',
            credits: creditAmount,
            datetime: new Date().toISOString(),
            machineId: 'BLACKICE-001'
        }));
        return true;
    }

    // Disable bill acceptor during spin (standard practice)
    function disableBillAcceptor() {
        if (bridgeConnected && hardwareBridge) {
            hardwareBridge.send(JSON.stringify({ type: 'disable_acceptor' }));
        }
    }

    // Re-enable bill acceptor after spin
    function enableBillAcceptor() {
        if (bridgeConnected && hardwareBridge) {
            hardwareBridge.send(JSON.stringify({ type: 'enable_acceptor' }));
        }
    }

    // Bill insert sound - crisp "cha-ching"
    function playBillInsertSound() {
        if (!audioCtx) return;
        [523, 659, 784].forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.value = freq;
            const t = audioCtx.currentTime + i * 0.06;
            gain.gain.setValueAtTime(0.2, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
            osc.start(t);
            osc.stop(t + 0.15);
        });
    }

    // Try to connect on startup (silently fails if bridge not running)
    connectHardwareBridge();

    // ===== FULLSCREEN KIOSK MODE =====
    // On a JAMMA cabinet, Chrome runs with --kiosk --start-fullscreen flags.
    // This code handles fullscreen for development and as a fallback.
    //
    // How to launch on the cabinet (Windows 10 IoT):
    // chrome.exe --kiosk --start-fullscreen --disable-infobars
    //            --disable-session-crashed-bubble --noerrdialogs
    //            --no-first-run file:///C:/BlackIceGame1/game.html

    let isFullscreen = false;

    // Enter fullscreen mode
    function enterFullscreen() {
        const el = document.documentElement;
        if (el.requestFullscreen) el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        else if (el.msRequestFullscreen) el.msRequestFullscreen();
    }

    // Exit fullscreen mode
    function exitFullscreen() {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        else if (document.msExitFullscreen) document.msExitFullscreen();
    }

    // Toggle fullscreen on F11 or first click (for development testing)
    document.addEventListener('fullscreenchange', function() {
        isFullscreen = !!document.fullscreenElement;
        resizeCanvas();
    });

    // Auto-enter fullscreen on first user interaction (cabinet startup)
    let firstInteraction = true;
    document.addEventListener('click', function kioskInit() {
        if (firstInteraction) {
            firstInteraction = false;
            // Only auto-fullscreen if URL has ?kiosk parameter
            if (window.location.search.includes('kiosk')) {
                enterFullscreen();
            }
        }
    }, { once: false });

    // F11 toggles fullscreen for development
    document.addEventListener('keydown', function(e) {
        if (e.code === 'F11') {
            e.preventDefault();
            if (isFullscreen) exitFullscreen();
            else enterFullscreen();
        }
    });

    // ===== THEME SYSTEM =====
    // Single Day of the Dead theme with 12 symbols matching the math engine.
    // Symbol indices 0-11: WILD, LA_CATRINA, MARIACHI_S, DANCER, GUITARIST,
    // TEQUILA, MARIGOLD, CANDLES, GUITAR, SCATTER, FIREBALL, JACKPOT_SYM

    // Helper: map math engine symbol name to foreground color
    function getSymbolColor(sym) {
        var colors = {
            'WILD': '#FF00FF', 'LA_CATRINA': '#FF1493', 'MARIACHI_S': '#00BFFF',
            'DANCER': '#FFD700', 'GUITARIST': '#32CD32', 'TEQUILA': '#FF8C00',
            'MARIGOLD': '#FFA500', 'CANDLES': '#FFE4B5', 'GUITAR': '#8B4513',
            'SCATTER': '#9400D3', 'FIREBALL': '#FF4500', 'JACKPOT_SYM': '#FFD700'
        };
        return colors[sym.name] || '#FFFFFF';
    }

    // Helper: map math engine symbol name to background color
    function getSymbolBgColor(sym) {
        var bgs = {
            'WILD': '#4B0082', 'LA_CATRINA': '#8B0000', 'MARIACHI_S': '#00008B',
            'DANCER': '#4B3700', 'GUITARIST': '#006400', 'TEQUILA': '#8B4500',
            'MARIGOLD': '#8B5A00', 'CANDLES': '#4B3700', 'GUITAR': '#3E1F00',
            'SCATTER': '#2E0854', 'FIREBALL': '#8B0000', 'JACKPOT_SYM': '#8B6900'
        };
        return bgs[sym.name] || '#1a1a1a';
    }

    var THEMES = {
        dayofdead: {
            name: 'DIA DE LOS MUERTOS',
            subtitle: 'DAY OF THE DEAD',
            accentColor: '#FF6B00',   // marigold orange
            frameGlow: '#FF4400',
            frameBorder: '#CC3300',
            bgGradient: ['#1a0a2e', '#0a0a14'],
            symbols: BM.symbols.ALL.map(function(sym) {
                return { name: sym.name, label: sym.label, color: getSymbolColor(sym), bgColor: getSymbolBgColor(sym), shape: sym.name };
            })
        }
    };

    // Current active theme — single Day of the Dead theme, skip menu
    let currentTheme = 'dayofdead';
    let gameScreen = 'game'; // Skip menu, go straight to game (single theme)

    // Get the active theme object
    function getTheme() {
        return THEMES[currentTheme];
    }

    // SYMBOLS array points to the active theme's symbols (12 symbols, indices 0-11)
    let SYMBOLS = THEMES.dayofdead.symbols;

    // Switch to a new theme (kept for compatibility)
    function setTheme(themeName) {
        if (!THEMES[themeName]) return;
        currentTheme = themeName;
        SYMBOLS = THEMES[themeName].symbols;
        gameScreen = 'game';
    }

    // ===== THEME SPLASH SCREEN =====
    // Single-theme splash that auto-starts after a brief display.
    // Any button press also jumps straight to the game.

    let menuThemeIndex = 0;
    const THEME_KEYS = Object.keys(THEMES);
    let splashTimer = 0;
    const SPLASH_AUTO_START = 180; // 3 seconds at 60fps then auto-enter game

    function drawThemeMenu() {
        splashTimer++;
        const theme = THEMES.dayofdead;

        // Auto-start after splash timer expires
        if (splashTimer >= SPLASH_AUTO_START) {
            setTheme('dayofdead');
            return;
        }

        // Dark gradient background using theme bgGradient
        const bgGrad = ctx.createRadialGradient(960, 540, 100, 960, 540, 800);
        bgGrad.addColorStop(0, theme.bgGradient[0]);
        bgGrad.addColorStop(1, theme.bgGradient[1]);
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Pulsing border glow
        const pulse = Math.sin(splashTimer * 0.04) * 0.3 + 0.7;
        ctx.save();
        ctx.globalAlpha = pulse * 0.5;
        ctx.strokeStyle = theme.accentColor;
        ctx.lineWidth = 4;
        ctx.strokeRect(60, 60, 1800, 960);
        ctx.restore();

        // Company title
        ctx.save();
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 56px Arial, sans-serif';
        setShadow('#FFD700', 25);
        ctx.fillText('BLACK ICE GAMING', 960, 200);
        clearShadow();
        ctx.restore();

        // Theme name — large marigold orange
        ctx.save();
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = theme.accentColor;
        ctx.font = 'bold 80px Arial, sans-serif';
        setShadow(theme.accentColor, 30);
        ctx.fillText(theme.name, 960, 400);
        clearShadow();
        ctx.restore();

        // Subtitle
        ctx.save();
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#CCCCDD';
        ctx.font = '32px Arial, sans-serif';
        ctx.fillText(theme.subtitle, 960, 470);
        ctx.restore();

        // Feature highlights
        ctx.save();
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#AAAACC';
        ctx.font = '24px Arial, sans-serif';
        const features = ['HOLD & SPIN BONUS', 'FREE SPINS with 2x WILDS', '4-LEVEL PROGRESSIVE JACKPOT'];
        for (let i = 0; i < features.length; i++) {
            ctx.fillText(features[i], 960, 560 + i * 40);
        }
        ctx.restore();

        // Pulsing "PRESS ANY BUTTON" prompt
        ctx.save();
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const btnPulse = 0.4 + 0.6 * Math.sin(splashTimer * 0.06);
        ctx.globalAlpha = btnPulse;
        ctx.fillStyle = theme.accentColor;
        ctx.font = 'bold 28px Arial, sans-serif';
        ctx.fillText('PRESS ANY BUTTON TO PLAY', 960, 780);
        ctx.globalAlpha = 1;
        ctx.restore();

        // Loading bar showing auto-start progress
        const barW = 400;
        const barH = 8;
        const barX = 960 - barW / 2;
        const barY = 850;
        const progress = splashTimer / SPLASH_AUTO_START;
        ctx.fillStyle = '#222244';
        ctx.fillRect(barX, barY, barW, barH);
        ctx.fillStyle = theme.accentColor;
        ctx.fillRect(barX, barY, barW * progress, barH);
    }

    // Handle input on the theme splash screen — any action starts the game
    function handleThemeMenuInput(action) {
        if (action === 'SPIN' || action === 'LEFT' || action === 'RIGHT') {
            setTheme('dayofdead');
        }
    }

    // ===== REEL LAYOUT =====
    // 5 reels, 3 visible rows each — dimensions come from BlackIceMath
    // NUM_REELS and NUM_ROWS are aliased at the top of this file.

    // ===== REEL STRIPS (delegated to math engine) =====
    // All strip data, RTP switching, and strip selection now live in BlackIceMath.
    // We keep local working copies for the visual scroll animation.
    let reelStrips = [];
    let REEL_STRIP_LENGTH = STRIP_LENGTH;

    function getActiveStrips() {
        return BM.reels.getActiveStrips();
    }

    function loadReelStrips() {
        const strips = getActiveStrips();
        reelStrips = [];
        for (let r = 0; r < NUM_REELS; r++) {
            reelStrips[r] = strips[r].slice();
        }
        REEL_STRIP_LENGTH = reelStrips[0].length;
    }
    loadReelStrips(); // load the default strips on startup

    // Convenience: read/write RTP through the math engine
    function setRTP(rtp) {
        BM.reels.setRTP(rtp);
        loadReelStrips();
    }
    // currentRTP is now a getter for display purposes
    Object.defineProperty(window, 'currentRTP', {
        get: function() { return BM.reels.getRTP(); },
        set: function(v) { BM.reels.setRTP(v); loadReelStrips(); }
    });

    // ===== REEL STATE =====
    // Each reel tracks where it is on the strip and how fast it's moving
    const reels = [];
    for (let r = 0; r < NUM_REELS; r++) {
        reels[r] = {
            position: BM.rng.randomInt(REEL_STRIP_LENGTH), // current stop position on strip
            offset: 0,          // pixel offset for smooth scrolling (0 = symbol fully aligned)
            speed: 0,           // current scroll speed in pixels per frame
            spinning: false,    // is this reel currently spinning?
            stopping: false,    // is this reel slowing down to stop?
            targetPosition: 0,  // where the reel will land when it stops
            bounceBack: 0,      // for the "overshoot and bounce" effect when stopping
            bouncePhase: 0      // tracks where we are in the bounce animation
        };
    }

    // ===== SPIN CONTROL =====
    // These variables manage the overall spin sequence
    let isSpinning = false;          // true while any reel is still moving
    const SPIN_SPEED = 40;           // max speed when reels are at full spin (pixels per frame)
    const SPIN_UP_TIME = 300;        // milliseconds to reach full speed
    const STOP_DELAY_PER_REEL = 300; // milliseconds between each reel stopping (left to right)

    // Get a symbol from a reel strip at any position (wraps around)
    function getStripSymbol(reelIndex, pos) {
        const len = reelStrips[reelIndex].length;
        return reelStrips[reelIndex][((pos % len) + len) % len];
    }

    // Fill the visible grid from reel strip positions (used when reels are stopped)
    const reelGrid = [];
    function updateReelGrid() {
        for (let r = 0; r < NUM_REELS; r++) {
            reelGrid[r] = [];
            for (let row = 0; row < NUM_ROWS; row++) {
                reelGrid[r][row] = getStripSymbol(r, reels[r].position + row);
            }
        }
    }
    updateReelGrid();

    // ===== START SPIN =====
    // Called when player presses the spin button
    function startSpin() {
        // During Hold and Spin bonus: pressing spin triggers a respin instead
        if (gameMode === 'HOLD_AND_SPIN') {
            if (bonusPhase === 'ACTIVE') {
                startBonusRespin();
            }
            return; // block normal spins during bonus
        }

        if (isSpinning) return; // can't spin while already spinning

        // During free spins intro/outro, block new spins
        if (freeSpinsActive && (freeSpinsIntroTimer > 0 || freeSpinsOutroTimer > 0)) return;

        // Free spins don't cost credits; normal spins do
        if (!freeSpinsActive) {
            if (credits < totalBet) return; // not enough credits to spin
            credits -= totalBet;
        }
        isSpinning = true;
        lastWin = 0;

        // Track lifetime stats for operator dashboard
        totalSpinsPlayed++;
        if (!freeSpinsActive) totalWageredLifetime += totalBet;

        // Feed a small portion of the bet into each jackpot pool (not during free spins)
        if (!freeSpinsActive) feedJackpots();

        // Disable bill acceptor during spin (industry standard)
        disableBillAcceptor();

        // Initialize audio on first spin (browser requires user gesture)
        initAudio();
        playSpinStartSound();

        // Clear any win display and nudge state from the previous spin
        activeWins = [];
        showingWins = false;
        winDisplayIndex = -1;
        nudgeAvailable = false;
        nudgeUsed = false;
        switchAvailable = false;
        switchUsed = false;
        switchSelected = null;

        // Randomize new target positions for each reel (where it will land)
        for (let r = 0; r < NUM_REELS; r++) {
            reels[r].spinning = true;
            reels[r].stopping = false;
            reels[r].speed = 0;
            reels[r].bounceBack = 0;
            reels[r].bouncePhase = 0;
            // Pick a random landing spot using the math engine's CSPRNG
            reels[r].targetPosition = BM.rng.randomInt(REEL_STRIP_LENGTH);
        }

        // Ramp up speed over SPIN_UP_TIME, then schedule stops left to right
        const spinStartTime = performance.now();

        function rampUp() {
            const elapsed = performance.now() - spinStartTime;
            const progress = Math.min(elapsed / SPIN_UP_TIME, 1);
            // Ease-out curve for natural acceleration
            const easedProgress = 1 - Math.pow(1 - progress, 2);

            for (let r = 0; r < NUM_REELS; r++) {
                if (reels[r].spinning && !reels[r].stopping) {
                    reels[r].speed = SPIN_SPEED * easedProgress;
                }
            }

            if (progress < 1) {
                requestAnimationFrame(rampUp);
            } else {
                // Full speed reached - schedule each reel to stop one by one
                scheduleStops();
            }
        }
        requestAnimationFrame(rampUp);
    }

    // Schedule reels to stop one at a time, left to right
    function scheduleStops() {
        for (let r = 0; r < NUM_REELS; r++) {
            setTimeout(() => {
                reels[r].stopping = true;
            }, r * STOP_DELAY_PER_REEL);
        }
    }

    // ===== LAYOUT CONSTANTS =====
    // All measurements in pixels on the 1920x1080 canvas

    // Machine frame
    const MACHINE_X = 210;          // left edge of the machine body
    const MACHINE_Y = 40;           // top edge
    const MACHINE_W = 1500;         // width of the machine body
    const MACHINE_H = 1000;         // height of the machine body

    // Reel window - the area where symbols are visible
    const REEL_AREA_X = 310;        // left edge of the reel window
    const REEL_AREA_Y = 230;        // top edge of the reel window (below jackpot bar)
    const REEL_W = 220;             // width of each reel column
    const REEL_H = 480;             // total height of the reel window
    const REEL_GAP = 16;            // gap between reels
    var SYMBOL_H = 150;             // height of ONE symbol cell (recalculated on layout change)

    function recalcVisualLayout() {
        var rows = BM.reels.NUM_ROWS();
        SYMBOL_H = Math.floor(REEL_H / rows) - 4;
        NUM_ROWS = rows;
        PAYLINES = BM.pay.LINES;
    }
    recalcVisualLayout(); // initialise SYMBOL_H from the engine on startup
    const SYMBOL_PAD = 8;           // padding inside each symbol cell

    // ===== DRAWING FUNCTIONS =====

    // Draw the slot machine cabinet frame
    function drawMachineFrame() {
        // Outer cabinet body - dark metallic
        ctx.fillStyle = '#1a1a2e';
        roundRect(MACHINE_X, MACHINE_Y, MACHINE_W, MACHINE_H, 20, true);

        // Inner bevel - gives depth
        ctx.fillStyle = '#12122a';
        roundRect(MACHINE_X + 8, MACHINE_Y + 8, MACHINE_W - 16, MACHINE_H - 16, 16, true);

        // Top banner area - where the game name goes
        const bannerGrad = ctx.createLinearGradient(0, MACHINE_Y + 20, 0, MACHINE_Y + 160);
        bannerGrad.addColorStop(0, '#1a0a30');
        bannerGrad.addColorStop(0.5, '#2a1050');
        bannerGrad.addColorStop(1, '#1a0a30');
        ctx.fillStyle = bannerGrad;
        roundRect(MACHINE_X + 30, MACHINE_Y + 20, MACHINE_W - 60, 140, 12, true);

        // Game title
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 64px Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = '#FFD700';
        ctx.shadowBlur = 20;
        ctx.fillText(getTheme().name, MACHINE_X + MACHINE_W / 2, MACHINE_Y + 90);
        ctx.shadowBlur = 0;

        // Reel window border - glowing frame around the reels
        const totalReelW = (REEL_W * NUM_REELS) + (REEL_GAP * (NUM_REELS - 1));
        const borderPad = 20;
        const borderX = REEL_AREA_X - borderPad;
        const borderY = REEL_AREA_Y - borderPad;
        const borderW = totalReelW + borderPad * 2;
        const borderH = REEL_H + borderPad * 2;

        // Outer glow
        ctx.shadowColor = getTheme().frameGlow;
        ctx.shadowBlur = 30;
        ctx.strokeStyle = getTheme().frameBorder;
        ctx.lineWidth = 4;
        roundRect(borderX, borderY, borderW, borderH, 10, false, true);
        ctx.shadowBlur = 0;

        // Inner border
        ctx.strokeStyle = '#8844EE';
        ctx.lineWidth = 2;
        roundRect(borderX + 4, borderY + 4, borderW - 8, borderH - 8, 8, false, true);

        // Dark background behind reels
        ctx.fillStyle = '#050510';
        roundRect(borderX + 6, borderY + 6, borderW - 12, borderH - 12, 6, true);
    }

    // ===== THEME PARTICLE EFFECTS =====
    // Ambient marigold embers around the reel frame — Day of the Dead theme
    // Warm oranges, yellows, and purples floating upward like candle flames
    let particles = [];
    const MAX_PARTICLES = 30;

    function spawnParticle() {
        if (particles.length >= MAX_PARTICLES) return;
        const theme = currentTheme;
        const totalReelW = (REEL_W * NUM_REELS) + (REEL_GAP * (NUM_REELS - 1));
        const frameX = REEL_AREA_X - 20;
        const frameY = REEL_AREA_Y - 20;
        const frameW = totalReelW + 40;
        const frameH = REEL_H + 40;

        // Random position along the frame border
        const side = Math.random();
        let x, y;
        if (side < 0.25) { x = frameX + Math.random() * frameW; y = frameY; }
        else if (side < 0.5) { x = frameX + Math.random() * frameW; y = frameY + frameH; }
        else if (side < 0.75) { x = frameX; y = frameY + Math.random() * frameH; }
        else { x = frameX + frameW; y = frameY + Math.random() * frameH; }

        let p = { x: x, y: y, life: 1.0, speed: 0.005 + Math.random() * 0.01 };

        // Day of the Dead marigold petals — orange, yellow, warm red
        const emberColors = ['#FF6B00', '#FFD700', '#FF4500', '#FFA500', '#FF6B00'];
        p.color = emberColors[Math.floor(Math.random() * emberColors.length)];
        p.size = 2 + Math.random() * 4;
        p.vx = (Math.random() - 0.5) * 1.0;
        p.vy = -0.8 - Math.random() * 1.5;
        p.speed = 0.008 + Math.random() * 0.005;

        particles.push(p);
    }

    function updateAndDrawParticles() {
        // Spawn new particles
        if (Math.random() < 0.3) spawnParticle();

        ctx.save();
        // Use swap-and-pop removal instead of splice() for O(1) performance
        let i = 0;
        while (i < particles.length) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= p.speed;

            if (p.life <= 0) {
                // Swap with last element and pop (O(1) instead of O(n) splice)
                particles[i] = particles[particles.length - 1];
                particles.pop();
                continue; // re-check index i (now holds the swapped element)
            }

            ctx.globalAlpha = p.life * 0.6;
            ctx.fillStyle = p.color;

            // Ember-style square particles for Day of the Dead
            ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size * p.life, p.size * p.life);
            i++;
        }
        ctx.restore();
    }

    // Draw a single symbol in its cell
    function drawSymbol(symbolIndex, x, y, w, h) {
        const sym = SYMBOLS[symbolIndex];

        // Symbol background tile
        const tileGrad = ctx.createLinearGradient(x, y, x, y + h);
        tileGrad.addColorStop(0, sym.bgColor);
        tileGrad.addColorStop(0.5, lightenColor(sym.bgColor, 30));
        tileGrad.addColorStop(1, sym.bgColor);
        ctx.fillStyle = tileGrad;
        roundRect(x + SYMBOL_PAD, y + SYMBOL_PAD, w - SYMBOL_PAD * 2, h - SYMBOL_PAD * 2, 8, true);

        // Symbol border
        ctx.strokeStyle = sym.color + '66';
        ctx.lineWidth = 2;
        roundRect(x + SYMBOL_PAD, y + SYMBOL_PAD, w - SYMBOL_PAD * 2, h - SYMBOL_PAD * 2, 8, false, true);

        // Skip drawing text for BLANK symbols
        if (sym.name === 'BLANK') return;

        // Draw the symbol icon shape
        const cx = x + w / 2;
        const cy = y + h / 2 - 10;
        drawSymbolIcon(sym, cx, cy);

        // Symbol label text below the icon
        ctx.fillStyle = sym.color;
        ctx.font = 'bold 18px Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(sym.label, cx, cy + 40);
    }

    // Draw a Day of the Dead themed icon for each symbol type
    // Uses Canvas 2D primitives only — no images required
    function drawSymbolIcon(sym, cx, cy) {
        ctx.save();
        ctx.shadowColor = sym.color;
        ctx.shadowBlur = 12;

        switch (sym.shape) {
            case 'WILD':
            case 'sugar_skull':
                // Ornate sugar skull — WILD symbol
                ctx.fillStyle = sym.color;
                // Skull shape (rounded top, jaw)
                ctx.beginPath();
                ctx.arc(cx, cy - 4, 22, Math.PI, 0); // top dome
                ctx.lineTo(cx + 18, cy + 10);
                ctx.quadraticCurveTo(cx + 16, cy + 22, cx, cy + 24);
                ctx.quadraticCurveTo(cx - 16, cy + 22, cx - 18, cy + 10);
                ctx.closePath();
                ctx.fill();
                // Eye sockets — X shapes
                ctx.strokeStyle = '#1a0030';
                ctx.lineWidth = 2.5;
                // Left eye X
                ctx.beginPath();
                ctx.moveTo(cx - 12, cy - 10); ctx.lineTo(cx - 4, cy - 2);
                ctx.moveTo(cx - 4, cy - 10); ctx.lineTo(cx - 12, cy - 2);
                ctx.stroke();
                // Right eye X
                ctx.beginPath();
                ctx.moveTo(cx + 4, cy - 10); ctx.lineTo(cx + 12, cy - 2);
                ctx.moveTo(cx + 12, cy - 10); ctx.lineTo(cx + 4, cy - 2);

                // Heart nose
                ctx.fillStyle = '#FF44AA';
                ctx.beginPath();
                ctx.arc(cx - 2, cy + 6, 3, 0, Math.PI * 2);
                ctx.arc(cx + 2, cy + 6, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(cx - 5, cy + 7); ctx.lineTo(cx, cy + 12); ctx.lineTo(cx + 5, cy + 7);
                ctx.fill();
                // Flower crown on top
                ctx.fillStyle = '#FF6B00';
                for (let i = 0; i < 5; i++) {
                    const angle = Math.PI + (i * Math.PI) / 5;
                    ctx.beginPath();
                    ctx.arc(cx + Math.cos(angle) * 16, cy - 20 + Math.sin(angle) * 6, 5, 0, Math.PI * 2);
                    ctx.fill();
                }
                break;

            case 'LA_CATRINA':
            case 'catrina':
                // Elegant La Catrina — lady with large hat brim
                ctx.fillStyle = sym.color;
                // Hat brim (wide ellipse)
                ctx.beginPath();
                ctx.ellipse(cx, cy - 16, 30, 8, 0, 0, Math.PI * 2);
                ctx.fill();
                // Hat top
                ctx.fillStyle = '#DD2288';
                ctx.beginPath();
                ctx.ellipse(cx, cy - 24, 16, 12, 0, Math.PI, 0);
                ctx.fill();
                // Flower on hat
                ctx.fillStyle = '#FFAA00';
                ctx.beginPath();
                ctx.arc(cx + 14, cy - 24, 5, 0, Math.PI * 2);
                ctx.fill();
                // Face (oval)

                ctx.beginPath();
                ctx.ellipse(cx, cy + 2, 12, 14, 0, 0, Math.PI * 2);
                ctx.fill();
                // Eyes (elegant circles)

                ctx.beginPath();
                ctx.arc(cx - 5, cy - 1, 3, 0, Math.PI * 2);
                ctx.arc(cx + 5, cy - 1, 3, 0, Math.PI * 2);
                ctx.fill();
                // Smile
                ctx.strokeStyle = '#1a0030';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(cx, cy + 5, 6, 0.1 * Math.PI, 0.9 * Math.PI);
                ctx.stroke();
                // Dress/body silhouette
                ctx.fillStyle = sym.color;
                ctx.beginPath();
                ctx.moveTo(cx - 10, cy + 16);
                ctx.lineTo(cx - 18, cy + 30);
                ctx.lineTo(cx + 18, cy + 30);
                ctx.lineTo(cx + 10, cy + 16);
                ctx.closePath();
                ctx.fill();

            case 'MARIACHI_S':

                ctx.beginPath();
                ctx.ellipse(cx, cy - 22, 14, 10, 0, Math.PI, 0);

                // Gold band

                ctx.lineWidth = 2;
                ctx.beginPath();

            case 'DANCER':

                ctx.fillStyle = sym.color;

                ctx.beginPath();

                ctx.lineWidth = 3;
                ctx.beginPath();

            case 'TEQUILA':
            case 'tequila':
                // Tequila bottle shape with label

                ctx.beginPath();
                ctx.moveTo(cx - 10, cy + 26);
                ctx.lineTo(cx - 10, cy - 6);
                ctx.lineTo(cx - 6, cy - 12);
                ctx.lineTo(cx - 6, cy - 22);
                ctx.lineTo(cx + 6, cy - 22);
                ctx.lineTo(cx + 6, cy - 12);

            case 'MARIGOLD':

                // Outer petals

                    ctx.quadraticCurveTo(bx + 5, cy + 26 - bh - 4, bx, cy + 26 - bh);

                    // Inner flame

                    ctx.beginPath();
                    ctx.moveTo(bx, cy + 26 - bh - 8);
                    ctx.quadraticCurveTo(bx + 2, cy + 26 - bh - 3, bx, cy + 26 - bh - 1);
                    ctx.quadraticCurveTo(bx - 2, cy + 26 - bh - 3, bx, cy + 26 - bh - 8);

            case 'GUITAR':
            case 'guitar':

                ctx.lineWidth = 2.5;

                ctx.beginPath();
                ctx.ellipse(cx, cy + 10, 16, 18, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                ctx.beginPath();
                ctx.ellipse(cx, cy - 8, 12, 13, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                // Sound hole
                ctx.fillStyle = '#2A1A0A';
                ctx.beginPath();
                ctx.arc(cx, cy + 8, 6, 0, Math.PI * 2);
                ctx.fill();
                // Neck

                ctx.fillRect(cx - 3, cy - 30, 6, 22);
                ctx.strokeStyle = sym.color;
                ctx.strokeRect(cx - 3, cy - 30, 6, 22);
                // Headstock
                ctx.fillStyle = sym.color;
                ctx.fillRect(cx - 5, cy - 34, 10, 5);

                // Table legs

                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.arc(cx, cy + 6, 22, Math.PI, 0);

                // Offerings on table: candle + flower + photo
                // Candle

                ctx.fillRect(cx - 14, cy - 4, 4, 10);
                ctx.fillStyle = '#FFDD44';

                ctx.font = 'bold 8px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('FREE SPINS', cx, cy - 16);
                break;

            case 'FIREBALL':
            case 'flame_skull':
                // Skull with flames rising — FIREBALL symbol
                ctx.fillStyle = sym.color;
                // Flames on top
                ctx.beginPath();
                ctx.moveTo(cx - 10, cy - 8);
                ctx.quadraticCurveTo(cx - 14, cy - 28, cx - 6, cy - 20);
                ctx.quadraticCurveTo(cx - 4, cy - 30, cx, cy - 18);
                ctx.quadraticCurveTo(cx + 4, cy - 30, cx + 6, cy - 20);
                ctx.quadraticCurveTo(cx + 14, cy - 28, cx + 10, cy - 8);
                ctx.closePath();
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(cx - 6, cy - 10);
                ctx.quadraticCurveTo(cx - 4, cy - 22, cx, cy - 16);
                ctx.quadraticCurveTo(cx + 4, cy - 22, cx + 6, cy - 10);
                ctx.closePath();
                ctx.fill();
                // Skull
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.arc(cx, cy + 4, 16, Math.PI, 0);
                ctx.lineTo(cx + 12, cy + 14);
                ctx.quadraticCurveTo(cx + 10, cy + 20, cx, cy + 20);
                ctx.quadraticCurveTo(cx - 10, cy + 20, cx - 12, cy + 14);

                ctx.fill();
