                showingWins = false;
                winDisplayIndex = -1;
                lastWin = 0;

                playSwitchSwapSound();
            } else if (reel === switchSelected.reel && row === switchSelected.row) {
                // Tapped same symbol again - deselect
                switchSelected = null;
            } else {
                // Not adjacent - re-select this one instead
                switchSelected = { reel: reel, row: row };
                playSwitchSelectSound();
            }
        }
    }

    // Update the swap animation each frame
    function updateSwitch() {
        if (!switchAnimating) return;

        switchProgress += SWITCH_ANIM_SPEED;

        if (switchProgress >= 1) {
            // Animation complete - actually swap the symbols in the grid
            switchProgress = 0;
            switchAnimating = false;

            const s = switchSelected;
            const t = switchTarget;
            const temp = reelGrid[s.reel][s.row];
            reelGrid[s.reel][s.row] = reelGrid[t.reel][t.row];
            reelGrid[t.reel][t.row] = temp;

            // Re-check wins with the new arrangement
            checkWins();

            // Clean up
            switchSelected = null;
            switchTarget = null;
            switchAvailable = false;
        }
    }

    // Get visual offset for a symbol during swap animation
    function getSwitchOffset(reel, row) {
        if (!switchAnimating) return { x: 0, y: 0 };
        const eased = 1 - Math.pow(1 - switchProgress, 2);

        // Check if this symbol is one of the two being swapped
        if (switchSelected && reel === switchSelected.reel && row === switchSelected.row) {
            const dx = (switchTarget.reel - switchSelected.reel) * (REEL_W + REEL_GAP) * eased;
            const dy = (switchTarget.row - switchSelected.row) * SYMBOL_H * eased;
            return { x: dx, y: dy };
        }
        if (switchTarget && reel === switchTarget.reel && row === switchTarget.row) {
            const dx = (switchSelected.reel - switchTarget.reel) * (REEL_W + REEL_GAP) * eased;
            const dy = (switchSelected.row - switchTarget.row) * SYMBOL_H * eased;
            return { x: dx, y: dy };
        }
        return { x: 0, y: 0 };
    }

    // Draw the Symbol Switch UI - highlight selected symbol, show prompt
    function drawSwitchUI() {
        if (!switchAvailable || switchUsed || gameMode !== 'NORMAL' || isSpinning) return;

        const baseY = REEL_AREA_Y + (REEL_H - NUM_ROWS * SYMBOL_H) / 2;
        const pulse = 0.5 + 0.5 * Math.sin(performance.now() / 400);

        // If nudge arrows are still showing, don't overlap the prompt
        if (nudgeAvailable && !nudgeUsed) return;

        // Show "TAP A SYMBOL TO SWITCH" prompt
        ctx.save();
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 20px Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.globalAlpha = pulse;
        ctx.fillText('TAP TWO ADJACENT SYMBOLS TO SWAP', MACHINE_X + MACHINE_W / 2, baseY - 42);
        ctx.restore();

        // Highlight the selected symbol with a gold border
        if (switchSelected) {
            const sx = REEL_AREA_X + switchSelected.reel * (REEL_W + REEL_GAP);
            const sy = baseY + switchSelected.row * SYMBOL_H;

            ctx.save();
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 4;
            ctx.shadowColor = '#FFD700';
            ctx.shadowBlur = 15;
            roundRect(sx + SYMBOL_PAD, sy + SYMBOL_PAD,
                      REEL_W - SYMBOL_PAD * 2, SYMBOL_H - SYMBOL_PAD * 2, 8, false, true);

            // Draw small arrows showing valid adjacent positions
            ctx.fillStyle = '#FFD700';
            ctx.globalAlpha = pulse;
            const cx = sx + REEL_W / 2;
            const cy = sy + SYMBOL_H / 2;
            const arrowSize = 10;

            // Up arrow (if not top row)
            if (switchSelected.row > 0) {
                ctx.beginPath();
                ctx.moveTo(cx - arrowSize, sy + SYMBOL_PAD - 4);
                ctx.lineTo(cx, sy + SYMBOL_PAD - 14);
                ctx.lineTo(cx + arrowSize, sy + SYMBOL_PAD - 4);
                ctx.fill();
            }
            // Down arrow (if not bottom row)
            if (switchSelected.row < NUM_ROWS - 1) {
                ctx.beginPath();
                ctx.moveTo(cx - arrowSize, sy + SYMBOL_H - SYMBOL_PAD + 4);
                ctx.lineTo(cx, sy + SYMBOL_H - SYMBOL_PAD + 14);
                ctx.lineTo(cx + arrowSize, sy + SYMBOL_H - SYMBOL_PAD + 4);
                ctx.fill();
            }
            // Left arrow (if not first reel)
            if (switchSelected.reel > 0) {
                ctx.beginPath();
                ctx.moveTo(sx + SYMBOL_PAD - 4, cy - arrowSize);
                ctx.lineTo(sx + SYMBOL_PAD - 14, cy);
                ctx.lineTo(sx + SYMBOL_PAD - 4, cy + arrowSize);
                ctx.fill();
            }
            // Right arrow (if not last reel)
            if (switchSelected.reel < NUM_REELS - 1) {
                ctx.beginPath();
                ctx.moveTo(sx + REEL_W - SYMBOL_PAD + 4, cy - arrowSize);
                ctx.lineTo(sx + REEL_W - SYMBOL_PAD + 14, cy);
                ctx.lineTo(sx + REEL_W - SYMBOL_PAD + 4, cy + arrowSize);
                ctx.fill();
            }

            ctx.restore();
        }
    }

    // Select sound - soft chime
    function playSwitchSelectSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.value = 660;
        const now = audioCtx.currentTime;
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.start(now);
        osc.stop(now + 0.15);
    }

    // Swap sound - two-tone whoosh
    function playSwitchSwapSound() {
        if (!audioCtx) return;
        [440, 660].forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.value = freq;
            const t = audioCtx.currentTime + i * 0.06;
            gain.gain.setValueAtTime(0.15, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
            osc.start(t);
            osc.stop(t + 0.12);
        });
    }

    // ===== SOUND EFFECTS =====
    // Generated with Web Audio API - no audio files needed, works 100% offline
    // AudioContext is created on first user interaction (browser requirement)
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    // Play a short thud/click sound when a reel lands
    function playReelStopSound(reelIndex) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        // Lower pitch for later reels - gives a satisfying cascade feel
        osc.frequency.value = 120 - reelIndex * 8;
        osc.type = 'sine';

        // Quick punch: loud then instantly silent
        const now = audioCtx.currentTime;
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);

        osc.start(now);
        osc.stop(now + 0.1);
    }

    // Play a short spin whoosh when reels start
    function playSpinStartSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.type = 'sawtooth';
        const now = audioCtx.currentTime;
        // Rising pitch whoosh
        osc.frequency.setValueAtTime(80, now);
        osc.frequency.exponentialRampToValueAtTime(300, now + 0.2);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);

        osc.start(now);
        osc.stop(now + 0.25);
    }

    // Play a celebratory rising tone when a win is detected
    function playWinSound() {
        if (!audioCtx) return;
        const notes = [523, 659, 784, 1047]; // C5, E5, G5, C6 - major chord arpeggio
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.type = 'sine';
            osc.frequency.value = freq;

            const startTime = audioCtx.currentTime + i * 0.1;
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(0.2, startTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.4);

            osc.start(startTime);
            osc.stop(startTime + 0.4);
        });
    }

    // ===== LANDING FLASH EFFECTS =====
    // White flash overlay on each reel when it lands
    const landingFlashes = [];

    // Trigger a flash on a specific reel
    function triggerLandingFlash(reelIndex) {
        landingFlashes.push({
            reel: reelIndex,
            alpha: 0.6,  // starting brightness (0-1)
            decay: 0.88  // how fast it fades each frame
        });
    }

    // Update and draw all active landing flashes
    function drawLandingFlashes() {
        const baseY = REEL_AREA_Y + (REEL_H - NUM_ROWS * SYMBOL_H) / 2;

        for (let i = landingFlashes.length - 1; i >= 0; i--) {
            const flash = landingFlashes[i];
            const reelX = REEL_AREA_X + flash.reel * (REEL_W + REEL_GAP);

            // White glow overlay on the reel column
            ctx.save();
            ctx.globalAlpha = flash.alpha;
            ctx.fillStyle = '#FFFFFF';
            roundRect(reelX + SYMBOL_PAD, baseY + SYMBOL_PAD,
                      REEL_W - SYMBOL_PAD * 2, NUM_ROWS * SYMBOL_H - SYMBOL_PAD * 2, 6, true);
            ctx.restore();

            // Fade out
            flash.alpha *= flash.decay;
            if (flash.alpha < 0.02) {
                landingFlashes.splice(i, 1);
            }
        }
    }

    // ===== PAYLINE DEFINITIONS =====
    // 10 paylines - each is an array of 5 row positions (0=top, 1=mid, 2=bot)
    // These define the patterns players can win on
    const PAYLINES = [
        [1, 1, 1, 1, 1],  // Line 1: straight middle
        [0, 0, 0, 0, 0],  // Line 2: straight top
        [2, 2, 2, 2, 2],  // Line 3: straight bottom
        [0, 1, 2, 1, 0],  // Line 4: V shape
        [2, 1, 0, 1, 2],  // Line 5: inverted V
        [0, 0, 1, 2, 2],  // Line 6: diagonal down
        [2, 2, 1, 0, 0],  // Line 7: diagonal up
        [1, 0, 0, 0, 1],  // Line 8: top hat
        [1, 2, 2, 2, 1],  // Line 9: bottom hat
        [1, 0, 1, 0, 1]   // Line 10: zigzag
    ];

    // Colors for each payline so they're easy to tell apart
    const PAYLINE_COLORS = [
        '#FF2222', '#FFD700', '#44FF44', '#FF8800', '#44DDFF',
        '#FF44FF', '#88FF44', '#FF4488', '#44FFDD', '#FFFF44'
    ];

    // ===== WIN DETECTION =====
    // After reels stop, check each payline for matching symbols
    // Returns an array of winning lines with their details
    let activeWins = [];       // list of winning paylines from last spin
    let winDisplayTimer = 0;   // timer for cycling through win displays
    let winDisplayIndex = -1;  // which win line is currently highlighted (-1 = show all)
    let showingWins = false;   // true while win celebration is active
    const WIN_CYCLE_TIME = 90; // frames to show each individual win line (about 1.5 seconds)

    function checkWins() {
        activeWins = [];
        if (isSpinning) return;

        for (let p = 0; p < PAYLINES.length; p++) {
            const line = PAYLINES[p];

            // Get the symbol on this payline for each reel
            const lineSymbols = [];
            for (let r = 0; r < NUM_REELS; r++) {
                lineSymbols.push(reelGrid[r][line[r]]);
            }

            // Check for 3, 4, or 5 matching symbols from left to right
            // WILD substitutes for anything except SEVEN
            const firstSym = lineSymbols[0];
            let matchCount = 1;

            for (let r = 1; r < NUM_REELS; r++) {
                const sym = lineSymbols[r];
                const isWild = SYMBOLS[sym].name === 'WILD';
                const firstIsWild = SYMBOLS[firstSym].name === 'WILD';

                // Skip FIREBALL and BLANK - they don't count for line wins
                if (SYMBOLS[firstSym].name === 'FIREBALL' || SYMBOLS[firstSym].name === 'BLANK') break;
                if (SYMBOLS[sym].name === 'FIREBALL' || SYMBOLS[sym].name === 'BLANK') break;

                // Match if same symbol, or if either is WILD (but WILD can't sub for SEVEN)
                const sevenInvolved = SYMBOLS[firstSym].name === 'SEVEN' || SYMBOLS[sym].name === 'SEVEN';
                if (sym === firstSym ||
                    (isWild && !sevenInvolved) ||
                    (firstIsWild && !sevenInvolved)) {
                    matchCount++;
                } else {
                    break; // chain broken
                }
            }

            // Need at least 3 in a row to win
            if (matchCount >= 3) {
                // Look up the payout from the paytable
                // Use the first non-WILD symbol to determine pay
                let paySymbol = SYMBOLS[firstSym].name;
                if (paySymbol === 'WILD') {
                    // If the line starts with WILD, find the first real symbol
                    for (let r = 1; r < matchCount; r++) {
                        const sName = SYMBOLS[lineSymbols[r]].name;
                        if (sName !== 'WILD') { paySymbol = sName; break; }
                    }
                }

                const payEntry = PAYTABLE[paySymbol];
                const payout = payEntry ? payEntry[matchCount - 3] * betPerLine : 0;

                activeWins.push({
                    paylineIndex: p,
                    matchCount: matchCount,
                    symbolIndex: firstSym,
                    paySymbol: paySymbol,
                    payout: payout
                });
            }
        }

        // Add up total win from all winning paylines
        lastWin = 0;
        for (const win of activeWins) {
            lastWin += win.payout;
        }

        // Award winnings to the player's balance
        if (lastWin > 0) {
            credits += lastWin;
            totalPaidLifetime += lastWin;
        }

        // Start the win display cycle if we have wins
        if (activeWins.length > 0) {
            showingWins = true;
            winDisplayTimer = 0;
            winDisplayIndex = -1; // start by showing all lines briefly
            playWinSound(); // celebratory rising tone
        }
    }

    // Update the win display cycle timer each frame
    function updateWinDisplay() {
        if (!showingWins || activeWins.length === 0) return;

        winDisplayTimer++;
        if (winDisplayTimer >= WIN_CYCLE_TIME) {
            winDisplayTimer = 0;
            winDisplayIndex++;
            // Loop back to showing all after cycling through each line
            if (winDisplayIndex >= activeWins.length) {
                winDisplayIndex = -1;
            }
        }
    }

    // ===== WIN LINE DRAWING =====
    // Draw glowing lines across the reels for winning paylines
    function drawWinLines() {
        if (!showingWins || activeWins.length === 0) return;

        const baseY = REEL_AREA_Y + (REEL_H - NUM_ROWS * SYMBOL_H) / 2;

        // Pulsing glow effect - oscillates brightness over time
        const pulse = 0.6 + 0.4 * Math.sin(performance.now() / 150);

        // Decide which wins to draw this frame
        const winsToDraw = winDisplayIndex === -1 ? activeWins : [activeWins[winDisplayIndex]];

        for (const win of winsToDraw) {
            const line = PAYLINES[win.paylineIndex];
            const color = PAYLINE_COLORS[win.paylineIndex];

            // Draw the connecting line through each reel position
            ctx.save();
            ctx.globalAlpha = pulse;
            ctx.strokeStyle = color;
            ctx.lineWidth = 6;
            ctx.shadowColor = color;
            ctx.shadowBlur = 20;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            ctx.beginPath();
            for (let r = 0; r < NUM_REELS; r++) {
                const reelX = REEL_AREA_X + r * (REEL_W + REEL_GAP) + REEL_W / 2;
                const symY = baseY + line[r] * SYMBOL_H + SYMBOL_H / 2;

                if (r === 0) ctx.moveTo(reelX, symY);
                else ctx.lineTo(reelX, symY);
            }
            ctx.stroke();

            // Draw highlight boxes around winning symbols
            for (let r = 0; r < win.matchCount; r++) {
                const reelX = REEL_AREA_X + r * (REEL_W + REEL_GAP);
                const symY = baseY + line[r] * SYMBOL_H;

                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.shadowBlur = 15;
                roundRect(reelX + SYMBOL_PAD + 2, symY + SYMBOL_PAD + 2,
                          REEL_W - SYMBOL_PAD * 2 - 4, SYMBOL_H - SYMBOL_PAD * 2 - 4, 6, false, true);
            }

            ctx.restore();
        }

        // Draw win line label on the left margin
        if (winDisplayIndex >= 0 && winDisplayIndex < activeWins.length) {
            const win = activeWins[winDisplayIndex];
            const line = PAYLINES[win.paylineIndex];
            const color = PAYLINE_COLORS[win.paylineIndex];
            const symY = baseY + line[0] * SYMBOL_H + SYMBOL_H / 2;

            ctx.fillStyle = color;
            ctx.font = 'bold 20px Arial, sans-serif';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';
            ctx.fillText('LINE ' + (win.paylineIndex + 1), REEL_AREA_X - 50, symY);
        }
    }

    // ===== UTILITY FUNCTIONS =====

    // Draw a rounded rectangle (used everywhere for that polished look)
    function roundRect(x, y, w, h, r, fill, stroke) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r);
        ctx.closePath();
        if (fill) ctx.fill();
        if (stroke) ctx.stroke();
    }

    // Make a color lighter by a given amount (for gradient effects)
    function lightenColor(hex, amount) {
        const num = parseInt(hex.replace('#', ''), 16);
        const r = Math.min(255, (num >> 16) + amount);
        const g = Math.min(255, ((num >> 8) & 0x00FF) + amount);
        const b = Math.min(255, (num & 0x0000FF) + amount);
        return '#' + (r << 16 | g << 8 | b).toString(16).padStart(6, '0');
    }

    // ===== SPIN BUTTON =====
    // Big glowing button below the bottom panel
    const SPIN_BTN_X = MACHINE_X + MACHINE_W / 2 - 120;
    const SPIN_BTN_Y = REEL_AREA_Y + REEL_H + 190;
    const SPIN_BTN_W = 240;
    const SPIN_BTN_H = 70;

    function drawSpinButton() {
        // Figure out if the button is pressable and what it should say
        const isInBonus = gameMode === 'HOLD_AND_SPIN';
        const canPress = (!isSpinning && !isInBonus) ||
                         (isInBonus && bonusPhase === 'ACTIVE');
        let btnLabel = 'SPIN';
        if (isInBonus) {
            btnLabel = bonusPhase === 'ACTIVE' ? 'RESPIN' :
                       bonusPhase === 'SPINNING' ? 'SPINNING...' : 'HOLD & SPIN';
        } else if (isSpinning) {
            btnLabel = 'SPINNING...';
        }

        // Button glow when pressable
        if (canPress) {
            ctx.shadowColor = isInBonus ? '#FF6600' : '#44FF44';
            ctx.shadowBlur = 20;
        }

        // Button background - orange during bonus, green during normal play
        const btnGrad = ctx.createLinearGradient(0, SPIN_BTN_Y, 0, SPIN_BTN_Y + SPIN_BTN_H);
        if (canPress) {
            if (isInBonus) {
                btnGrad.addColorStop(0, '#CC5500');
                btnGrad.addColorStop(1, '#883300');
            } else {
                btnGrad.addColorStop(0, '#22AA22');
                btnGrad.addColorStop(1, '#117711');
            }
        } else {
            btnGrad.addColorStop(0, '#333333');
            btnGrad.addColorStop(1, '#222222');
        }
        ctx.fillStyle = btnGrad;
        roundRect(SPIN_BTN_X, SPIN_BTN_Y, SPIN_BTN_W, SPIN_BTN_H, 12, true);
        ctx.shadowBlur = 0;

        // Button border
        ctx.strokeStyle = canPress ? (isInBonus ? '#FF6600' : '#44FF44') : '#555555';
        ctx.lineWidth = 2;
        roundRect(SPIN_BTN_X, SPIN_BTN_Y, SPIN_BTN_W, SPIN_BTN_H, 12, false, true);

        // Button text
        ctx.fillStyle = canPress ? '#FFFFFF' : '#888888';
        ctx.font = 'bold 36px Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(btnLabel, SPIN_BTN_X + SPIN_BTN_W / 2, SPIN_BTN_Y + SPIN_BTN_H / 2);
    }

    // ===== CLICK HANDLING =====
    // Detect clicks on the spin button (works with the scaled canvas)
    canvas.addEventListener('click', function(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const clickX = (e.clientX - rect.left) * scaleX;
        const clickY = (e.clientY - rect.top) * scaleY;

        // If on theme menu, handle card clicks
        if (gameScreen === 'menu') {
            const cardW = 420;
            const gap = 50;
            const totalW = THEME_KEYS.length * cardW + (THEME_KEYS.length - 1) * gap;
            const startX = (canvas.width - totalW) / 2;
            for (let i = 0; i < THEME_KEYS.length; i++) {
                const cx = startX + i * (cardW + gap);
                if (clickX >= cx && clickX <= cx + cardW && clickY >= 240 && clickY <= 790) {
                    menuThemeIndex = i;
                    setTheme(THEME_KEYS[i]);
                    return;
                }
            }
            return;
        }

        // Check if click is inside the spin button
        if (clickX >= SPIN_BTN_X && clickX <= SPIN_BTN_X + SPIN_BTN_W &&
            clickY >= SPIN_BTN_Y && clickY <= SPIN_BTN_Y + SPIN_BTN_H) {
            startSpin();
            return;
        }

        // Check if click is on a nudge arrow (only when nudge is available)
        if (nudgeAvailable && !nudgeUsed && !nudgeAnimating && gameMode === 'NORMAL' && !isSpinning) {
            const baseY = REEL_AREA_Y + (REEL_H - NUM_ROWS * SYMBOL_H) / 2;
            for (let r = 0; r < NUM_REELS; r++) {
                const reelX = REEL_AREA_X + r * (REEL_W + REEL_GAP);
                const reelCX = reelX + REEL_W / 2;

                // UP arrow hit zone
                const upY = baseY - 38;
                if (clickX >= reelCX - 30 && clickX <= reelCX + 30 &&
                    clickY >= upY && clickY <= upY + 30) {
                    performNudge(r, 1); // nudge up
                    return;
                }

                // DOWN arrow hit zone
                const downY = baseY + NUM_ROWS * SYMBOL_H + 8;
                if (clickX >= reelCX - 30 && clickX <= reelCX + 30 &&
                    clickY >= downY && clickY <= downY + 30) {
                    performNudge(r, -1); // nudge down
                    return;
                }
            }
        }

        // Check if click is on a symbol for Symbol Switch
        if (switchAvailable && !switchUsed && !switchAnimating && gameMode === 'NORMAL' && !isSpinning) {
            const baseY = REEL_AREA_Y + (REEL_H - NUM_ROWS * SYMBOL_H) / 2;
            for (let r = 0; r < NUM_REELS; r++) {
                const reelX = REEL_AREA_X + r * (REEL_W + REEL_GAP);
                for (let row = 0; row < NUM_ROWS; row++) {
                    const symY = baseY + row * SYMBOL_H;
                    if (clickX >= reelX + SYMBOL_PAD && clickX <= reelX + REEL_W - SYMBOL_PAD &&
                        clickY >= symY + SYMBOL_PAD && clickY <= symY + SYMBOL_H - SYMBOL_PAD) {
                        handleSwitchTap(r, row);
                        return;
                    }
                }
            }
        }
    });

    // ===== JAMMA 36-PIN BUTTON MAPPING =====
    // JAMMA arcade cabinets use a 36-pin edge connector. Physical buttons
    // are wired through a USB encoder (I-PAC or J-PAC) which converts
    // button presses into keyboard events. This maps those keys to game actions.
    //
    // Standard JAMMA button layout mapped to I-PAC defaults:
    // Player 1 Button 1 (SPIN)      = Key "1" or Left Ctrl
    // Player 1 Button 2 (BET UP)    = Key "2" or Left Alt
    // Player 1 Button 3 (BET DOWN)  = Key "3" or Space
    // Player 1 Button 4 (CASHOUT)   = Key "4" or Left Shift
    // Player 1 Button 5 (MENU)      = Key "5" or Z
    // Player 1 Joystick UP          = Arrow Up
    // Player 1 Joystick DOWN        = Arrow Down
    // Player 1 Joystick LEFT        = Arrow Left
    // Player 1 Joystick RIGHT       = Arrow Right
    // Coin switch                   = Key "5" (directly mapped by JAMMA standard)
    // Service button                = Key "9" (opens operator menu)

    const JAMMA_MAP = {
        // Primary mappings (I-PAC defaults)
        'Digit1':      'SPIN',
        'ControlLeft':  'SPIN',
        'Space':        'SPIN',          // also spin for keyboard testing
        'Digit2':      'BET_UP',
        'AltLeft':      'BET_UP',
        'Digit3':      'BET_DOWN',
        'Digit4':      'CASHOUT',
        'ShiftLeft':    'CASHOUT',
        'Digit5':      'COIN',          // coin switch
        'KeyZ':         'MENU',
        'Digit9':      'SERVICE',        // operator service button
        // Joystick directions (for nudge and menu navigation)
        'ArrowUp':      'UP',
        'ArrowDown':    'DOWN',
        'ArrowLeft':    'LEFT',
        'ArrowRight':   'RIGHT',
        // Keyboard shortcuts for desktop testing
        'Enter':        'SPIN',
        'Equal':        'BET_UP',        // + key
        'Minus':        'BET_DOWN'       // - key
    };

    // Bet levels available to the player (credits per line x 10 lines)
    const BET_LEVELS = [10, 20, 50, 100, 200];
    let currentBetIndex = 0;

    // Increase the bet to the next level
    function betUp() {
        if (isSpinning) return;
        currentBetIndex = (currentBetIndex + 1) % BET_LEVELS.length;
        totalBet = BET_LEVELS[currentBetIndex];
        betPerLine = totalBet / 10;
    }

    // Decrease the bet to the previous level
    function betDown() {
        if (isSpinning) return;
        currentBetIndex = (currentBetIndex - 1 + BET_LEVELS.length) % BET_LEVELS.length;
        totalBet = BET_LEVELS[currentBetIndex];
        betPerLine = totalBet / 10;
    }

    // Cashout - prints a TITO ticket
    function cashout() {
        if (isSpinning) return;
        if (credits <= 0) return;
        cashoutActive = true;
        cashoutAmount = credits;
        if (typeof sasRecordCashout === 'function') sasRecordCashout(credits);
        // Send print command to TITO hardware (if bridge connected)
        printTITOTicket(credits);
        credits = 0;
        cashoutTimer = 180; // show for 3 seconds at 60fps
        playCashoutSound();
    }

    let cashoutActive = false;
    let cashoutAmount = 0;
    let cashoutTimer = 0;

    // Cashout sound - descending chime (coins paying out)
    function playCashoutSound() {
        if (!audioCtx) return;
        [880, 660, 440, 330].forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.value = freq;
            const t = audioCtx.currentTime + i * 0.12;
            gain.gain.setValueAtTime(0.2, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
            osc.start(t);
            osc.stop(t + 0.3);
        });
    }

    // Handle all JAMMA button inputs
    document.addEventListener('keydown', function(e) {
        const action = JAMMA_MAP[e.code];
        if (!action) return;
        e.preventDefault();

        // If on theme selection menu, route inputs there
        if (gameScreen === 'menu') {
            handleThemeMenuInput(action);
            return;
        }

        // If operator menu is open, route inputs there instead
        if (operatorMenuOpen && action !== 'SERVICE') {
            handleMenuInput(action);
            return;
        }

        switch (action) {
            case 'SPIN':    startSpin(); break;
            case 'BET_UP':  betUp(); break;
            case 'BET_DOWN': betDown(); break;
            case 'CASHOUT': cashout(); break;
            case 'COIN':    credits += 100; break; // coin insert adds 100 credits
            case 'SERVICE': toggleOperatorMenu(); break;
            // Joystick for nudge: UP/DOWN on the currently hovered reel
            case 'UP':
                if (nudgeAvailable && !nudgeUsed) performNudge(nudgeKeyReel, 1);
                break;
            case 'DOWN':
                if (nudgeAvailable && !nudgeUsed) performNudge(nudgeKeyReel, -1);
                break;
            case 'LEFT':
                nudgeKeyReel = Math.max(0, nudgeKeyReel - 1);
                break;
            case 'RIGHT':
                nudgeKeyReel = Math.min(NUM_REELS - 1, nudgeKeyReel + 1);
                break;
        }
    });

    // Track which reel the joystick is pointing at for nudge
    let nudgeKeyReel = 2; // start at middle reel

    let operatorMenuOpen = false;

    const MENU_ITEMS = [
        { label: 'RTP SETTING', type: 'rtp' },
        { label: 'VOLUME', type: 'volume' },
        { label: 'TOTAL SPINS', type: 'info' },
        { label: 'TOTAL WAGERED', type: 'info' },

    function toggleOperatorMenu() {
        if (isSpinning) return;

    // Handle up/down/select in the operator menu
    function handleMenuInput(action) {
        if (!operatorMenuOpen) return;

        if (action === 'UP') {
            menuSelection = (menuSelection - 1 + MENU_ITEMS.length) % MENU_ITEMS.length;
        } else if (action === 'DOWN') {
            menuSelection = (menuSelection + 1) % MENU_ITEMS.length;
        } else if (action === 'LEFT' || action === 'RIGHT') {
            const item = MENU_ITEMS[menuSelection];
            if (item.type === 'rtp') {
                const rtpOptions = [86, 88, 92, 96];
                const idx = rtpOptions.indexOf(currentRTP);
                if (action === 'RIGHT') currentRTP = rtpOptions[Math.min(idx + 1, rtpOptions.length - 1)];
                else currentRTP = rtpOptions[Math.max(idx - 1, 0)];
                loadReelStrips();
            } else if (item.type === 'volume') {
                if (action === 'RIGHT') masterVolume = Math.min(1.0, masterVolume + 0.1);
                else masterVolume = Math.max(0.0, masterVolume - 0.1);
            }
        } else if (action === 'SPIN' || action === 'SELECT') {
            const item = MENU_ITEMS[menuSelection];
            if (item.label === 'EXIT MENU') toggleOperatorMenu();
            else if (item.label === 'RESET CREDITS TO 1000') credits = 1000;
            else if (item.label === 'RUN 1000 TEST SPINS') {

                let testWins = 0;
                for (let i = 0; i < 1000; i++) {

                }

    // ===== REEL UPDATE LOGIC =====
    // Called every frame to move the reels during a spin
    function updateReels() {
        if (!isSpinning) return;

        let allStopped = true;

        for (let r = 0; r < NUM_REELS; r++) {
            const reel = reels[r];
            if (!reel.spinning) continue;

            allStopped = false;

            if (reel.stopping) {
                // ===== DECELERATION PHASE =====
                // Slow down gradually until we land on the target position
                reel.speed *= 0.92; // friction - slows down each frame

                // Move the reel by current speed
                reel.offset += reel.speed;

                // When offset passes a full symbol height, advance the position
                while (reel.offset >= SYMBOL_H) {
                    reel.offset -= SYMBOL_H;
                    reel.position = (reel.position + 1) % REEL_STRIP_LENGTH;
                }

                // When slow enough and close to target, snap to final position
                if (reel.speed < 1.5) {
                    // Snap to target
                    reel.position = reel.targetPosition;
                    reel.offset = 0;
                    reel.speed = 0;

                    // Start the bounce-back effect (overshoot then settle)
                    if (reel.bouncePhase === 0) {
                        reel.bouncePhase = 1;
                        reel.bounceBack = -12; // overshoot downward
                        // Landing effects - flash and sound
                        triggerLandingFlash(r);
                        playReelStopSound(r);
                    }
                }
            } else {
                // ===== FULL SPEED PHASE =====
                // Reel is at full speed, just keep scrolling
                reel.offset += reel.speed;

                // Advance position when we scroll past a full symbol
                while (reel.offset >= SYMBOL_H) {
                    reel.offset -= SYMBOL_H;
                    reel.position = (reel.position + 1) % REEL_STRIP_LENGTH;
                }
            }

            // ===== BOUNCE ANIMATION =====
            // After landing, do a small bounce for a satisfying stop feel
            if (reel.bouncePhase > 0) {
                // Spring back toward zero
                reel.bounceBack *= 0.7;
                if (Math.abs(reel.bounceBack) < 0.5) {
                    reel.bounceBack = 0;
                    reel.bouncePhase = 0;
                    reel.spinning = false; // this reel is done
                }
            }
        }

        // Check if all reels have fully stopped
        if (allStopped) {
            isSpinning = false;
            updateReelGrid();
            checkWins(); // look for winning paylines
            if (typeof sasRecordSpin === 'function') sasRecordSpin(totalBet, lastWin); // SAS meter update
            checkBonusTrigger(); // check if Hold and Spin bonus should trigger
            enableNudge(); // allow player to nudge one reel
            enableSwitch(); // allow player to swap two adjacent symbols
            enableBillAcceptor(); // re-enable bill acceptor after spin
        }
    }

    // ===== ANIMATION LOOP =====
    // This runs 60 times per second using requestAnimationFrame (rAF)
    // It redraws everything every frame for smooth animation
    function gameLoop() {
        // If on theme selection screen, draw that instead of the game
        if (gameScreen === 'menu') {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawThemeMenu();
            requestAnimationFrame(gameLoop);
            return;
        }

        // Update cashout overlay timer
        if (cashoutActive) {
            cashoutTimer--;
            if (cashoutTimer <= 0) cashoutActive = false;
        }

        // Update reel positions if spinning
        updateReels();
        // Update nudge slide animation
        updateNudge();
        // Update Symbol Switch animation
        updateSwitch();
        // Update which win line is being highlighted
        updateWinDisplay();
        // Update Hold and Spin bonus state machine
        updateBonus();

        // Clear the entire canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw each layer from back to front
        drawMachineFrame();
        updateAndDrawParticles(); // theme-specific particles (sparks, embers, bubbles)
        drawJackpotBar();
        drawReels();
        drawLandingFlashes(); // white flash when each reel stops
        drawWinLines();       // glowing lines over winning paylines
        drawBonusOverlay();   // Hold and Spin overlay (draws on top of reels when active)
        if (gameMode !== 'HOLD_AND_SPIN') drawPaylineMarkers(); // hide markers during bonus
        drawNudgeUI();        // nudge arrow buttons (when available)
        drawSwitchUI();       // symbol switch selection UI (when available)
        drawBottomPanel();
        drawSpinButton();
        drawCashoutOverlay(); // TITO cashout message (when active)
        drawOperatorMenu();   // operator settings overlay (when open)
        drawNetworkStatus();        // progressive network indicator (top-right corner)
        drawNetworkJackpotAlert();  // "JACKPOT WON!" banner when another cabinet wins

        // Request the next frame
        requestAnimationFrame(gameLoop);
    }

    // Start the animation loop
    gameLoop();

    // ===== HIT FREQUENCY SIMULATION =====
    // Hidden diagnostic tool for validating game math.
    // Run from browser console: runSimulation(100000)
    // Tests all 3 RTP settings and reports hit frequency, RTP, and bonus rate.
    // Target: 32% hit frequency (one in three spins wins something)

    function runSimulation(numSpins) {
        numSpins = numSpins || 100000;
        const results = {};

        [86, 88, 92, 96].forEach(function(rtp) {
            const strips = rtp === 86 ? STRIPS_86 : rtp === 88 ? STRIPS_88 : rtp === 96 ? STRIPS_96 : STRIPS_92;
            const stripLen = strips[0].length;
            let totalWagered = 0;
            let totalPaid = 0;
            let winSpins = 0;
            let bonusTriggers = 0;

            for (let spin = 0; spin < numSpins; spin++) {
                totalWagered += 10; // 10 lines x 1 credit per line

                // Generate random reel positions
                const positions = [];
                for (let r = 0; r < 5; r++) {
                    positions.push(Math.floor(Math.random() * stripLen));
                }

                // Build the 5x3 grid from the strips
                const grid = [];
                for (let r = 0; r < 5; r++) {
                    grid[r] = [];
                    for (let row = 0; row < 3; row++) {
                        grid[r][row] = strips[r][(positions[r] + row) % stripLen];
                    }
                }

                // Count fireballs for bonus trigger check
                let fireballs = 0;
                for (let r = 0; r < 5; r++) {
                    for (let row = 0; row < 3; row++) {
                        if (SYMBOLS[grid[r][row]].name === 'FIREBALL') fireballs++;
                    }
                }
                if (fireballs >= 3) bonusTriggers++;

                // Check all 10 paylines
                let spinWin = 0;
                for (let p = 0; p < PAYLINES.length; p++) {
                    const line = PAYLINES[p];
                    const lineSyms = [];
                    for (let r = 0; r < 5; r++) {
                        lineSyms.push(grid[r][line[r]]);
                    }

                    const first = lineSyms[0];
                    if (SYMBOLS[first].name === 'FIREBALL' || SYMBOLS[first].name === 'BLANK') continue;

                    let mc = 1;
                    for (let r = 1; r < 5; r++) {
                        const sym = lineSyms[r];
                        if (SYMBOLS[sym].name === 'FIREBALL' || SYMBOLS[sym].name === 'BLANK') break;
                        const isW = SYMBOLS[sym].name === 'WILD';
                        const firstW = SYMBOLS[first].name === 'WILD';
                        const sevenInv = SYMBOLS[first].name === 'SEVEN' || SYMBOLS[sym].name === 'SEVEN';
                        if (sym === first || (isW && !sevenInv) || (firstW && !sevenInv)) {
                            mc++;
                        } else {
                            break;
                        }
                    }

                    if (mc >= 3) {
                        let paySym = SYMBOLS[first].name;
                        if (paySym === 'WILD') {
                            for (let r = 1; r < mc; r++) {
                                const sn = SYMBOLS[lineSyms[r]].name;
                                if (sn !== 'WILD') { paySym = sn; break; }
                            }
                        }
                        const pe = PAYTABLE[paySym];
                        if (pe) spinWin += pe[mc - 3] * 1; // betPerLine = 1
                    }
                }

                if (spinWin > 0) winSpins++;
                totalPaid += spinWin;
            }

            const hitFreq = (winSpins / numSpins * 100).toFixed(2);
            const actualRTP = (totalPaid / totalWagered * 100).toFixed(2);
            const bonusRate = numSpins / Math.max(bonusTriggers, 1);

            results[rtp + '%'] = {
                spins: numSpins,
                hitFrequency: hitFreq + '%',
                actualRTP: actualRTP + '%',
                targetRTP: rtp + '%',
                bonusTriggers: bonusTriggers,
                avgSpinsBetweenBonus: Math.round(bonusRate),
                winSpins: winSpins,
                totalWagered: totalWagered,
                totalPaid: totalPaid
            };
        });

        console.log('=== BLACK ICE GAME MATH SIMULATION ===');
        console.log('Spins per RTP setting: ' + numSpins);
        console.table(results);
        return results;
    }

    // Make simulation accessible from console
    window.runSimulation = runSimulation;

    // ===== PROGRESSIVE JACKPOT NETWORK =====
    // Links jackpot pools across multiple cabinets on the same local network.
    // Uses a WebSocket relay server running on one machine (the "host").
    // If no host is found, this cabinet uses its own local pools (default behavior).
    //
    // Architecture:
    //   - A separate Node.js relay runs on the host machine at ws://host:9200
    //   - Each cabinet connects as a client
    //   - After every spin, the cabinet sends its jackpot feed contribution
    //   - The relay broadcasts updated pool totals to all connected cabinets
    //   - If connection drops, cabinet seamlessly falls back to local pools
    //
    // Message types:
    //   Client → Server:  { type: 'feed', pools: { MINI: 0.05, MINOR: 0.03, ... } }
    //   Client → Server:  { type: 'award', jackpot: 'MINI' }  (won a jackpot)
    //   Server → Client:  { type: 'pools', pools: { MINI: 52.30, MINOR: 205.10, ... } }
    //   Server → Client:  { type: 'jackpot_won', jackpot: 'MEGA', machine: 'BLACKICE-003', amount: 12500 }
    //   Client → Server:  { type: 'register', machineId: 'BLACKICE-001' }

    let progressiveSocket = null;      // WebSocket connection to jackpot relay
    let progressiveConnected = false;  // are we linked to the network?
    let progressiveHostUrl = null;     // ws://host:9200
    let machineId = 'BLACKICE-' + String(Math.floor(Math.random() * 900) + 100); // random until configured

    // ===== NETWORK JACKPOT - CONNECTION =====
    // Try to connect to the progressive jackpot relay server.
    // The host URL can be set in the operator menu or auto-discovered.
    function connectProgressiveJackpot(hostUrl) {
        if (!hostUrl) hostUrl = 'ws://localhost:9200'; // default: relay on same machine
        progressiveHostUrl = hostUrl;

        try {
            progressiveSocket = new WebSocket(hostUrl);

            progressiveSocket.onopen = function() {
                progressiveConnected = true;
                // Register this cabinet with the relay
                progressiveSocket.send(JSON.stringify({
                    type: 'register',
                    machineId: machineId
                }));
                console.log('[PROGRESSIVE] Connected to jackpot relay at ' + hostUrl);
            };

            progressiveSocket.onmessage = function(event) {
                const msg = JSON.parse(event.data);

                // Server is broadcasting updated pool totals
                if (msg.type === 'pools') {
                    // Sync our local pools with the network values
                    for (const name in msg.pools) {
                        if (jackpotPools[name]) {
                            jackpotPools[name].current = msg.pools[name];
                        }
                    }
                }

                // Another machine on the network won a jackpot - show celebration
                if (msg.type === 'jackpot_won' && msg.machine !== machineId) {
                    showNetworkJackpotWin(msg.jackpot, msg.machine, msg.amount);
                }
            };

            progressiveSocket.onclose = function() {
                progressiveConnected = false;
                console.log('[PROGRESSIVE] Disconnected from relay - using local pools');
                // Try to reconnect after 5 seconds
                setTimeout(function() {
                    connectProgressiveJackpot(progressiveHostUrl);
                }, 5000);
            };

            progressiveSocket.onerror = function() {
                progressiveConnected = false;
            };
        } catch (e) {
            // Relay not available - game works fine with local pools
            progressiveConnected = false;
            console.log('[PROGRESSIVE] No relay found - using local jackpot pools');
        }
    }

    // ===== NETWORK JACKPOT - SEND FEED =====
    // Called after each spin to send this machine's jackpot feed to the relay.
    // The relay adds it to the shared pool and broadcasts new totals.
    function sendProgressiveFeed() {
        if (!progressiveConnected || !progressiveSocket) return;

        // Calculate the feed amounts for this spin
        const feeds = {};
        for (const name in jackpotPools) {
            const pool = jackpotPools[name];
            feeds[name] = totalBet * pool.feed * (0.8 + Math.random() * 0.4);
        }

        progressiveSocket.send(JSON.stringify({
            type: 'feed',
            machineId: machineId,
            pools: feeds
        }));
    }

    // ===== NETWORK JACKPOT - AWARD =====
    // Called when this machine wins a jackpot during Hold and Spin.
    // Tells the relay to reset that pool for all connected cabinets.
    function sendProgressiveAward(jackpotName, amount) {
        if (!progressiveConnected || !progressiveSocket) return;

        progressiveSocket.send(JSON.stringify({
            type: 'award',
            machineId: machineId,
            jackpot: jackpotName,
            amount: amount
        }));
    }

    // ===== NETWORK JACKPOT WIN NOTIFICATION =====
    // Shows a brief overlay when another cabinet on the network hits a jackpot.
    // This creates excitement on the floor - players see big wins happening nearby.
    let networkJackpotAlert = null; // { name, machine, amount, timer }

    function showNetworkJackpotWin(jackpotName, machineName, amount) {
        networkJackpotAlert = {
            name: jackpotName,
            machine: machineName,
            amount: amount,
            timer: 180 // show for 3 seconds at 60fps
        };
        console.log('[PROGRESSIVE] ' + machineName + ' won ' + jackpotName + ' jackpot: $' + amount);
    }

    // Draw the network jackpot alert overlay
    function drawNetworkJackpotAlert() {
        if (!networkJackpotAlert) return;
        networkJackpotAlert.timer--;
        if (networkJackpotAlert.timer <= 0) { networkJackpotAlert = null; return; }

        const alert = networkJackpotAlert;
        const alpha = Math.min(1, alert.timer / 30); // fade out in last 0.5 seconds

        ctx.save();
        ctx.globalAlpha = alpha * 0.85;

        // Dark banner across top of screen
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 100, canvas.width, 80);

        // Gold border
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 2;
        ctx.strokeRect(0, 100, canvas.width, 80);

        ctx.globalAlpha = alpha;

        // Jackpot color based on tier
        const jp = JACKPOT_VALUES.find(j => j.name === alert.name);
        const color = jp ? jp.color : '#FFD700';

        // "JACKPOT WON ON MACHINE X" text
        ctx.fillStyle = color;
        ctx.font = 'bold 28px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(alert.name + ' JACKPOT WON!', canvas.width / 2, 130);

        ctx.fillStyle = '#FFFFFF';
        ctx.font = '20px Arial';
        ctx.fillText(alert.machine + ' won $' + alert.amount.toLocaleString(), canvas.width / 2, 160);

        ctx.restore();
    }

    // ===== NETWORK STATUS INDICATOR =====
    // Small dot in the corner shows if we're linked to the progressive network.
    // Green = connected, Gray = local only (no network).
    function drawNetworkStatus() {
        const x = canvas.width - 30;
        const y = 30;
        const radius = 6;

        ctx.save();
        ctx.globalAlpha = 0.7;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fillStyle = progressiveConnected ? '#44FF44' : '#666666';
        ctx.fill();

        // Label
        ctx.font = '10px Arial';
        ctx.textAlign = 'right';
        ctx.fillStyle = '#888888';
        ctx.fillText(progressiveConnected ? 'LINKED' : 'LOCAL', x - 12, y + 4);
        ctx.restore();
    }

    // Try to connect to the progressive jackpot relay on startup
    connectProgressiveJackpot();

    // ===== SAS REPORTING SYSTEM =====
    // Slot Accounting System - tracks all machine meters and events.
    // Standard meter codes follow SAS protocol conventions so the data
    // is familiar to gaming regulators and back-office systems.
    //
    // Meters are persisted to localStorage so they survive browser restarts.
    // The back-office dashboard queries these via window.getSASReport().
    //
    // Meter codes (based on SAS long poll meter codes):
    //   00 = Total coin in (credits wagered)
    //   01 = Total coin out (credits paid)
    //   02 = Total drop (bills inserted)
    //   03 = Total jackpot (jackpot payouts)
    //   04 = Games played
    //   05 = Games won
    //   06 = Total cancelled credits (cashouts)
    //   10 = Current credits on machine
    //   20 = Door open count
    //   21 = Power reset count

    const SAS_STORAGE_KEY = 'blackice_sas_meters';
    const SAS_EVENT_KEY = 'blackice_sas_events';

    // SAS meter registry
    let sasMeters = {
        coinIn: 0,          // 00: total credits wagered lifetime
        coinOut: 0,         // 01: total credits paid lifetime
        totalDrop: 0,       // 02: total bills/coins inserted
        totalJackpot: 0,    // 03: total jackpot payouts
        gamesPlayed: 0,     // 04: total spins
        gamesWon: 0,        // 05: total winning spins
        cancelledCredits: 0,// 06: total cashouts via TITO
        doorOpens: 0,       // 20: number of times service menu opened
        powerResets: 0,     // 21: number of times game loaded
        bonusTriggered: 0,  // custom: Hold and Spin activations
        nudgesUsed: 0,      // custom: skill nudge activations
        switchesUsed: 0     // custom: skill switch activations
    };

    // Event log - last 500 events (FIFO)
    let sasEvents = [];
    const MAX_SAS_EVENTS = 500;

    // Load saved meters from localStorage
    function loadSASMeters() {
        try {
            const saved = localStorage.getItem(SAS_STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                for (const key in data) {
                    if (sasMeters.hasOwnProperty(key)) sasMeters[key] = data[key];
                }
            }
            const events = localStorage.getItem(SAS_EVENT_KEY);
            if (events) sasEvents = JSON.parse(events);
        } catch (e) {
            // Fresh start if localStorage is corrupt
        }
        // Count this page load as a power reset
        sasMeters.powerResets++;
        logSASEvent('POWER_ON', 'Game loaded');
    }

    // Save meters to localStorage
    function saveSASMeters() {
        try {
            localStorage.setItem(SAS_STORAGE_KEY, JSON.stringify(sasMeters));
            localStorage.setItem(SAS_EVENT_KEY, JSON.stringify(sasEvents));
        } catch (e) {
            // localStorage may be full or disabled
        }
    }

    // Log a SAS event with timestamp
    function logSASEvent(eventType, detail) {
        const event = {
            time: new Date().toISOString(),
            type: eventType,
            detail: detail,
            credits: credits,
            meter_coinIn: sasMeters.coinIn,
            meter_coinOut: sasMeters.coinOut
        };
        sasEvents.push(event);
        // Keep only last 500 events
        if (sasEvents.length > MAX_SAS_EVENTS) {
            sasEvents = sasEvents.slice(sasEvents.length - MAX_SAS_EVENTS);
        }
    }

    // ===== SAS METER UPDATE HOOKS =====
    // Called from game logic to update meters at key moments

    // After every spin completes
    function sasRecordSpin(betAmount, winAmount) {
        sasMeters.coinIn += betAmount;
        sasMeters.gamesPlayed++;
        if (winAmount > 0) {
            sasMeters.coinOut += winAmount;
            sasMeters.gamesWon++;
        }
        // Sync with the existing lifetime counters
        totalSpinsPlayed = sasMeters.gamesPlayed;
        totalWageredLifetime = sasMeters.coinIn;
        totalPaidLifetime = sasMeters.coinOut;
        // Auto-save every 10 spins
        if (sasMeters.gamesPlayed % 10 === 0) saveSASMeters();
    }

    // When a bill is inserted via hardware bridge
    function sasRecordBillIn(amount) {
        sasMeters.totalDrop += amount;
        logSASEvent('BILL_IN', 'Amount: ' + amount);
        saveSASMeters();
    }

    // When a jackpot is awarded
    function sasRecordJackpot(name, amount) {
        sasMeters.totalJackpot += amount;
        logSASEvent('JACKPOT', name + ' won: ' + amount);
        saveSASMeters();
    }

    // When player cashes out via TITO
    function sasRecordCashout(amount) {
        sasMeters.cancelledCredits += amount;
        logSASEvent('CASHOUT', 'Amount: ' + amount);
        saveSASMeters();
    }

    // When Hold and Spin bonus triggers
    function sasRecordBonus() {
        sasMeters.bonusTriggered++;
        logSASEvent('BONUS', 'Hold and Spin triggered');
    }

    // When nudge skill is used
    function sasRecordNudge() {
        sasMeters.nudgesUsed++;
        logSASEvent('NUDGE', 'Nudge skill used');
    }

    // When symbol switch skill is used
    function sasRecordSwitch() {
        sasMeters.switchesUsed++;
        logSASEvent('SWITCH', 'Symbol switch skill used');
    }

    // When operator opens service menu
    function sasRecordDoorOpen() {
        sasMeters.doorOpens++;
        logSASEvent('DOOR_OPEN', 'Operator menu accessed');
        saveSASMeters();
    }

    // ===== SAS REPORT GENERATOR =====
    // Returns a complete machine accounting report.
    // Called by the back-office dashboard or from the browser console.
    function getSASReport() {
        const report = {
            machineId: machineId,
            reportTime: new Date().toISOString(),
            currentRTP: currentRTP + '%',
            currentTheme: currentTheme,
            currentCredits: credits,
            meters: {
                '00_coinIn': sasMeters.coinIn,
                '01_coinOut': sasMeters.coinOut,
                '02_totalDrop': sasMeters.totalDrop,
                '03_totalJackpot': sasMeters.totalJackpot,
                '04_gamesPlayed': sasMeters.gamesPlayed,
                '05_gamesWon': sasMeters.gamesWon,
                '06_cancelledCredits': sasMeters.cancelledCredits,
                '10_currentCredits': credits,
                '20_doorOpens': sasMeters.doorOpens,
                '21_powerResets': sasMeters.powerResets,
                'custom_bonusTriggered': sasMeters.bonusTriggered,
                'custom_nudgesUsed': sasMeters.nudgesUsed,
                'custom_switchesUsed': sasMeters.switchesUsed
            },
            calculated: {
                actualRTP: sasMeters.coinIn > 0 ? ((sasMeters.coinOut / sasMeters.coinIn) * 100).toFixed(2) + '%' : 'N/A',
                hitFrequency: sasMeters.gamesPlayed > 0 ? ((sasMeters.gamesWon / sasMeters.gamesPlayed) * 100).toFixed(2) + '%' : 'N/A',
                avgBet: sasMeters.gamesPlayed > 0 ? (sasMeters.coinIn / sasMeters.gamesPlayed).toFixed(1) : 'N/A',
                houseHold: sasMeters.coinIn > 0 ? (((sasMeters.coinIn - sasMeters.coinOut) / sasMeters.coinIn) * 100).toFixed(2) + '%' : 'N/A',
                bonusRate: sasMeters.bonusTriggered > 0 ? Math.round(sasMeters.gamesPlayed / sasMeters.bonusTriggered) + ' spins/bonus' : 'N/A'
            },
            recentEvents: sasEvents.slice(-20)
        };
        return report;
    }

    // Make SAS report accessible from console and from the dashboard
    window.getSASReport = getSASReport;
    window.sasMeters = sasMeters;
    window.sasEvents = sasEvents;

    // Load meters on startup
    loadSASMeters();

    // Auto-save meters every 60 seconds
    setInterval(saveSASMeters, 60000);

    </script>
