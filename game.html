<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Ice Gaming - Game 1</title>
    <style>
        /* ===== FULL SCREEN DARK BACKGROUND ===== */
        /* Kiosk mode: fills the entire screen with no scrollbars or margins */
        /* On the cabinet, Chrome launches with --kiosk flag for true fullscreen */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            cursor: none; /* hide cursor on cabinet touchscreen */
            user-select: none; /* prevent text selection */
            -webkit-user-select: none;
        }
        canvas {
            display: block;
            touch-action: none; /* prevent browser zoom/scroll on touch */
        }
        /* Show cursor when not in fullscreen (for desktop development) */
        body:not(:fullscreen) { cursor: default; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
    /* =============================================================
       BLACK ICE GAMING - GAME 1
       Main game file - everything lives here
       ============================================================= */

    // ===== CANVAS SETUP =====
    // The canvas is our drawing surface - like a digital whiteboard
    // We size it to 1920x1080 to match the cabinet monitor
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 1920;
    canvas.height = 1080;

    // Scale canvas to fit the browser window while keeping proportions
    function resizeCanvas() {
        const scaleX = window.innerWidth / canvas.width;
        const scaleY = window.innerHeight / canvas.height;
        const scale = Math.min(scaleX, scaleY);
        canvas.style.width = (canvas.width * scale) + 'px';
        canvas.style.height = (canvas.height * scale) + 'px';
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // ===== BILL ACCEPTOR & TITO TICKET PRINTER =====
    // Bill acceptors (like Pyramid Apex 7000) and TITO printers
    // communicate over RS-232 serial. Since the game runs in Chrome,
    // a small Node.js bridge service runs on the cabinet PC and relays
    // serial data over WebSocket to the game.
    //
    // Bridge service runs on ws://localhost:9100 and handles:
    // - Bill acceptor: receives bill-inserted events, sends enable/disable
    // - TITO printer: sends print-ticket commands, receives print-complete
    //
    // Protocol messages (JSON over WebSocket):
    // Bill inserted:  { type: "bill", amount: 100 }  (amount in cents)
    // Print ticket:   { type: "print", credits: 500, datetime: "..." }
    // Print complete: { type: "printed", success: true }
    // Enable accept:  { type: "enable_acceptor" }
    // Disable accept: { type: "disable_acceptor" }

    let hardwareBridge = null;
    let bridgeConnected = false;

    // Connect to the hardware bridge WebSocket
    function connectHardwareBridge() {
        try {
            hardwareBridge = new WebSocket('ws://localhost:9100');

            hardwareBridge.onopen = function() {
                bridgeConnected = true;
                // Enable the bill acceptor on connection
                hardwareBridge.send(JSON.stringify({ type: 'enable_acceptor' }));
                console.log('[HARDWARE] Bridge connected');
            };

            hardwareBridge.onmessage = function(event) {
                const msg = JSON.parse(event.data);

                if (msg.type === 'bill') {
                    // Bill inserted - convert cents to credits (1 cent = 1 credit)
                    const creditsToAdd = msg.amount;
                    credits += creditsToAdd;
                    if (typeof sasRecordBillIn === 'function') sasRecordBillIn(creditsToAdd);
                    playBillInsertSound();
                    console.log('[HARDWARE] Bill accepted: +' + creditsToAdd + ' credits');
                }

                if (msg.type === 'printed') {
                    console.log('[HARDWARE] Ticket printed: ' + (msg.success ? 'OK' : 'FAILED'));
                }
            };

            hardwareBridge.onclose = function() {
                bridgeConnected = false;
                // Auto-reconnect after 3 seconds
                setTimeout(connectHardwareBridge, 3000);
            };

            hardwareBridge.onerror = function() {
                bridgeConnected = false;
            };
        } catch (e) {
            // Bridge not available - game still works with keyboard coin input
            bridgeConnected = false;
        }
    }

    // Send a TITO print command to the hardware bridge
    function printTITOTicket(creditAmount) {
        if (!bridgeConnected || !hardwareBridge) return false;
        hardwareBridge.send(JSON.stringify({
            type: 'print',
            credits: creditAmount,
            datetime: new Date().toISOString(),
            machineId: 'BLACKICE-001'
        }));
        return true;
    }

    // Disable bill acceptor during spin (standard practice)
    function disableBillAcceptor() {
        if (bridgeConnected && hardwareBridge) {
            hardwareBridge.send(JSON.stringify({ type: 'disable_acceptor' }));
        }
    }

    // Re-enable bill acceptor after spin
    function enableBillAcceptor() {
        if (bridgeConnected && hardwareBridge) {
            hardwareBridge.send(JSON.stringify({ type: 'enable_acceptor' }));
        }
    }

    // Bill insert sound - crisp "cha-ching"
    function playBillInsertSound() {
        if (!audioCtx) return;
        [523, 659, 784].forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.value = freq;
            const t = audioCtx.currentTime + i * 0.06;
            gain.gain.setValueAtTime(0.2, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
            osc.start(t);
            osc.stop(t + 0.15);
        });
    }

    // Try to connect on startup (silently fails if bridge not running)
    connectHardwareBridge();

    // ===== FULLSCREEN KIOSK MODE =====
    // On a JAMMA cabinet, Chrome runs with --kiosk --start-fullscreen flags.
    // This code handles fullscreen for development and as a fallback.
    //
    // How to launch on the cabinet (Windows 10 IoT):
    // chrome.exe --kiosk --start-fullscreen --disable-infobars
    //            --disable-session-crashed-bubble --noerrdialogs
    //            --no-first-run file:///C:/BlackIceGame1/game.html

    let isFullscreen = false;

    // Enter fullscreen mode
    function enterFullscreen() {
        const el = document.documentElement;
        if (el.requestFullscreen) el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        else if (el.msRequestFullscreen) el.msRequestFullscreen();
    }

    // Exit fullscreen mode
    function exitFullscreen() {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        else if (document.msExitFullscreen) document.msExitFullscreen();
    }

    // Toggle fullscreen on F11 or first click (for development testing)
    document.addEventListener('fullscreenchange', function() {
        isFullscreen = !!document.fullscreenElement;
        resizeCanvas();
    });

    // Auto-enter fullscreen on first user interaction (cabinet startup)
    let firstInteraction = true;
    document.addEventListener('click', function kioskInit() {
        if (firstInteraction) {
            firstInteraction = false;
            // Only auto-fullscreen if URL has ?kiosk parameter
            if (window.location.search.includes('kiosk')) {
                enterFullscreen();
            }
        }
    }, { once: false });

    // F11 toggles fullscreen for development
    document.addEventListener('keydown', function(e) {
        if (e.code === 'F11') {
            e.preventDefault();
            if (isFullscreen) exitFullscreen();
            else enterFullscreen();
        }
    });

    // ===== THEME SYSTEM =====

    // Symbol index positions must remain consistent:
    // 0=low1, 1=low2, 2=mid1, 3=mid2, 4=jackpot, 5=mid3, 6=high, 7=wild, 8=bonus, 9=blank

    const THEMES = {
        classic: {

            subtitle: 'CLASSIC SLOTS',
            accentColor: '#FFD700',
            frameGlow: '#4400AA',
            frameBorder: '#6622CC',

                { name: 'DIAMOND',    label: 'DIAM',    color: '#00EEFF', bgColor: '#003A40', shape: 'diamond' },
                { name: 'WILD',       label: 'WILD',    color: '#CC44FF', bgColor: '#300050', shape: 'star' },
                { name: 'FIREBALL',   label: 'FIRE',    color: '#FF6600', bgColor: '#4A2000', shape: 'fire' },
                { name: 'BLANK',      label: '',        color: '#333333', bgColor: '#111111', shape: 'none' }
            ]
        },
        dragon: {
            name: 'DRAGON FORTUNE',
            subtitle: 'EASTERN RICHES',
            accentColor: '#FF4444',
            frameGlow: '#880000',
            frameBorder: '#CC2222',
            symbols: [
                { name: 'CHERRY',     label: 'COIN',    color: '#FFD700', bgColor: '#4A3D00', shape: 'circle' },
                { name: 'BAR',        label: 'FAN',     color: '#FF6666', bgColor: '#4A0020', shape: 'fan' },
                { name: 'DOUBLE_BAR', label: 'SCROLL',  color: '#FFaa44', bgColor: '#402800', shape: 'scroll' },
                { name: 'TRIPLE_BAR', label: 'TEMPLE',  color: '#FF3333', bgColor: '#400000', shape: 'temple' },
                { name: 'SEVEN',      label: 'DRAGON',  color: '#FF0000', bgColor: '#4A0000', shape: 'dragon' },
                { name: 'BELL',       label: 'LANTERN', color: '#FF8800', bgColor: '#402200', shape: 'lantern' },
                { name: 'DIAMOND',    label: 'JADE',    color: '#44FF88', bgColor: '#004020', shape: 'jade' },
                { name: 'WILD',       label: 'YIN YANG',color: '#FFFFFF', bgColor: '#222222', shape: 'yinyang' },
                { name: 'FIREBALL',   label: 'PHOENIX', color: '#FF4400', bgColor: '#4A1500', shape: 'phoenix' },
                { name: 'BLANK',      label: '',        color: '#333333', bgColor: '#1A0000', shape: 'none' }
            ]
        },
        ocean: {
            name: 'OCEAN TREASURE',
            subtitle: 'DEEP SEA RICHES',
            accentColor: '#00CCFF',
            frameGlow: '#003366',
            frameBorder: '#0066AA',
            symbols: [
                { name: 'CHERRY',     label: 'SHELL',   color: '#FFaaCC', bgColor: '#402030', shape: 'shell' },
                { name: 'BAR',        label: 'FISH',    color: '#44CCFF', bgColor: '#002040', shape: 'fish' },
                { name: 'DOUBLE_BAR', label: 'CORAL',   color: '#FF6688', bgColor: '#401020', shape: 'coral' },
                { name: 'TRIPLE_BAR', label: 'ANCHOR',  color: '#8888AA', bgColor: '#202030', shape: 'anchor' },
                { name: 'SEVEN',      label: 'TRIDENT', color: '#FFD700', bgColor: '#4A3D00', shape: 'trident' },
                { name: 'BELL',       label: 'PEARL',   color: '#FFFFFF', bgColor: '#303040', shape: 'pearl' },
                { name: 'DIAMOND',    label: 'CHEST',   color: '#FFaa00', bgColor: '#403000', shape: 'chest' },
                { name: 'WILD',       label: 'OCTOPUS', color: '#AA44FF', bgColor: '#200040', shape: 'octopus' },
                { name: 'FIREBALL',   label: 'BUBBLE',  color: '#44DDFF', bgColor: '#003040', shape: 'bubble' },
                { name: 'BLANK',      label: '',        color: '#1a2a3a', bgColor: '#0a1520', shape: 'none' }
            ]
        }
    };

    // Current active theme
    let currentTheme = 'classic';
    let gameScreen = 'menu'; // 'menu' = theme select, 'game' = playing

    // Get the active theme object
    function getTheme() {
        return THEMES[currentTheme];
    }

    // SYMBOLS array points to the active theme's symbols (updated when theme changes)
    let SYMBOLS = THEMES.classic.symbols;

    // Switch to a new theme
    function setTheme(themeName) {
        if (!THEMES[themeName]) return;
        currentTheme = themeName;
        SYMBOLS = THEMES[themeName].symbols;
        gameScreen = 'game';
    }

    // ===== THEME SELECTION MENU =====
    // Shown at startup - player picks which game theme to play

    let menuThemeIndex = 0;
    const THEME_KEYS = Object.keys(THEMES);

    function drawThemeMenu() {
        // Dark background
        ctx.fillStyle = '#050510';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Title
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 72px Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = '#FFD700';
        ctx.shadowBlur = 30;
        ctx.fillText('BLACK ICE GAMING', canvas.width / 2, 120);
        ctx.shadowBlur = 0;

        // Subtitle
        ctx.fillStyle = '#8888AA';
        ctx.font = '28px Arial, sans-serif';
        ctx.fillText('SELECT YOUR GAME', canvas.width / 2, 180);

        // Draw theme cards
        const cardW = 420;
        const cardH = 550;
        const gap = 50;
        const totalW = THEME_KEYS.length * cardW + (THEME_KEYS.length - 1) * gap;
        const startX = (canvas.width - totalW) / 2;

        for (let i = 0; i < THEME_KEYS.length; i++) {
            const theme = THEMES[THEME_KEYS[i]];
            const x = startX + i * (cardW + gap);
            const y = 240;
            const isSelected = (i === menuThemeIndex);

            // Card background
            if (isSelected) {
                ctx.shadowColor = theme.accentColor;
                ctx.shadowBlur = 25;
            }
            ctx.fillStyle = isSelected ? '#1a1a3a' : '#0e0e1e';
            roundRect(x, y, cardW, cardH, 16, true);
            ctx.shadowBlur = 0;

            // Card border
            ctx.strokeStyle = isSelected ? theme.accentColor : '#333355';
            ctx.lineWidth = isSelected ? 3 : 1;
            roundRect(x, y, cardW, cardH, 16, false, true);

            // Theme name
            ctx.fillStyle = isSelected ? theme.accentColor : '#666688';
            ctx.font = 'bold 36px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(theme.name, x + cardW / 2, y + 50);

            // Subtitle
            ctx.fillStyle = isSelected ? '#AAAACC' : '#444466';
            ctx.font = '20px Arial, sans-serif';
            ctx.fillText(theme.subtitle, x + cardW / 2, y + 85);

            // Preview: draw 3 sample symbols
            const symPreview = [0, 4, 7]; // low, jackpot, wild
            for (let s = 0; s < 3; s++) {
                const sym = theme.symbols[symPreview[s]];
                const sx = x + 40 + s * 120;
                const sy = y + 120;
                const sw = 100;
                const sh = 100;

                // Symbol tile
                ctx.fillStyle = sym.bgColor;
                roundRect(sx, sy, sw, sh, 8, true);
                ctx.strokeStyle = sym.color + '66';
                ctx.lineWidth = 1;
                roundRect(sx, sy, sw, sh, 8, false, true);

                // Symbol label
                ctx.fillStyle = sym.color;
                ctx.font = 'bold 16px Arial, sans-serif';
                ctx.fillText(sym.label, sx + sw / 2, sy + sh / 2 + 20);
            }

            // Game number
            ctx.fillStyle = isSelected ? '#FFFFFF' : '#555577';
            ctx.font = 'bold 48px Arial, sans-serif';
            ctx.fillText('GAME ' + (i + 1), x + cardW / 2, y + 320);

            // "PRESS SPIN TO PLAY" on selected
            if (isSelected) {
                const pulse = 0.5 + 0.5 * Math.sin(performance.now() / 400);
                ctx.globalAlpha = pulse;
                ctx.fillStyle = theme.accentColor;
                ctx.font = 'bold 24px Arial, sans-serif';
                ctx.fillText('PRESS SPIN TO PLAY', x + cardW / 2, y + cardH - 40);
                ctx.globalAlpha = 1;
            }
        }

        // Navigation hint
        ctx.fillStyle = '#555566';
        ctx.font = '22px Arial, sans-serif';
        ctx.fillText('\u25C0 LEFT / RIGHT \u25B6 to browse  |  SPIN to select', canvas.width / 2, canvas.height - 50);
    }

    // Handle input on the theme selection menu
    function handleThemeMenuInput(action) {
        if (action === 'LEFT') {
            menuThemeIndex = (menuThemeIndex - 1 + THEME_KEYS.length) % THEME_KEYS.length;
        } else if (action === 'RIGHT') {
            menuThemeIndex = (menuThemeIndex + 1) % THEME_KEYS.length;
        } else if (action === 'SPIN') {
            setTheme(THEME_KEYS[menuThemeIndex]);
        }
    }

    // ===== REEL LAYOUT =====
    // 5 reels, 3 visible rows each - this is what the player sees
    const NUM_REELS = 5;
    const NUM_ROWS = 3;

    // ===== RTP SETTING =====
    // Operator selects one of three Return To Player percentages
    // This controls which reel strips are used
    // 88 = tighter hold (12% profit), 92 = medium, 96 = loose (4% profit)
    let currentRTP = 92; // default to medium - operator changes in settings menu

    // ===== REEL STRIP WEIGHT TABLES =====
    // These are the heart of the game math. Each reel strip is a carefully
    // designed sequence of symbols. The number of times each symbol appears
    // on each reel determines how often winning combinations line up.
    //
    // Symbol index reference:
    // 0=CHERRY, 1=BAR, 2=DOUBLE_BAR, 3=TRIPLE_BAR, 4=SEVEN,
    // 5=BELL, 6=DIAMOND, 7=WILD, 8=FIREBALL, 9=BLANK
    //
    // Design targets (modeled after Fire Link):
    // - Hit frequency: ~32% (one in three spins wins something)
    // - Volatility: Medium (frequent small wins + rare big wins)
    // - CHERRY appears most often (low value, high frequency)
    // - SEVEN is rare (high value)
    // - WILD is scarce but impactful (substitutes for all except SEVEN)
    // - FIREBALL appears enough to trigger Hold and Spin every 80-120 spins
    // - BLANK fills gaps to control hit frequency
    //
    // Each reel has 32 stops. With 5 reels that gives us 32^5 = 33,554,432
    // possible combinations per spin - enough resolution for precise RTP.

    // ----- 88% RTP STRIPS (tighter - house keeps 12%) -----
    // Based on 92% strips. Reel 1 and Reel 3: one WILD(7) replaced with BLANK(9).
    // This removes 2 WILDs from the game = fewer substitute wins = lower RTP.
    // All other symbols identical to 92% strips.
    const STRIPS_88 = [
        // Reel 1 (unchanged from 92%)
        [0,9,1,9,0,9,5,9,2,9,0,8,9,0,9,1,9,5,0,9,3,9,0,9,7,9,0,9,1,9,6,0,9,2,9,0,9,5,0,9,7,9,0,9,4,9,0,9],
        // Reel 2 (unchanged from 92%)
        [9,0,9,1,0,9,5,9,2,0,9,9,0,8,9,1,9,0,5,9,0,3,9,7,9,0,9,6,0,9,1,9,0,9,2,9,0,9,5,0,9,7,9,0,9,1,0,9],
        // Reel 3 (1 WILD at pos 23 -> BLANK, 1 WILD at pos 37 kept)
        [0,9,5,9,1,0,9,2,9,0,9,8,0,9,1,9,0,5,9,3,9,0,9,9,0,9,6,9,1,0,9,0,5,9,2,0,9,7,9,0,9,1,0,9,0,9,5,9],
        // Reel 4 (unchanged from 92%)
        [9,0,1,9,5,0,9,2,9,0,9,0,8,9,1,9,0,9,5,0,9,3,9,7,0,9,0,6,9,1,9,0,9,2,0,9,5,9,0,7,9,0,9,1,9,0,4,9],
        // Reel 5 (unchanged from 92%)
        [0,9,1,9,0,5,9,0,2,9,8,9,0,9,1,0,9,5,9,0,3,9,7,0,9,6,9,0,1,9,0,9,5,0,9,2,9,0,7,9,0,9,1,4,9,0,9,5]
    ];

    // ----- 92% RTP STRIPS (medium - house keeps 8%) -----
    // Symbol composition per reel (48 stops):
    // CHERRY(0):13 BAR(1):4 2BAR(2):3 3BAR(3):1 SEVEN(4):1 BELL(5):3
    // DIAMOND(6):1 WILD(7):2 FIREBALL(8):2 BLANK(9):18
    // Strategy: balanced mix, 2 wilds help create more winning combos
    const STRIPS_92 = [
        // Reel 1
        [0,9,1,9,0,9,5,9,2,9,0,8,9,0,9,1,9,5,0,9,3,9,0,9,7,9,0,9,1,9,6,0,9,2,9,0,9,5,0,9,7,9,0,9,4,9,0,9],
        // Reel 2
        [9,0,9,1,0,9,5,9,2,0,9,9,0,8,9,1,9,0,5,9,0,3,9,7,9,0,9,6,0,9,1,9,0,9,2,9,0,9,5,0,9,7,9,0,9,1,0,9],
        // Reel 3
        [0,9,5,9,1,0,9,2,9,0,9,8,0,9,1,9,0,5,9,3,9,0,9,7,0,9,6,9,1,0,9,0,5,9,2,0,9,7,9,0,9,1,0,9,0,9,5,9],
        // Reel 4
        [9,0,1,9,5,0,9,2,9,0,9,0,8,9,1,9,0,9,5,0,9,3,9,7,0,9,0,6,9,1,9,0,9,2,0,9,5,9,0,7,9,0,9,1,9,0,4,9],
        // Reel 5
        [0,9,1,9,0,5,9,0,2,9,8,9,0,9,1,0,9,5,9,0,3,9,7,0,9,6,9,0,1,9,0,9,5,0,9,2,9,0,7,9,0,9,1,4,9,0,9,5]
    ];

    // ----- 96% RTP STRIPS (loose - house keeps 4%) -----
    // Based on 92% strips. Reels 2 and 4: one BLANK(9) replaced with CHERRY(0).
    // Tiny increase in low-value wins pushes RTP from 92% up toward 96%.
    const STRIPS_96 = [
        // Reel 1 (unchanged from 92%)
        [0,9,1,9,0,9,5,9,2,9,0,8,9,0,9,1,9,5,0,9,3,9,0,9,7,9,0,9,1,9,6,0,9,2,9,0,9,5,0,9,7,9,0,9,4,9,0,9],
        // Reel 2 (unchanged from 92%)
        [9,0,9,1,0,9,5,9,2,0,9,9,0,8,9,1,9,0,5,9,0,3,9,7,9,0,9,6,0,9,1,9,0,9,2,9,0,9,5,0,9,7,9,0,9,1,0,9],
        // Reel 3 (BLANK at pos 38 -> CHERRY - 1 extra cherry on middle reel)
        [0,9,5,9,1,0,9,2,9,0,9,8,0,9,1,9,0,5,9,3,9,0,9,7,0,9,6,9,1,0,9,0,5,9,2,0,9,7,0,0,9,1,0,9,0,9,5,9],
        // Reel 4 (unchanged from 92%)
        [9,0,1,9,5,0,9,2,9,0,9,0,8,9,1,9,0,9,5,0,9,3,9,7,0,9,0,6,9,1,9,0,9,2,0,9,5,9,0,7,9,0,9,1,9,0,4,9],
        // Reel 5 (unchanged from 92%)
        [0,9,1,9,0,5,9,0,2,9,8,9,0,9,1,0,9,5,9,0,3,9,7,0,9,6,9,0,1,9,0,9,5,0,9,2,9,0,7,9,0,9,1,4,9,0,9,5]
    ];

    // ----- 86% RTP STRIPS (tightest - house keeps 14%) -----
    // Based on 88% strips (1 WILD removed from reel 3) plus 1 extra BLANK
    // added to each reel (49 stops instead of 48). The extra blank dilutes
    // all symbol frequencies slightly, bringing RTP down ~2% from 88%.
    const STRIPS_86 = [
        // Reel 1 (= 88% Reel 1, unchanged, 48 stops)
        [0,9,1,9,0,9,5,9,2,9,0,8,9,0,9,1,9,5,0,9,3,9,0,9,7,9,0,9,1,9,6,0,9,2,9,0,9,5,0,9,7,9,0,9,4,9,0,9],
        // Reel 2 (88% Reel 2 but CHERRY at pos 4 -> BLANK - 1 less cherry)
        [9,0,9,1,9,9,5,9,2,0,9,9,0,8,9,1,9,0,5,9,0,3,9,7,9,0,9,6,0,9,1,9,0,9,2,9,0,9,5,0,9,7,9,0,9,1,0,9],
        // Reel 3 (= 88% Reel 3, unchanged - already missing 1 WILD)
        [0,9,5,9,1,0,9,2,9,0,9,8,0,9,1,9,0,5,9,3,9,0,9,9,0,9,6,9,1,0,9,0,5,9,2,0,9,7,9,0,9,1,0,9,0,9,5,9],
        // Reel 4 (= 88% Reel 4, unchanged)
        [9,0,1,9,5,0,9,2,9,0,9,0,8,9,1,9,0,9,5,0,9,3,9,7,0,9,0,6,9,1,9,0,9,2,0,9,5,9,0,7,9,0,9,1,9,0,4,9],
        // Reel 5 (= 88% Reel 5, unchanged)
        [0,9,1,9,0,5,9,0,2,9,8,9,0,9,1,0,9,5,9,0,3,9,7,0,9,6,9,0,1,9,0,9,5,0,9,2,9,0,7,9,0,9,1,4,9,0,9,5]
    ];

    // Get the active reel strips based on current RTP setting
    function getActiveStrips() {
        if (currentRTP === 86) return STRIPS_86;
        if (currentRTP === 88) return STRIPS_88;
        if (currentRTP === 96) return STRIPS_96;
        return STRIPS_92; // default
    }

    // Copy the active strips into the working reel strip arrays
    let reelStrips = [];
    let REEL_STRIP_LENGTH = 32;

    function loadReelStrips() {
        const strips = getActiveStrips();
        reelStrips = [];
        for (let r = 0; r < NUM_REELS; r++) {
            reelStrips[r] = strips[r].slice(); // copy so we don't modify originals
        }
        REEL_STRIP_LENGTH = reelStrips[0].length;
    }
    loadReelStrips(); // load the default strips on startup

    // ===== RTP SWITCHING =====
    // Call this to change the RTP (will take effect on next spin)
    function setRTP(rtp) {
        if (rtp === 88 || rtp === 92 || rtp === 96) {
            currentRTP = rtp;
            loadReelStrips();
        }
    }

    // ===== REEL STATE =====
    // Each reel tracks where it is on the strip and how fast it's moving
    const reels = [];
    for (let r = 0; r < NUM_REELS; r++) {
        reels[r] = {
            position: Math.floor(Math.random() * REEL_STRIP_LENGTH), // current stop position on strip
            offset: 0,          // pixel offset for smooth scrolling (0 = symbol fully aligned)
            speed: 0,           // current scroll speed in pixels per frame
            spinning: false,    // is this reel currently spinning?
            stopping: false,    // is this reel slowing down to stop?
            targetPosition: 0,  // where the reel will land when it stops
            bounceBack: 0,      // for the "overshoot and bounce" effect when stopping
            bouncePhase: 0      // tracks where we are in the bounce animation
        };
    }

    // ===== SPIN CONTROL =====
    // These variables manage the overall spin sequence
    let isSpinning = false;          // true while any reel is still moving
    const SPIN_SPEED = 40;           // max speed when reels are at full spin (pixels per frame)
    const SPIN_UP_TIME = 300;        // milliseconds to reach full speed
    const STOP_DELAY_PER_REEL = 300; // milliseconds between each reel stopping (left to right)

    // Get a symbol from a reel strip at any position (wraps around)
    function getStripSymbol(reelIndex, pos) {
        const len = reelStrips[reelIndex].length;
        return reelStrips[reelIndex][((pos % len) + len) % len];
    }

    // Fill the visible grid from reel strip positions (used when reels are stopped)
    const reelGrid = [];
    function updateReelGrid() {
        for (let r = 0; r < NUM_REELS; r++) {
            reelGrid[r] = [];
            for (let row = 0; row < NUM_ROWS; row++) {
                reelGrid[r][row] = getStripSymbol(r, reels[r].position + row);
            }
        }
    }
    updateReelGrid();

    // ===== START SPIN =====
    // Called when player presses the spin button
    function startSpin() {
        // During Hold and Spin bonus: pressing spin triggers a respin instead
        if (gameMode === 'HOLD_AND_SPIN') {
            if (bonusPhase === 'ACTIVE') {
                startBonusRespin();
            }
            return; // block normal spins during bonus
        }

        if (isSpinning) return; // can't spin while already spinning
        if (credits < totalBet) return; // not enough credits to spin
        isSpinning = true;

        // Deduct the bet from the player's balance
        credits -= totalBet;
        lastWin = 0;

        // Track lifetime stats for operator dashboard
        totalSpinsPlayed++;
        totalWageredLifetime += totalBet;

        // Feed a small portion of the bet into each jackpot pool
        feedJackpots();

        // Disable bill acceptor during spin (industry standard)
        disableBillAcceptor();

        // Initialize audio on first spin (browser requires user gesture)
        initAudio();
        playSpinStartSound();

        // Clear any win display and nudge state from the previous spin
        activeWins = [];
        showingWins = false;
        winDisplayIndex = -1;
        nudgeAvailable = false;
        nudgeUsed = false;
        switchAvailable = false;
        switchUsed = false;
        switchSelected = null;

        // Randomize new target positions for each reel (where it will land)
        for (let r = 0; r < NUM_REELS; r++) {
            reels[r].spinning = true;
            reels[r].stopping = false;
            reels[r].speed = 0;
            reels[r].bounceBack = 0;
            reels[r].bouncePhase = 0;
            // Pick a random landing spot at least 2 full rotations away
            reels[r].targetPosition = Math.floor(Math.random() * REEL_STRIP_LENGTH);
        }

        // Ramp up speed over SPIN_UP_TIME, then schedule stops left to right
        const spinStartTime = performance.now();

        function rampUp() {
            const elapsed = performance.now() - spinStartTime;
            const progress = Math.min(elapsed / SPIN_UP_TIME, 1);
            // Ease-out curve for natural acceleration
            const easedProgress = 1 - Math.pow(1 - progress, 2);

            for (let r = 0; r < NUM_REELS; r++) {
                if (reels[r].spinning && !reels[r].stopping) {
                    reels[r].speed = SPIN_SPEED * easedProgress;
                }
            }

            if (progress < 1) {
                requestAnimationFrame(rampUp);
            } else {
                // Full speed reached - schedule each reel to stop one by one
                scheduleStops();
            }
        }
        requestAnimationFrame(rampUp);
    }

    // Schedule reels to stop one at a time, left to right
    function scheduleStops() {
        for (let r = 0; r < NUM_REELS; r++) {
            setTimeout(() => {
                reels[r].stopping = true;
            }, r * STOP_DELAY_PER_REEL);
        }
    }

    // ===== LAYOUT CONSTANTS =====
    // All measurements in pixels on the 1920x1080 canvas

    // Machine frame
    const MACHINE_X = 210;          // left edge of the machine body
    const MACHINE_Y = 40;           // top edge
    const MACHINE_W = 1500;         // width of the machine body
    const MACHINE_H = 1000;         // height of the machine body

    // Reel window - the area where symbols are visible
    const REEL_AREA_X = 310;        // left edge of the reel window
    const REEL_AREA_Y = 230;        // top edge of the reel window (below jackpot bar)
    const REEL_W = 220;             // width of each reel column
    const REEL_H = 480;             // total height of the reel window
    const REEL_GAP = 16;            // gap between reels
    const SYMBOL_H = 150;           // height of each symbol cell
    const SYMBOL_PAD = 8;           // padding inside each symbol cell

    // ===== DRAWING FUNCTIONS =====

    // Draw the slot machine cabinet frame
    function drawMachineFrame() {
        // Outer cabinet body - dark metallic
        ctx.fillStyle = '#1a1a2e';
        roundRect(MACHINE_X, MACHINE_Y, MACHINE_W, MACHINE_H, 20, true);

        // Inner bevel - gives depth
        ctx.fillStyle = '#12122a';
        roundRect(MACHINE_X + 8, MACHINE_Y + 8, MACHINE_W - 16, MACHINE_H - 16, 16, true);

        // Top banner area - where the game name goes
        const bannerGrad = ctx.createLinearGradient(0, MACHINE_Y + 20, 0, MACHINE_Y + 160);
        bannerGrad.addColorStop(0, '#1a0a30');
        bannerGrad.addColorStop(0.5, '#2a1050');
        bannerGrad.addColorStop(1, '#1a0a30');
        ctx.fillStyle = bannerGrad;
        roundRect(MACHINE_X + 30, MACHINE_Y + 20, MACHINE_W - 60, 140, 12, true);

        // Game title
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 64px Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = '#FFD700';
        ctx.shadowBlur = 20;
        ctx.fillText(getTheme().name, MACHINE_X + MACHINE_W / 2, MACHINE_Y + 90);
        ctx.shadowBlur = 0;

        // Reel window border - glowing frame around the reels
        const totalReelW = (REEL_W * NUM_REELS) + (REEL_GAP * (NUM_REELS - 1));
        const borderPad = 20;
        const borderX = REEL_AREA_X - borderPad;
        const borderY = REEL_AREA_Y - borderPad;
        const borderW = totalReelW + borderPad * 2;
        const borderH = REEL_H + borderPad * 2;

        // Outer glow
        ctx.shadowColor = getTheme().frameGlow;
        ctx.shadowBlur = 30;
        ctx.strokeStyle = getTheme().frameBorder;
        ctx.lineWidth = 4;
        roundRect(borderX, borderY, borderW, borderH, 10, false, true);
        ctx.shadowBlur = 0;

        // Inner border
        ctx.strokeStyle = '#8844EE';
        ctx.lineWidth = 2;
        roundRect(borderX + 4, borderY + 4, borderW - 8, borderH - 8, 8, false, true);

        // Dark background behind reels
        ctx.fillStyle = '#050510';
        roundRect(borderX + 6, borderY + 6, borderW - 12, borderH - 12, 6, true);
    }

    // ===== THEME PARTICLE EFFECTS =====
    // Each theme gets unique ambient particles around the reel frame
    // Classic: electric sparks, Dragon: flame embers, Ocean: bubbles
    let particles = [];
    const MAX_PARTICLES = 30;

    function spawnParticle() {
        if (particles.length >= MAX_PARTICLES) return;
        const theme = currentTheme;
        const totalReelW = (REEL_W * NUM_REELS) + (REEL_GAP * (NUM_REELS - 1));
        const frameX = REEL_AREA_X - 20;
        const frameY = REEL_AREA_Y - 20;
        const frameW = totalReelW + 40;
        const frameH = REEL_H + 40;

        // Random position along the frame border
        const side = Math.random();
        let x, y;
        if (side < 0.25) { x = frameX + Math.random() * frameW; y = frameY; }
        else if (side < 0.5) { x = frameX + Math.random() * frameW; y = frameY + frameH; }
        else if (side < 0.75) { x = frameX; y = frameY + Math.random() * frameH; }
        else { x = frameX + frameW; y = frameY + Math.random() * frameH; }

        let p = { x: x, y: y, life: 1.0, speed: 0.005 + Math.random() * 0.01 };

        if (theme === 'classic') {
            // Electric sparks - fast, bright purple
            p.color = '#8844EE';
            p.size = 2 + Math.random() * 3;
            p.vx = (Math.random() - 0.5) * 2;
            p.vy = (Math.random() - 0.5) * 2;
            p.speed = 0.02;
        } else if (theme === 'dragon') {
            // Flame embers - rise upward, red/orange
            p.color = Math.random() > 0.5 ? '#FF4400' : '#FFAA00';
            p.size = 2 + Math.random() * 4;
            p.vx = (Math.random() - 0.5) * 0.5;
            p.vy = -1 - Math.random() * 2;
            p.speed = 0.008;
        } else if (theme === 'ocean') {
            // Bubbles - rise upward, blue/cyan
            p.color = Math.random() > 0.5 ? '#44DDFF' : '#0088CC';
            p.size = 3 + Math.random() * 5;
            p.vx = (Math.random() - 0.5) * 0.3;
            p.vy = -0.5 - Math.random() * 1;
            p.speed = 0.005;
        }

        particles.push(p);
    }

    function updateAndDrawParticles() {
        // Spawn new particles
        if (Math.random() < 0.3) spawnParticle();

        ctx.save();
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= p.speed;

            if (p.life <= 0) {
                particles.splice(i, 1);
                continue;
            }

            ctx.globalAlpha = p.life * 0.6;
            ctx.fillStyle = p.color;

            if (currentTheme === 'ocean') {
                // Draw as circle (bubble)
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // Draw as small rectangle (spark/ember)
                ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size * p.life, p.size * p.life);
            }
        }
        ctx.restore();
    }

    // Draw a single symbol in its cell
    function drawSymbol(symbolIndex, x, y, w, h) {
        const sym = SYMBOLS[symbolIndex];

        // Symbol background tile
        const tileGrad = ctx.createLinearGradient(x, y, x, y + h);
        tileGrad.addColorStop(0, sym.bgColor);
        tileGrad.addColorStop(0.5, lightenColor(sym.bgColor, 30));
        tileGrad.addColorStop(1, sym.bgColor);
        ctx.fillStyle = tileGrad;
        roundRect(x + SYMBOL_PAD, y + SYMBOL_PAD, w - SYMBOL_PAD * 2, h - SYMBOL_PAD * 2, 8, true);

        // Symbol border
        ctx.strokeStyle = sym.color + '66';
        ctx.lineWidth = 2;
        roundRect(x + SYMBOL_PAD, y + SYMBOL_PAD, w - SYMBOL_PAD * 2, h - SYMBOL_PAD * 2, 8, false, true);

        // Skip drawing text for BLANK symbols
        if (sym.name === 'BLANK') return;

        // Draw the symbol icon shape
        const cx = x + w / 2;
        const cy = y + h / 2 - 10;
        drawSymbolIcon(sym, cx, cy);

        // Symbol label text below the icon
        ctx.fillStyle = sym.color;
        ctx.font = 'bold 18px Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(sym.label, cx, cy + 40);
    }

    // Draw a simple icon shape for each symbol type
    function drawSymbolIcon(sym, cx, cy) {
        ctx.save();
        ctx.shadowColor = sym.color;
        ctx.shadowBlur = 12;

        switch (sym.name) {
            case 'CHERRY':
                // Two circles with stems
                ctx.fillStyle = sym.color;
                ctx.beginPath();
                ctx.arc(cx - 14, cy + 8, 16, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cx + 14, cy + 8, 16, 0, Math.PI * 2);
                ctx.fill();
                // Stems
                ctx.strokeStyle = '#44AA22';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(cx - 14, cy - 8);
                ctx.quadraticCurveTo(cx, cy - 30, cx + 14, cy - 8);
                ctx.stroke();
                break;

            case 'BAR':
            case 'DOUBLE_BAR':
            case 'TRIPLE_BAR':
                // Horizontal bar(s)
                ctx.fillStyle = sym.color;
                const barCount = sym.name === 'BAR' ? 1 : sym.name === 'DOUBLE_BAR' ? 2 : 3;
                const barH = 12;
                const barW = 60;
                const totalH = barCount * barH + (barCount - 1) * 6;
                const startY = cy - totalH / 2;
                for (let i = 0; i < barCount; i++) {
                    const by = startY + i * (barH + 6);
                    roundRect(cx - barW / 2, by, barW, barH, 3, true);
                }
                break;

            case 'SEVEN':
                // Big bold 7
                ctx.fillStyle = sym.color;
                ctx.font = 'bold 72px Arial, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('7', cx, cy);
                break;

            case 'BELL':
                // Bell shape
                ctx.fillStyle = sym.color;
                ctx.beginPath();
                ctx.moveTo(cx - 24, cy + 12);
                ctx.quadraticCurveTo(cx - 24, cy - 24, cx, cy - 28);
                ctx.quadraticCurveTo(cx + 24, cy - 24, cx + 24, cy + 12);
                ctx.lineTo(cx - 24, cy + 12);
                ctx.fill();
                // Clapper
                ctx.beginPath();
                ctx.arc(cx, cy + 18, 6, 0, Math.PI * 2);
                ctx.fill();
                break;

            case 'DIAMOND':
                // Diamond shape
                ctx.fillStyle = sym.color;
                ctx.beginPath();
                ctx.moveTo(cx, cy - 28);
                ctx.lineTo(cx + 24, cy);
                ctx.lineTo(cx, cy + 28);
                ctx.lineTo(cx - 24, cy);
                ctx.closePath();
                ctx.fill();
                break;

            case 'WILD':
                // Star burst for WILD
                ctx.fillStyle = sym.color;
                ctx.beginPath();
                for (let i = 0; i < 10; i++) {
                    const angle = (i * Math.PI * 2) / 10 - Math.PI / 2;
                    const radius = i % 2 === 0 ? 28 : 14;
                    const px = cx + Math.cos(angle) * radius;
                    const py = cy + Math.sin(angle) * radius;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fill();
                break;

            case 'FIREBALL':
                // Flame shape
                ctx.fillStyle = sym.color;
                ctx.beginPath();
                ctx.moveTo(cx, cy - 30);
                ctx.quadraticCurveTo(cx + 20, cy - 10, cx + 16, cy + 8);
                ctx.quadraticCurveTo(cx + 10, cy + 0, cx + 8, cy + 16);
                ctx.quadraticCurveTo(cx, cy + 24, cx - 8, cy + 16);
                ctx.quadraticCurveTo(cx - 10, cy + 0, cx - 16, cy + 8);
                ctx.quadraticCurveTo(cx - 20, cy - 10, cx, cy - 30);
                ctx.fill();
                // Inner flame
                ctx.fillStyle = '#FFDD00';
                ctx.beginPath();
                ctx.moveTo(cx, cy - 14);
                ctx.quadraticCurveTo(cx + 10, cy, cx + 6, cy + 10);
                ctx.quadraticCurveTo(cx, cy + 16, cx - 6, cy + 10);
                ctx.quadraticCurveTo(cx - 10, cy, cx, cy - 14);
                ctx.fill();
                break;
        }

        ctx.restore();
    }

    // Draw all 5 reels with their 3 visible symbols each
    // When spinning, symbols scroll vertically with a pixel offset
    function drawReels() {
        // We need to clip the reel area so symbols don't draw outside the window
        const totalReelW = (REEL_W * NUM_REELS) + (REEL_GAP * (NUM_REELS - 1));
        const clipX = REEL_AREA_X - 4;
        const clipY = REEL_AREA_Y;
        const clipW = totalReelW + 8;
        const clipH = REEL_H;

        ctx.save();
        // Set up clipping region so symbols stay inside the reel window
        ctx.beginPath();
        ctx.rect(clipX, clipY, clipW, clipH);
        ctx.clip();

        for (let r = 0; r < NUM_REELS; r++) {
            const reelX = REEL_AREA_X + r * (REEL_W + REEL_GAP);
            const reel = reels[r];

            // Reel column background
            ctx.fillStyle = '#0a0a1a';
            roundRect(reelX, REEL_AREA_Y, REEL_W, REEL_H, 4, true);

            // Calculate the vertical start position for symbols
            // offset shifts symbols up; when offset reaches SYMBOL_H, we advance position
            const baseY = REEL_AREA_Y + (REEL_H - NUM_ROWS * SYMBOL_H) / 2;

            // Draw one extra symbol above and below for smooth scrolling
            for (let row = -1; row <= NUM_ROWS; row++) {
                const symY = baseY + row * SYMBOL_H - reel.offset + reel.bounceBack + getNudgeOffset(r);
                // Only draw if the symbol would be at least partially visible
                if (symY + SYMBOL_H > REEL_AREA_Y - SYMBOL_H && symY < REEL_AREA_Y + REEL_H + SYMBOL_H) {
                    const symbolIdx = getStripSymbol(r, reel.position + row);
                    // Apply Symbol Switch offset if this symbol is being swapped
                    const swOff = getSwitchOffset(r, row);
                    drawSymbol(symbolIdx, reelX + swOff.x, symY + swOff.y, REEL_W, SYMBOL_H);
                }
            }

            // Subtle reel divider lines
            if (r < NUM_REELS - 1) {
                ctx.strokeStyle = '#222244';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(reelX + REEL_W + REEL_GAP / 2, REEL_AREA_Y + 10);
                ctx.lineTo(reelX + REEL_W + REEL_GAP / 2, REEL_AREA_Y + REEL_H - 10);
                ctx.stroke();
            }
        }

        ctx.restore(); // remove clipping

        // Row divider lines (drawn outside clip so they're always crisp)
        for (let r = 0; r < NUM_REELS; r++) {
            const reelX = REEL_AREA_X + r * (REEL_W + REEL_GAP);
            for (let row = 1; row < NUM_ROWS; row++) {
                const lineY = REEL_AREA_Y + row * SYMBOL_H + (REEL_H - NUM_ROWS * SYMBOL_H) / 2;
                ctx.strokeStyle = '#333355';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(reelX + 10, lineY);
                ctx.lineTo(reelX + REEL_W - 10, lineY);
                ctx.stroke();
            }
        }
    }

    // Draw the payline indicator arrows on the left side
    function drawPaylineMarkers() {
        const markerX = REEL_AREA_X - 40;
        const rowLabels = ['TOP', 'MID', 'BOT'];
        const rowColors = ['#FF4444', '#FFD700', '#44FF44'];

        for (let row = 0; row < NUM_ROWS; row++) {
            const symY = REEL_AREA_Y + row * SYMBOL_H + (REEL_H - NUM_ROWS * SYMBOL_H) / 2;
            const cy = symY + SYMBOL_H / 2;

            // Arrow triangle
            ctx.fillStyle = rowColors[row];
            ctx.beginPath();
            ctx.moveTo(markerX, cy - 12);
            ctx.lineTo(markerX + 18, cy);
            ctx.lineTo(markerX, cy + 12);
            ctx.closePath();
            ctx.fill();

            // Mirror arrow on right side
            const totalReelW = (REEL_W * NUM_REELS) + (REEL_GAP * (NUM_REELS - 1));
            const rightX = REEL_AREA_X + totalReelW + 22;
            ctx.beginPath();
            ctx.moveTo(rightX + 18, cy - 12);
            ctx.lineTo(rightX, cy);
            ctx.lineTo(rightX + 18, cy + 12);
            ctx.closePath();
            ctx.fill();
        }
    }

    // Draw the bottom panel with credits and bet info
    function drawBottomPanel() {
        const panelY = REEL_AREA_Y + REEL_H + 50;
        const panelH = 120;

        // Panel background
        const panelGrad = ctx.createLinearGradient(0, panelY, 0, panelY + panelH);
        panelGrad.addColorStop(0, '#1a0a30');
        panelGrad.addColorStop(1, '#0a0515');
        ctx.fillStyle = panelGrad;
        roundRect(MACHINE_X + 30, panelY, MACHINE_W - 60, panelH, 10, true);

        // Panel border
        ctx.strokeStyle = '#6622CC44';
        ctx.lineWidth = 2;
        roundRect(MACHINE_X + 30, panelY, MACHINE_W - 60, panelH, 10, false, true);

        // Credit display - shows real player balance
        ctx.fillStyle = '#AAAACC';
        ctx.font = '22px Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText('CREDITS', MACHINE_X + 250, panelY + 15);
        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 42px Arial, sans-serif';
        ctx.fillText(formatCredits(credits), MACHINE_X + 250, panelY + 48);

        // Bet display - shows current total bet
        ctx.fillStyle = '#AAAACC';
        ctx.font = '22px Arial, sans-serif';
        ctx.fillText('BET', MACHINE_X + MACHINE_W / 2, panelY + 15);
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 42px Arial, sans-serif';
        ctx.fillText(formatCredits(totalBet), MACHINE_X + MACHINE_W / 2, panelY + 48);

        // Win display - shows bonus total during Hold and Spin, or last spin win
        const displayWin = gameMode === 'HOLD_AND_SPIN' ? bonusTotalWin : lastWin;
        const winLabel = gameMode === 'HOLD_AND_SPIN' ? 'BONUS' : 'WIN';
        ctx.fillStyle = '#AAAACC';
        ctx.font = '22px Arial, sans-serif';
        ctx.fillText(winLabel, MACHINE_X + MACHINE_W - 250, panelY + 15);
        if (displayWin > 0) {
            ctx.shadowColor = gameMode === 'HOLD_AND_SPIN' ? '#FF6600' : '#44FF44';
            ctx.shadowBlur = 15;
        }
        ctx.fillStyle = displayWin > 0 ? (gameMode === 'HOLD_AND_SPIN' ? '#FF8800' : '#44FF44') : '#666688';
        ctx.font = 'bold 42px Arial, sans-serif';
        ctx.fillText(formatCredits(displayWin), MACHINE_X + MACHINE_W - 250, panelY + 48);
        ctx.shadowBlur = 0;
    }

    // Draw the jackpot displays at the top - shows LIVE progressive values
    function drawJackpotBar() {
        // Display order: MEGA (left) to MINI (right) - biggest first
        const jackpotOrder = ['MEGA', 'MAJOR', 'MINOR', 'MINI'];

        const barY = MACHINE_Y + 168;
        const barW = (MACHINE_W - 100) / 4;

        for (let i = 0; i < jackpotOrder.length; i++) {
            const name = jackpotOrder[i];
            const pool = jackpotPools[name];
            const jp = JACKPOT_VALUES.find(j => j.name === name);
            const bx = MACHINE_X + 40 + i * barW;

            // Jackpot box background
            ctx.fillStyle = '#0a0a20';
            roundRect(bx + 4, barY, barW - 8, 28, 6, true);

            // Jackpot box border glow
            ctx.strokeStyle = jp.color + '88';
            ctx.lineWidth = 1;
            roundRect(bx + 4, barY, barW - 8, 28, 6, false, true);

            // Jackpot label and LIVE amount from the pool
            ctx.fillStyle = jp.color;
            ctx.font = 'bold 16px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(name + '  $' + formatCredits(Math.floor(pool.current)), bx + barW / 2, barY + 14);
        }
    }

    // ===== PAYTABLE =====
    // How much each symbol pays for 3, 4, or 5 of a kind on a payline
    // Values are multipliers of the bet-per-line
    // Modeled after Fire Link by Light & Wonder
    //
    // Example: If bet is 10 credits across 10 lines (1 per line),
    // and you hit 3 CHERRY on a line, you win 1 x 5 = 5 credits
    const PAYTABLE = {
        // Symbol name:    [3-of-a-kind, 4-of-a-kind, 5-of-a-kind]
        // Values are credits won per line (betPerLine = 1)
        // Tuned with 200K spin simulation to hit RTP targets
        'CHERRY':          [5,    12,    45],      // low value - hits often
        'BAR':             [9,    28,    90],      // low-mid
        'DOUBLE_BAR':      [14,   45,    180],     // mid
        'TRIPLE_BAR':      [23,   70,    275],     // mid-high
        'BELL':            [23,   70,    275],     // mid-high (same as triple bar)
        'DIAMOND':         [45,   140,   460],     // high value
        'SEVEN':           [90,   450,   1800],    // jackpot symbol - very rare, huge payout
        'WILD':            [9,    45,    180]      // WILD line (all wilds) pays like DOUBLE_BAR
        // FIREBALL and BLANK are not line-pay symbols
    };

    // ===== CREDIT SYSTEM =====
    // Track the player's balance, current bet, and last win
    let credits = 1000;      // starting balance
    let betPerLine = 1;      // credits wagered on each payline
    let totalBet = 10;       // betPerLine x 10 paylines (deducted each spin)
    let lastWin = 0;         // total win from the most recent spin

    // Format a number with commas for display (1000 -> "1,000")
    function formatCredits(num) {
        return num.toLocaleString();
    }

    // ===== HOLD AND SPIN BONUS SYSTEM =====
    // The signature feature - modeled after Fire Link by Light & Wonder
    // When triggered, FIREBALL symbols lock on the grid with credit values.
    // Player gets 3 free respins to collect more fireballs.
    // Every new fireball resets the counter back to 3.
    // When 3 respins pass with no new fireball, bonus ends and all
    // fireball credit values are totaled and awarded to the player.

    // --- Bonus game state ---
    let gameMode = 'NORMAL';          // NORMAL = regular play, HOLD_AND_SPIN = bonus active
    let bonusGrid = [];               // 5x3 grid: null (empty cell) or { value, label, color, isJackpot }
    let bonusRespins = 3;             // remaining respins (resets to 3 when new fireball lands)
    let bonusTotalWin = 0;            // running sum of all fireball credit values
    let bonusPhase = 'IDLE';          // IDLE, TRIGGER, ACTIVE, SPINNING, AWARD
    let bonusAnimTimer = 0;           // frame counter for current animation phase
    let bonusNewLands = [];           // [{reel, row}] - positions that just got a fireball (for flash)
    let spinsSinceBonus = 0;          // counts normal spins since last bonus ended
    let nextBonusTrigger = 0;         // how many spins until next bonus (80-120)

    // Animation durations in frames (60 frames = 1 second)
    const BONUS_TRIGGER_DURATION = 120;  // 2 seconds for "HOLD & SPIN!" announcement
    const BONUS_RESPIN_DURATION = 48;    // 0.8 seconds for respin shimmer animation
    const BONUS_AWARD_DURATION = 180;    // 3 seconds for award count-up

    // --- Trigger timing ---
    // Roll a random number between 80 and 120 for when the next bonus triggers
    function rollNextBonusTrigger() {
        nextBonusTrigger = 80 + Math.floor(Math.random() * 41);
    }
    rollNextBonusTrigger(); // set the first trigger target

    // --- Fireball credit value tables ---
    // Each fireball shows a credit value when it locks on the grid
    // Values are multiplied by the total bet (so higher bets = bigger values)
    const FIREBALL_VALUE_TABLE = [
        { mult: 1,   weight: 30 },   // very common (1x bet = 10 credits at bet 10)
        { mult: 1.5, weight: 25 },   // common (15 credits)
        { mult: 2,   weight: 20 },   // common (20 credits)
        { mult: 3,   weight: 12 },   // uncommon (30 credits)
        { mult: 5,   weight: 8 },    // uncommon (50 credits)
        { mult: 10,  weight: 3 },    // rare (100 credits)
        { mult: 20,  weight: 1.5 },  // very rare (200 credits)
    ];

    // Jackpot tiers (matches the jackpot bar at the top of the machine)
    const JACKPOT_VALUES = [
        { name: 'MINI',  value: 50,    color: '#44FF44', weight: 60 },  // hits most often
        { name: 'MINOR', value: 200,   color: '#44BBFF', weight: 25 },
        { name: 'MAJOR', value: 1000,  color: '#FFD700', weight: 12 },
        { name: 'MEGA',  value: 10000, color: '#FF2222', weight: 3 },   // ultra rare
    ];

    // ===== LIVE JACKPOT SYSTEM =====
    // Jackpots are progressive - a small % of each bet feeds into each pool.
    // When a jackpot fireball hits during Hold and Spin, the player wins
    // the current live value, then it resets to the seed amount.
    //
    // Seed = starting value after a jackpot is won
    // Feed = percentage of each bet that goes into this jackpot pool
    const jackpotPools = {
        'MINI':  { current: 50,    seed: 50,    feed: 0.005 },  // 0.5% of bet → MINI
        'MINOR': { current: 200,   seed: 200,   feed: 0.003 },  // 0.3% of bet → MINOR
        'MAJOR': { current: 1000,  seed: 1000,  feed: 0.001 },  // 0.1% of bet → MAJOR
        'MEGA':  { current: 10000, seed: 10000, feed: 0.001 },  // 0.1% of bet → MEGA
    };

    // Feed all jackpot pools from the current bet (called each normal spin)
    function feedJackpots() {
        for (const name in jackpotPools) {
            const pool = jackpotPools[name];
            // Add a small fraction of the bet to each pool
            // Random variation so the numbers tick up at different rates
            pool.current += totalBet * pool.feed * (0.8 + Math.random() * 0.4);
            // Round to nearest cent for clean display
            pool.current = Math.round(pool.current * 100) / 100;
        }
        // If connected to progressive network, send feed to shared pool
        if (typeof sendProgressiveFeed === 'function') sendProgressiveFeed();
    }

    // Award a jackpot and reset it to the seed value
    function awardJackpot(name) {
        const pool = jackpotPools[name];
        const amount = Math.floor(pool.current);
        pool.current = pool.seed; // reset to starting value
        // If connected to progressive network, notify other cabinets
        if (typeof sendProgressiveAward === 'function') sendProgressiveAward(name, amount);
        // Record in SAS meters
        if (typeof sasRecordJackpot === 'function') sasRecordJackpot(name, amount);
        return amount;
    }

    const JACKPOT_CHANCE = 0.03;           // 3% chance each fireball is a jackpot
    const BONUS_FIREBALL_CHANCE = 0.20;    // 20% chance per empty cell per respin
    const BONUS_INITIAL_FIREBALLS = 6;     // how many fireballs appear when bonus triggers

    // Pick a random credit value for a fireball
    function randomFireballValue() {
        // Small chance to be a jackpot instead of regular credits
        if (Math.random() < JACKPOT_CHANCE) {
            return randomJackpotValue();
        }

        // Weighted random selection from the value table
        const totalWeight = FIREBALL_VALUE_TABLE.reduce((sum, v) => sum + v.weight, 0);
        let roll = Math.random() * totalWeight;
        for (const entry of FIREBALL_VALUE_TABLE) {
            roll -= entry.weight;
            if (roll <= 0) {
                const creditValue = Math.round(entry.mult * totalBet);
                return { value: creditValue, label: formatCredits(creditValue), color: '#FFFFFF', isJackpot: false };
            }
        }
        return { value: totalBet, label: formatCredits(totalBet), color: '#FFFFFF', isJackpot: false };
    }

    // Pick a random jackpot level (weighted - MINI hits most often)
    // Awards the LIVE jackpot amount from the pool, then resets it
    function randomJackpotValue() {
        const totalWeight = JACKPOT_VALUES.reduce((sum, j) => sum + j.weight, 0);
        let roll = Math.random() * totalWeight;
        for (const jp of JACKPOT_VALUES) {
            roll -= jp.weight;
            if (roll <= 0) {
                const amount = awardJackpot(jp.name); // grab live value and reset pool
                return { value: amount, label: jp.name, color: jp.color, isJackpot: true, jackpotName: jp.name };
            }
        }
        const amount = awardJackpot('MINI');
        return { value: amount, label: 'MINI', color: '#44FF44', isJackpot: true, jackpotName: 'MINI' };
    }

    // Create an empty 5x3 bonus grid (all cells null)
    function initBonusGrid() {
        bonusGrid = [];
        for (let r = 0; r < NUM_REELS; r++) {
            bonusGrid[r] = [];
            for (let row = 0; row < NUM_ROWS; row++) {
                bonusGrid[r][row] = null;
            }
        }
    }

    // Check if the bonus should trigger after a normal spin finishes
    function checkBonusTrigger() {
        if (gameMode !== 'NORMAL') return;
        spinsSinceBonus++;

        if (spinsSinceBonus >= nextBonusTrigger) {
            triggerBonus();
        }
    }

    // Start the Hold and Spin bonus round
    function triggerBonus() {
        gameMode = 'HOLD_AND_SPIN';
        if (typeof sasRecordBonus === 'function') sasRecordBonus();
        bonusPhase = 'TRIGGER';
        bonusAnimTimer = 0;
        bonusRespins = 3;
        bonusTotalWin = 0;
        bonusNewLands = [];

        // Clear any win display from the triggering spin
        activeWins = [];
        showingWins = false;
        winDisplayIndex = -1;

        initBonusGrid();

        // Build a list of all 15 grid positions, shuffle, pick first 6
        const positions = [];
        for (let r = 0; r < NUM_REELS; r++) {
            for (let row = 0; row < NUM_ROWS; row++) {
                positions.push({ reel: r, row: row });
            }
        }
        // Fisher-Yates shuffle for true randomness
        for (let i = positions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [positions[i], positions[j]] = [positions[j], positions[i]];
        }

        // Place the initial fireballs
        for (let i = 0; i < BONUS_INITIAL_FIREBALLS; i++) {
            const pos = positions[i];
            const fbValue = randomFireballValue();
            bonusGrid[pos.reel][pos.row] = fbValue;
            bonusTotalWin += fbValue.value;
            bonusNewLands.push(pos);
        }

        playBonusTriggerSound();
    }

    // Start a bonus respin (called when player presses RESPIN button)
    function startBonusRespin() {
        if (bonusPhase !== 'ACTIVE') return;
        bonusPhase = 'SPINNING';
        bonusAnimTimer = 0;
        bonusNewLands = [];  // clear previous flash markers
        playSpinStartSound();
    }

    // Resolve the bonus respin - determine which empty cells get new fireballs
    function resolveBonusRespin() {
        let gotNewFireball = false;

        // Each empty cell independently rolls for a fireball
        for (let r = 0; r < NUM_REELS; r++) {
            for (let row = 0; row < NUM_ROWS; row++) {
                if (bonusGrid[r][row] === null) {
                    if (Math.random() < BONUS_FIREBALL_CHANCE) {
                        const fbValue = randomFireballValue();
                        bonusGrid[r][row] = fbValue;
                        bonusTotalWin += fbValue.value;
                        bonusNewLands.push({ reel: r, row: row });
                        gotNewFireball = true;
                    }
                }
            }
        }

        if (gotNewFireball) {
            // Any new fireball resets the counter back to 3
            bonusRespins = 3;
            playBonusLandSound();
        } else {
            bonusRespins--;
        }

        // Check if grid is completely full (Grand Prize!)
        let allFull = true;
        for (let r = 0; r < NUM_REELS; r++) {
            for (let row = 0; row < NUM_ROWS; row++) {
                if (bonusGrid[r][row] === null) { allFull = false; break; }
            }
            if (!allFull) break;
        }
        if (allFull) {
            // Full grid = award the live MEGA jackpot on top of all collected values
            bonusTotalWin += awardJackpot('MEGA');
        }

        // End bonus if out of respins or grid is full
        if (bonusRespins <= 0 || allFull) {
            bonusPhase = 'AWARD';
            bonusAnimTimer = 0;
            playWinSound();
        } else {
            bonusPhase = 'ACTIVE';
            bonusAnimTimer = 0;
        }
    }

    // Update the bonus state machine each frame
    function updateBonus() {
        if (gameMode !== 'HOLD_AND_SPIN') return;

        bonusAnimTimer++;

        // Transition out of TRIGGER phase after the announcement animation
        if (bonusPhase === 'TRIGGER' && bonusAnimTimer >= BONUS_TRIGGER_DURATION) {
            bonusPhase = 'ACTIVE';
            bonusAnimTimer = 0;
            bonusNewLands = [];
        }

        // Transition out of SPINNING phase after respin animation
        if (bonusPhase === 'SPINNING' && bonusAnimTimer >= BONUS_RESPIN_DURATION) {
            resolveBonusRespin();
        }

        // Transition out of AWARD phase after count-up animation
        if (bonusPhase === 'AWARD' && bonusAnimTimer >= BONUS_AWARD_DURATION) {
            credits += bonusTotalWin;
            lastWin = bonusTotalWin;
            gameMode = 'NORMAL';
            bonusPhase = 'IDLE';
            spinsSinceBonus = 0;
            rollNextBonusTrigger();
        }
    }

    // --- Bonus Drawing Functions ---

    // Draw a single locked fireball cell with its credit value
    function drawBonusFireball(cell, x, y, w, h, reelIdx, rowIdx) {
        const isNew = bonusNewLands.some(p => p.reel === reelIdx && p.row === rowIdx);
        const pulse = 0.8 + 0.2 * Math.sin(performance.now() / 200 + reelIdx + rowIdx);

        ctx.save();

        // Fireball background - radial orange-to-red gradient
        const grad = ctx.createRadialGradient(
            x + w / 2, y + h / 2, 10,
            x + w / 2, y + h / 2, w * 0.6
        );
        grad.addColorStop(0, '#FF8800');
        grad.addColorStop(0.5, '#CC3300');
        grad.addColorStop(1, '#661100');
        ctx.fillStyle = grad;
        roundRect(x + SYMBOL_PAD, y + SYMBOL_PAD, w - SYMBOL_PAD * 2, h - SYMBOL_PAD * 2, 8, true);

        // Glowing orange border that pulses
        ctx.shadowColor = '#FF6600';
        ctx.shadowBlur = 15 * pulse;
        ctx.strokeStyle = '#FF8800';
        ctx.lineWidth = 2;
        roundRect(x + SYMBOL_PAD, y + SYMBOL_PAD, w - SYMBOL_PAD * 2, h - SYMBOL_PAD * 2, 8, false, true);
        ctx.shadowBlur = 0;

        // Draw the credit value or jackpot name
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        if (cell.isJackpot) {
            // Jackpot label with colored glow (e.g., "MINI" in green)
            ctx.shadowColor = cell.color;
            ctx.shadowBlur = 20;
            ctx.fillStyle = cell.color;
            ctx.font = 'bold 26px Arial, sans-serif';
            ctx.fillText(cell.label, x + w / 2, y + h / 2);
            ctx.shadowBlur = 0;
        } else {
            // Regular credit value in white
            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 30px Arial, sans-serif';
            ctx.fillText(cell.label, x + w / 2, y + h / 2);
        }

        // White flash on newly landed fireballs (fades over 30 frames)
        if (isNew && bonusAnimTimer < 30) {
            ctx.globalAlpha = 1 - bonusAnimTimer / 30;
            ctx.fillStyle = '#FFFFFF';
            roundRect(x + SYMBOL_PAD, y + SYMBOL_PAD, w - SYMBOL_PAD * 2, h - SYMBOL_PAD * 2, 8, true);
        }

        ctx.restore();
    }

    // Draw the entire Hold and Spin overlay on top of the reels
    function drawBonusOverlay() {
        if (gameMode !== 'HOLD_AND_SPIN') return;

        const baseY = REEL_AREA_Y + (REEL_H - NUM_ROWS * SYMBOL_H) / 2;
        const totalReelW = (REEL_W * NUM_REELS) + (REEL_GAP * (NUM_REELS - 1));

        // During TRIGGER phase: draw fireballs on top of the regular reels
        // During ACTIVE/SPINNING/AWARD: draw the full bonus grid overlay
        if (bonusPhase !== 'TRIGGER') {
            // Dark overlay covering the entire reel area
            ctx.save();
            ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
            ctx.fillRect(REEL_AREA_X - 24, REEL_AREA_Y - 24, totalReelW + 48, REEL_H + 48);
            ctx.restore();
        }

        // Draw each cell of the bonus grid
        for (let r = 0; r < NUM_REELS; r++) {
            for (let row = 0; row < NUM_ROWS; row++) {
                const cellX = REEL_AREA_X + r * (REEL_W + REEL_GAP);
                const cellY = baseY + row * SYMBOL_H;
                const cell = bonusGrid[r][row];

                if (cell) {
                    // Locked fireball with credit value
                    drawBonusFireball(cell, cellX, cellY, REEL_W, SYMBOL_H, r, row);
                } else if (bonusPhase !== 'TRIGGER') {
                    // Empty cell (only drawn during active bonus, not trigger)
                    if (bonusPhase === 'SPINNING') {
                        // Orange shimmer effect during respin animation
                        const shimmer = 0.12 + 0.08 * Math.sin(bonusAnimTimer * 0.3 + r * 1.5 + row);
                        ctx.fillStyle = `rgba(255, 102, 0, ${shimmer})`;
                    } else {
                        ctx.fillStyle = '#0a0a1a';
                    }
                    roundRect(cellX + SYMBOL_PAD, cellY + SYMBOL_PAD,
                             REEL_W - SYMBOL_PAD * 2, SYMBOL_H - SYMBOL_PAD * 2, 8, true);
                    ctx.strokeStyle = '#333355';
                    ctx.lineWidth = 1;
                    roundRect(cellX + SYMBOL_PAD, cellY + SYMBOL_PAD,
                             REEL_W - SYMBOL_PAD * 2, SYMBOL_H - SYMBOL_PAD * 2, 8, false, true);
                }
            }
        }

        // "HOLD & SPIN" title above the reels
        if (bonusPhase !== 'AWARD') {
            ctx.save();
            ctx.fillStyle = '#FF6600';
            ctx.font = 'bold 42px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.shadowColor = '#FF6600';
            ctx.shadowBlur = 20;
            ctx.fillText('HOLD & SPIN', MACHINE_X + MACHINE_W / 2, REEL_AREA_Y - 6);
            ctx.shadowBlur = 0;
            ctx.restore();
        }

        // Big flashing "HOLD & SPIN!" during trigger announcement
        if (bonusPhase === 'TRIGGER') {
            const pulse = 0.5 + 0.5 * Math.sin(bonusAnimTimer * 0.15);
            ctx.save();
            ctx.globalAlpha = pulse;
            ctx.fillStyle = '#FF6600';
            ctx.font = 'bold 72px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#FF6600';
            ctx.shadowBlur = 40;
            ctx.fillText('HOLD & SPIN!', MACHINE_X + MACHINE_W / 2, REEL_AREA_Y + REEL_H / 2);
            ctx.shadowBlur = 0;
            ctx.restore();
        }

        // Respin counter below the grid
        if (bonusPhase === 'ACTIVE' || bonusPhase === 'SPINNING') {
            const counterY = baseY + NUM_ROWS * SYMBOL_H + 15;
            ctx.save();
            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 26px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText('RESPINS: ' + bonusRespins, MACHINE_X + MACHINE_W / 2, counterY);
            ctx.restore();
        }

        // Running total during active bonus
        if (bonusPhase === 'ACTIVE' || bonusPhase === 'SPINNING') {
            const totalY = baseY + NUM_ROWS * SYMBOL_H + 50;
            ctx.save();
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 22px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText('BONUS TOTAL: ' + formatCredits(bonusTotalWin), MACHINE_X + MACHINE_W / 2, totalY);
            ctx.restore();
        }

        // Award phase - big golden total with count-up animation
        if (bonusPhase === 'AWARD') {
            const progress = Math.min(bonusAnimTimer / 90, 1); // count up over 1.5 seconds
            const displayValue = Math.floor(bonusTotalWin * progress);

            ctx.save();

            // Dark box behind the award text
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            roundRect(MACHINE_X + MACHINE_W / 2 - 220, REEL_AREA_Y + REEL_H / 2 - 70, 440, 140, 15, true);
            ctx.strokeStyle = '#FFD70088';
            ctx.lineWidth = 2;
            roundRect(MACHINE_X + MACHINE_W / 2 - 220, REEL_AREA_Y + REEL_H / 2 - 70, 440, 140, 15, false, true);

            // "BONUS WIN" label
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 32px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('BONUS WIN', MACHINE_X + MACHINE_W / 2, REEL_AREA_Y + REEL_H / 2 - 28);

            // Credit total with golden glow
            ctx.shadowColor = '#FFD700';
            ctx.shadowBlur = 25;
            ctx.font = 'bold 52px Arial, sans-serif';
            ctx.fillText(formatCredits(displayValue), MACHINE_X + MACHINE_W / 2, REEL_AREA_Y + REEL_H / 2 + 28);
            ctx.shadowBlur = 0;

            ctx.restore();
        }
    }

    // --- Bonus Sound Effects ---

    // Dramatic ascending fanfare when bonus triggers
    function playBonusTriggerSound() {
        if (!audioCtx) return;
        const notes = [262, 330, 392, 523, 660, 784]; // C4 through G5 - rising excitement
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.value = freq;
            const startTime = audioCtx.currentTime + i * 0.08;
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(0.25, startTime + 0.04);
            gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.3);
            osc.start(startTime);
            osc.stop(startTime + 0.3);
        });
    }

    // Bright "ding" when a new fireball locks during respin
    function playBonusLandSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.value = 880; // A5 - bright and clear
        const now = audioCtx.currentTime;
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        osc.start(now);
        osc.stop(now + 0.5);
    }

    // ===== NUDGE SKILL FEATURE =====
    // After reels stop, the player can shift ONE reel up or down by one position.
    // This is the skill element that qualifies the game as a COAM skill game
    // under Georgia gaming regulations. The player must actively choose which
    // reel to nudge and which direction - a genuine decision that affects outcome.
    //
    // Rules:
    // - One nudge allowed per spin (use it or lose it)
    // - Available for a few seconds after reels stop (before next spin)
    // - Nudge UP = symbols shift down (reveals symbol above top row)
    // - Nudge DOWN = symbols shift up (reveals symbol below bottom row)
    // - After nudge, wins are re-checked with the new grid
    // - Not available during Hold and Spin bonus

    let nudgeAvailable = false;      // true when player can nudge after a spin
    let nudgeUsed = false;           // true after player uses their nudge this spin
    let nudgeAnimating = false;      // true during nudge slide animation
    let nudgeReel = -1;              // which reel is being nudged (-1 = none)
    let nudgeDirection = 0;          // +1 = up (reveal above), -1 = down (reveal below)
    let nudgeProgress = 0;           // 0 to 1 animation progress

    const NUDGE_ANIM_SPEED = 0.08;  // how fast the nudge slides (per frame)

    // Arrow button dimensions for nudge UI
    const NUDGE_ARROW_W = 60;
    const NUDGE_ARROW_H = 30;

    // Enable nudge after a normal spin completes
    function enableNudge() {
        if (gameMode !== 'NORMAL') return;
        nudgeAvailable = true;
        nudgeUsed = false;
    }

    // Player chose to nudge a reel in a direction
    function performNudge(reelIndex, direction) {
        if (!nudgeAvailable || nudgeUsed || nudgeAnimating) return;
        if (gameMode !== 'NORMAL') return;
        if (isSpinning) return;

        nudgeUsed = true;
        if (typeof sasRecordNudge === 'function') sasRecordNudge();
        nudgeAnimating = true;
        nudgeReel = reelIndex;
        nudgeDirection = direction;
        nudgeProgress = 0;

        // Clear any current win display (we'll re-check after nudge)
        activeWins = [];
        showingWins = false;
        winDisplayIndex = -1;
        lastWin = 0;

        playNudgeSound();
    }

    // Update the nudge slide animation each frame
    function updateNudge() {
        if (!nudgeAnimating) return;

        nudgeProgress += NUDGE_ANIM_SPEED;

        if (nudgeProgress >= 1) {
            // Animation complete - apply the actual position change
            nudgeProgress = 0;
            nudgeAnimating = false;

            const reel = reels[nudgeReel];
            // Move the reel position on the strip
            // nudgeDirection +1 = up (subtract position to show earlier symbols)
            // nudgeDirection -1 = down (add position to show later symbols)
            reel.position = ((reel.position - nudgeDirection) % REEL_STRIP_LENGTH + REEL_STRIP_LENGTH) % REEL_STRIP_LENGTH;

            // Reset the visual offset
            reel.bounceBack = 0;

            // Rebuild the grid and check for wins with the new arrangement
            updateReelGrid();
            checkWins();

            // Disable nudge after use
            nudgeAvailable = false;
            nudgeReel = -1;
        }
    }

    // Draw the nudge arrow buttons above and below each reel
    function drawNudgeUI() {
        // Only show when nudge is available and not used yet
        if (!nudgeAvailable || nudgeUsed || gameMode !== 'NORMAL' || isSpinning) return;

        const baseY = REEL_AREA_Y + (REEL_H - NUM_ROWS * SYMBOL_H) / 2;
        const pulse = 0.6 + 0.4 * Math.sin(performance.now() / 300);

        for (let r = 0; r < NUM_REELS; r++) {
            const reelX = REEL_AREA_X + r * (REEL_W + REEL_GAP);
            const reelCX = reelX + REEL_W / 2;

            // UP arrow (above the reel)
            const upY = baseY - 38;
            ctx.save();
            ctx.globalAlpha = pulse;
            ctx.fillStyle = '#22CC88';
            ctx.beginPath();
            ctx.moveTo(reelCX - 20, upY + 24);
            ctx.lineTo(reelCX, upY + 4);
            ctx.lineTo(reelCX + 20, upY + 24);
            ctx.closePath();
            ctx.fill();
            ctx.restore();

            // DOWN arrow (below the reel)
            const downY = baseY + NUM_ROWS * SYMBOL_H + 8;
            ctx.save();
            ctx.globalAlpha = pulse;
            ctx.fillStyle = '#22CC88';
            ctx.beginPath();
            ctx.moveTo(reelCX - 20, downY + 4);
            ctx.lineTo(reelCX, downY + 24);
            ctx.lineTo(reelCX + 20, downY + 4);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        // "NUDGE" label
        ctx.save();
        ctx.fillStyle = '#22CC88';
        ctx.font = 'bold 20px Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.globalAlpha = pulse;
        ctx.fillText('TAP \u25B2 OR \u25BC TO NUDGE', MACHINE_X + MACHINE_W / 2, baseY - 42);
        ctx.restore();
    }

    // Apply visual offset to the nudging reel during animation
    function getNudgeOffset(reelIndex) {
        if (!nudgeAnimating || reelIndex !== nudgeReel) return 0;
        // Smooth ease-out animation
        const eased = 1 - Math.pow(1 - nudgeProgress, 2);
        return nudgeDirection * eased * SYMBOL_H;
    }

    // Nudge click sound - short mechanical click
    function playNudgeSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'square';
        osc.frequency.value = 200;
        const now = audioCtx.currentTime;
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        osc.start(now);
        osc.stop(now + 0.08);
    }

    // ===== SYMBOL SWITCH SKILL FEATURE =====
    // The second skill element for Georgia COAM compliance.
    // After using (or skipping) Nudge, the player can swap two adjacent
    // symbols on the grid to try to complete a winning combination.
    //
    // How it works:
    // - Player taps a symbol to select it (highlighted)
    // - Then taps an adjacent symbol (up/down/left/right) to swap them
    // - Swap animates smoothly, then wins are re-checked
    // - One swap per spin (separate from nudge - player gets both)
    // - Not available during Hold and Spin bonus

    let switchAvailable = false;     // true when player can use Symbol Switch
    let switchUsed = false;          // true after player uses their switch
    let switchAnimating = false;     // true during swap animation
    let switchSelected = null;       // {reel, row} of first selected symbol
    let switchTarget = null;         // {reel, row} of second selected symbol
    let switchProgress = 0;          // 0 to 1 animation progress

    const SWITCH_ANIM_SPEED = 0.06; // how fast the swap slides

    // Enable Symbol Switch after a normal spin completes
    function enableSwitch() {
        if (gameMode !== 'NORMAL') return;
        switchAvailable = true;
        switchUsed = false;
        switchSelected = null;
        switchTarget = null;
    }

    // Player tapped a symbol on the grid - handle selection/swap
    function handleSwitchTap(reel, row) {
        if (!switchAvailable || switchUsed || switchAnimating) return;
        if (gameMode !== 'NORMAL') return;
        if (isSpinning || nudgeAnimating) return;

        if (!switchSelected) {
            // First tap - select this symbol
            switchSelected = { reel: reel, row: row };
            playSwitchSelectSound();
        } else {
            // Second tap - check if adjacent to the first selection
            const dr = Math.abs(reel - switchSelected.reel);
            const drow = Math.abs(row - switchSelected.row);
            const isAdjacent = (dr + drow === 1); // exactly one step away

            if (isAdjacent) {
                // Valid swap target - start animation
                switchTarget = { reel: reel, row: row };
                switchAnimating = true;
                switchProgress = 0;
                switchUsed = true;
                if (typeof sasRecordSwitch === 'function') sasRecordSwitch();

                // Clear any current win display
                activeWins = [];
