<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Ice Gaming - Game 1</title>
    <style>
        /* ===== FULL SCREEN DARK BACKGROUND ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
    /* =============================================================
       BLACK ICE GAMING - GAME 1
       Main game file - everything lives here
       ============================================================= */

    // ===== CANVAS SETUP =====
    // The canvas is our drawing surface - like a digital whiteboard
    // We size it to 1920x1080 to match the cabinet monitor
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 1920;
    canvas.height = 1080;

    // Scale canvas to fit the browser window while keeping proportions
    function resizeCanvas() {
        const scaleX = window.innerWidth / canvas.width;
        const scaleY = window.innerHeight / canvas.height;
        const scale = Math.min(scaleX, scaleY);
        canvas.style.width = (canvas.width * scale) + 'px';
        canvas.style.height = (canvas.height * scale) + 'px';
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // ===== SYMBOL DEFINITIONS =====
    // Each symbol has a name, display label, and colors from the design doc
    const SYMBOLS = [
        { name: 'CHERRY',     label: 'CHERRY',  color: '#FF2D2D', bgColor: '#4A0000' },
        { name: 'BAR',        label: 'BAR',     color: '#4488FF', bgColor: '#001A4A' },
        { name: 'DOUBLE_BAR', label: '2xBAR',   color: '#2255CC', bgColor: '#001040' },
        { name: 'TRIPLE_BAR', label: '3xBAR',   color: '#1A3399', bgColor: '#000A30' },
        { name: 'SEVEN',      label: '7',       color: '#FFD700', bgColor: '#4A3D00' },
        { name: 'BELL',       label: 'BELL',    color: '#FFDD44', bgColor: '#4A4000' },
        { name: 'DIAMOND',    label: 'DIAM',    color: '#00EEFF', bgColor: '#003A40' },
        { name: 'WILD',       label: 'WILD',    color: '#CC44FF', bgColor: '#300050' },
        { name: 'FIREBALL',   label: 'FIRE',    color: '#FF6600', bgColor: '#4A2000' },
        { name: 'BLANK',      label: '',        color: '#333333', bgColor: '#111111' }
    ];

    // ===== REEL LAYOUT =====
    // 5 reels, 3 visible rows each - this is what the player sees
    const NUM_REELS = 5;
    const NUM_ROWS = 3;
    const REEL_STRIP_LENGTH = 30; // how many symbols on each virtual reel strip

    // Generate a random symbol index (placeholder until real math engine)
    function randomSymbol() {
        // Don't show BLANK too often in the demo - skip index 9 most of the time
        let idx = Math.floor(Math.random() * SYMBOLS.length);
        if (idx === 9 && Math.random() > 0.2) idx = Math.floor(Math.random() * 9);
        return idx;
    }

    // ===== REEL STRIPS =====
    // Each reel has a long strip of symbols it scrolls through
    // Think of it like a belt of symbols wrapped around a cylinder
    const reelStrips = [];
    for (let r = 0; r < NUM_REELS; r++) {
        reelStrips[r] = [];
        for (let i = 0; i < REEL_STRIP_LENGTH; i++) {
            reelStrips[r][i] = randomSymbol();
        }
    }

    // ===== REEL STATE =====
    // Each reel tracks where it is on the strip and how fast it's moving
    const reels = [];
    for (let r = 0; r < NUM_REELS; r++) {
        reels[r] = {
            position: Math.floor(Math.random() * REEL_STRIP_LENGTH), // current stop position on strip
            offset: 0,          // pixel offset for smooth scrolling (0 = symbol fully aligned)
            speed: 0,           // current scroll speed in pixels per frame
            spinning: false,    // is this reel currently spinning?
            stopping: false,    // is this reel slowing down to stop?
            targetPosition: 0,  // where the reel will land when it stops
            bounceBack: 0,      // for the "overshoot and bounce" effect when stopping
            bouncePhase: 0      // tracks where we are in the bounce animation
        };
    }

    // ===== SPIN CONTROL =====
    // These variables manage the overall spin sequence
    let isSpinning = false;          // true while any reel is still moving
    const SPIN_SPEED = 40;           // max speed when reels are at full spin (pixels per frame)
    const SPIN_UP_TIME = 300;        // milliseconds to reach full speed
    const STOP_DELAY_PER_REEL = 300; // milliseconds between each reel stopping (left to right)

    // Get a symbol from a reel strip at any position (wraps around)
    function getStripSymbol(reelIndex, pos) {
        const len = reelStrips[reelIndex].length;
        return reelStrips[reelIndex][((pos % len) + len) % len];
    }

    // Fill the visible grid from reel strip positions (used when reels are stopped)
    const reelGrid = [];
    function updateReelGrid() {
        for (let r = 0; r < NUM_REELS; r++) {
            reelGrid[r] = [];
            for (let row = 0; row < NUM_ROWS; row++) {
                reelGrid[r][row] = getStripSymbol(r, reels[r].position + row);
            }
        }
    }
    updateReelGrid();

    // ===== START SPIN =====
    // Called when player presses the spin button
    function startSpin() {
        if (isSpinning) return; // can't spin while already spinning
        isSpinning = true;

        // Initialize audio on first spin (browser requires user gesture)
        initAudio();
        playSpinStartSound();

        // Clear any win display from the previous spin
        activeWins = [];
        showingWins = false;
        winDisplayIndex = -1;

        // Randomize new target positions for each reel (where it will land)
        for (let r = 0; r < NUM_REELS; r++) {
            reels[r].spinning = true;
            reels[r].stopping = false;
            reels[r].speed = 0;
            reels[r].bounceBack = 0;
            reels[r].bouncePhase = 0;
            // Pick a random landing spot at least 2 full rotations away
            reels[r].targetPosition = Math.floor(Math.random() * REEL_STRIP_LENGTH);
        }

        // Ramp up speed over SPIN_UP_TIME, then schedule stops left to right
        const spinStartTime = performance.now();

        function rampUp() {
            const elapsed = performance.now() - spinStartTime;
            const progress = Math.min(elapsed / SPIN_UP_TIME, 1);
            // Ease-out curve for natural acceleration
            const easedProgress = 1 - Math.pow(1 - progress, 2);

            for (let r = 0; r < NUM_REELS; r++) {
                if (reels[r].spinning && !reels[r].stopping) {
                    reels[r].speed = SPIN_SPEED * easedProgress;
                }
            }

            if (progress < 1) {
                requestAnimationFrame(rampUp);
            } else {
                // Full speed reached - schedule each reel to stop one by one
                scheduleStops();
            }
        }
        requestAnimationFrame(rampUp);
    }

    // Schedule reels to stop one at a time, left to right
    function scheduleStops() {
        for (let r = 0; r < NUM_REELS; r++) {
            setTimeout(() => {
                reels[r].stopping = true;
            }, r * STOP_DELAY_PER_REEL);
        }
    }

    // ===== LAYOUT CONSTANTS =====
    // All measurements in pixels on the 1920x1080 canvas

    // Machine frame
    const MACHINE_X = 210;          // left edge of the machine body
    const MACHINE_Y = 40;           // top edge
    const MACHINE_W = 1500;         // width of the machine body
    const MACHINE_H = 1000;         // height of the machine body

    // Reel window - the area where symbols are visible
    const REEL_AREA_X = 310;        // left edge of the reel window
    const REEL_AREA_Y = 230;        // top edge of the reel window (below jackpot bar)
    const REEL_W = 220;             // width of each reel column
    const REEL_H = 480;             // total height of the reel window
    const REEL_GAP = 16;            // gap between reels
    const SYMBOL_H = 150;           // height of each symbol cell
    const SYMBOL_PAD = 8;           // padding inside each symbol cell

    // ===== DRAWING FUNCTIONS =====

    // Draw the slot machine cabinet frame
    function drawMachineFrame() {
        // Outer cabinet body - dark metallic
        ctx.fillStyle = '#1a1a2e';
        roundRect(MACHINE_X, MACHINE_Y, MACHINE_W, MACHINE_H, 20, true);

        // Inner bevel - gives depth
        ctx.fillStyle = '#12122a';
        roundRect(MACHINE_X + 8, MACHINE_Y + 8, MACHINE_W - 16, MACHINE_H - 16, 16, true);

        // Top banner area - where the game name goes
        const bannerGrad = ctx.createLinearGradient(0, MACHINE_Y + 20, 0, MACHINE_Y + 160);
        bannerGrad.addColorStop(0, '#1a0a30');
        bannerGrad.addColorStop(0.5, '#2a1050');
        bannerGrad.addColorStop(1, '#1a0a30');
        ctx.fillStyle = bannerGrad;
        roundRect(MACHINE_X + 30, MACHINE_Y + 20, MACHINE_W - 60, 140, 12, true);

        // Game title
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 64px Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = '#FFD700';
        ctx.shadowBlur = 20;
        ctx.fillText('BLACK ICE', MACHINE_X + MACHINE_W / 2, MACHINE_Y + 90);
        ctx.shadowBlur = 0;

        // Reel window border - glowing frame around the reels
        const totalReelW = (REEL_W * NUM_REELS) + (REEL_GAP * (NUM_REELS - 1));
        const borderPad = 20;
        const borderX = REEL_AREA_X - borderPad;
        const borderY = REEL_AREA_Y - borderPad;
        const borderW = totalReelW + borderPad * 2;
        const borderH = REEL_H + borderPad * 2;

        // Outer glow
        ctx.shadowColor = '#4400AA';
        ctx.shadowBlur = 30;
        ctx.strokeStyle = '#6622CC';
        ctx.lineWidth = 4;
        roundRect(borderX, borderY, borderW, borderH, 10, false, true);
        ctx.shadowBlur = 0;

        // Inner border
        ctx.strokeStyle = '#8844EE';
        ctx.lineWidth = 2;
        roundRect(borderX + 4, borderY + 4, borderW - 8, borderH - 8, 8, false, true);

        // Dark background behind reels
        ctx.fillStyle = '#050510';
        roundRect(borderX + 6, borderY + 6, borderW - 12, borderH - 12, 6, true);
    }

    // Draw a single symbol in its cell
    function drawSymbol(symbolIndex, x, y, w, h) {
        const sym = SYMBOLS[symbolIndex];

        // Symbol background tile
        const tileGrad = ctx.createLinearGradient(x, y, x, y + h);
        tileGrad.addColorStop(0, sym.bgColor);
        tileGrad.addColorStop(0.5, lightenColor(sym.bgColor, 30));
        tileGrad.addColorStop(1, sym.bgColor);
        ctx.fillStyle = tileGrad;
        roundRect(x + SYMBOL_PAD, y + SYMBOL_PAD, w - SYMBOL_PAD * 2, h - SYMBOL_PAD * 2, 8, true);

        // Symbol border
        ctx.strokeStyle = sym.color + '66';
        ctx.lineWidth = 2;
        roundRect(x + SYMBOL_PAD, y + SYMBOL_PAD, w - SYMBOL_PAD * 2, h - SYMBOL_PAD * 2, 8, false, true);

        // Skip drawing text for BLANK symbols
        if (sym.name === 'BLANK') return;

        // Draw the symbol icon shape
        const cx = x + w / 2;
        const cy = y + h / 2 - 10;
        drawSymbolIcon(sym, cx, cy);

        // Symbol label text below the icon
        ctx.fillStyle = sym.color;
        ctx.font = 'bold 18px Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(sym.label, cx, cy + 40);
    }

    // Draw a simple icon shape for each symbol type
    function drawSymbolIcon(sym, cx, cy) {
        ctx.save();
        ctx.shadowColor = sym.color;
        ctx.shadowBlur = 12;

        switch (sym.name) {
            case 'CHERRY':
                // Two circles with stems
                ctx.fillStyle = sym.color;
                ctx.beginPath();
                ctx.arc(cx - 14, cy + 8, 16, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cx + 14, cy + 8, 16, 0, Math.PI * 2);
                ctx.fill();
                // Stems
                ctx.strokeStyle = '#44AA22';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(cx - 14, cy - 8);
                ctx.quadraticCurveTo(cx, cy - 30, cx + 14, cy - 8);
                ctx.stroke();
                break;

            case 'BAR':
            case 'DOUBLE_BAR':
            case 'TRIPLE_BAR':
                // Horizontal bar(s)
                ctx.fillStyle = sym.color;
                const barCount = sym.name === 'BAR' ? 1 : sym.name === 'DOUBLE_BAR' ? 2 : 3;
                const barH = 12;
                const barW = 60;
                const totalH = barCount * barH + (barCount - 1) * 6;
                const startY = cy - totalH / 2;
                for (let i = 0; i < barCount; i++) {
                    const by = startY + i * (barH + 6);
                    roundRect(cx - barW / 2, by, barW, barH, 3, true);
                }
                break;

            case 'SEVEN':
                // Big bold 7
                ctx.fillStyle = sym.color;
                ctx.font = 'bold 72px Arial, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('7', cx, cy);
                break;

            case 'BELL':
                // Bell shape
                ctx.fillStyle = sym.color;
                ctx.beginPath();
                ctx.moveTo(cx - 24, cy + 12);
                ctx.quadraticCurveTo(cx - 24, cy - 24, cx, cy - 28);
                ctx.quadraticCurveTo(cx + 24, cy - 24, cx + 24, cy + 12);
                ctx.lineTo(cx - 24, cy + 12);
                ctx.fill();
                // Clapper
                ctx.beginPath();
                ctx.arc(cx, cy + 18, 6, 0, Math.PI * 2);
                ctx.fill();
                break;

            case 'DIAMOND':
                // Diamond shape
                ctx.fillStyle = sym.color;
                ctx.beginPath();
                ctx.moveTo(cx, cy - 28);
                ctx.lineTo(cx + 24, cy);
                ctx.lineTo(cx, cy + 28);
                ctx.lineTo(cx - 24, cy);
                ctx.closePath();
                ctx.fill();
                break;

            case 'WILD':
                // Star burst for WILD
                ctx.fillStyle = sym.color;
                ctx.beginPath();
                for (let i = 0; i < 10; i++) {
                    const angle = (i * Math.PI * 2) / 10 - Math.PI / 2;
                    const radius = i % 2 === 0 ? 28 : 14;
                    const px = cx + Math.cos(angle) * radius;
                    const py = cy + Math.sin(angle) * radius;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fill();
                break;

            case 'FIREBALL':
                // Flame shape
                ctx.fillStyle = sym.color;
                ctx.beginPath();
                ctx.moveTo(cx, cy - 30);
                ctx.quadraticCurveTo(cx + 20, cy - 10, cx + 16, cy + 8);
                ctx.quadraticCurveTo(cx + 10, cy + 0, cx + 8, cy + 16);
                ctx.quadraticCurveTo(cx, cy + 24, cx - 8, cy + 16);
                ctx.quadraticCurveTo(cx - 10, cy + 0, cx - 16, cy + 8);
                ctx.quadraticCurveTo(cx - 20, cy - 10, cx, cy - 30);
                ctx.fill();
                // Inner flame
                ctx.fillStyle = '#FFDD00';
                ctx.beginPath();
                ctx.moveTo(cx, cy - 14);
                ctx.quadraticCurveTo(cx + 10, cy, cx + 6, cy + 10);
                ctx.quadraticCurveTo(cx, cy + 16, cx - 6, cy + 10);
                ctx.quadraticCurveTo(cx - 10, cy, cx, cy - 14);
                ctx.fill();
                break;
        }

        ctx.restore();
    }

    // Draw all 5 reels with their 3 visible symbols each
    // When spinning, symbols scroll vertically with a pixel offset
    function drawReels() {
        // We need to clip the reel area so symbols don't draw outside the window
        const totalReelW = (REEL_W * NUM_REELS) + (REEL_GAP * (NUM_REELS - 1));
        const clipX = REEL_AREA_X - 4;
        const clipY = REEL_AREA_Y;
        const clipW = totalReelW + 8;
        const clipH = REEL_H;

        ctx.save();
        // Set up clipping region so symbols stay inside the reel window
        ctx.beginPath();
        ctx.rect(clipX, clipY, clipW, clipH);
        ctx.clip();

        for (let r = 0; r < NUM_REELS; r++) {
            const reelX = REEL_AREA_X + r * (REEL_W + REEL_GAP);
            const reel = reels[r];

            // Reel column background
            ctx.fillStyle = '#0a0a1a';
            roundRect(reelX, REEL_AREA_Y, REEL_W, REEL_H, 4, true);

            // Calculate the vertical start position for symbols
            // offset shifts symbols up; when offset reaches SYMBOL_H, we advance position
            const baseY = REEL_AREA_Y + (REEL_H - NUM_ROWS * SYMBOL_H) / 2;

            // Draw one extra symbol above and below for smooth scrolling
            for (let row = -1; row <= NUM_ROWS; row++) {
                const symY = baseY + row * SYMBOL_H - reel.offset + reel.bounceBack;
                // Only draw if the symbol would be at least partially visible
                if (symY + SYMBOL_H > REEL_AREA_Y - SYMBOL_H && symY < REEL_AREA_Y + REEL_H + SYMBOL_H) {
                    const symbolIdx = getStripSymbol(r, reel.position + row);
                    drawSymbol(symbolIdx, reelX, symY, REEL_W, SYMBOL_H);
                }
            }

            // Subtle reel divider lines
            if (r < NUM_REELS - 1) {
                ctx.strokeStyle = '#222244';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(reelX + REEL_W + REEL_GAP / 2, REEL_AREA_Y + 10);
                ctx.lineTo(reelX + REEL_W + REEL_GAP / 2, REEL_AREA_Y + REEL_H - 10);
                ctx.stroke();
            }
        }

        ctx.restore(); // remove clipping

        // Row divider lines (drawn outside clip so they're always crisp)
        for (let r = 0; r < NUM_REELS; r++) {
            const reelX = REEL_AREA_X + r * (REEL_W + REEL_GAP);
            for (let row = 1; row < NUM_ROWS; row++) {
                const lineY = REEL_AREA_Y + row * SYMBOL_H + (REEL_H - NUM_ROWS * SYMBOL_H) / 2;
                ctx.strokeStyle = '#333355';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(reelX + 10, lineY);
                ctx.lineTo(reelX + REEL_W - 10, lineY);
                ctx.stroke();
            }
        }
    }

    // Draw the payline indicator arrows on the left side
    function drawPaylineMarkers() {
        const markerX = REEL_AREA_X - 40;
        const rowLabels = ['TOP', 'MID', 'BOT'];
        const rowColors = ['#FF4444', '#FFD700', '#44FF44'];

        for (let row = 0; row < NUM_ROWS; row++) {
            const symY = REEL_AREA_Y + row * SYMBOL_H + (REEL_H - NUM_ROWS * SYMBOL_H) / 2;
            const cy = symY + SYMBOL_H / 2;

            // Arrow triangle
            ctx.fillStyle = rowColors[row];
            ctx.beginPath();
            ctx.moveTo(markerX, cy - 12);
            ctx.lineTo(markerX + 18, cy);
            ctx.lineTo(markerX, cy + 12);
            ctx.closePath();
            ctx.fill();

            // Mirror arrow on right side
            const totalReelW = (REEL_W * NUM_REELS) + (REEL_GAP * (NUM_REELS - 1));
            const rightX = REEL_AREA_X + totalReelW + 22;
            ctx.beginPath();
            ctx.moveTo(rightX + 18, cy - 12);
            ctx.lineTo(rightX, cy);
            ctx.lineTo(rightX + 18, cy + 12);
            ctx.closePath();
            ctx.fill();
        }
    }

    // Draw the bottom panel with credits and bet info
    function drawBottomPanel() {
        const panelY = REEL_AREA_Y + REEL_H + 50;
        const panelH = 120;

        // Panel background
        const panelGrad = ctx.createLinearGradient(0, panelY, 0, panelY + panelH);
        panelGrad.addColorStop(0, '#1a0a30');
        panelGrad.addColorStop(1, '#0a0515');
        ctx.fillStyle = panelGrad;
        roundRect(MACHINE_X + 30, panelY, MACHINE_W - 60, panelH, 10, true);

        // Panel border
        ctx.strokeStyle = '#6622CC44';
        ctx.lineWidth = 2;
        roundRect(MACHINE_X + 30, panelY, MACHINE_W - 60, panelH, 10, false, true);

        // Credit display
        ctx.fillStyle = '#AAAACC';
        ctx.font = '22px Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText('CREDITS', MACHINE_X + 250, panelY + 15);
        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 42px Arial, sans-serif';
        ctx.fillText('1,000', MACHINE_X + 250, panelY + 48);

        // Bet display
        ctx.fillStyle = '#AAAACC';
        ctx.font = '22px Arial, sans-serif';
        ctx.fillText('BET', MACHINE_X + MACHINE_W / 2, panelY + 15);
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 42px Arial, sans-serif';
        ctx.fillText('10', MACHINE_X + MACHINE_W / 2, panelY + 48);

        // Win display
        ctx.fillStyle = '#AAAACC';
        ctx.font = '22px Arial, sans-serif';
        ctx.fillText('WIN', MACHINE_X + MACHINE_W - 250, panelY + 15);
        ctx.fillStyle = '#44FF44';
        ctx.font = 'bold 42px Arial, sans-serif';
        ctx.fillText('0', MACHINE_X + MACHINE_W - 250, panelY + 48);
    }

    // Draw the jackpot displays at the top
    function drawJackpotBar() {
        const jackpots = [
            { name: 'MEGA',  amount: '10,000', color: '#FF2222' },
            { name: 'MAJOR', amount: '1,000',  color: '#FFD700' },
            { name: 'MINOR', amount: '200',    color: '#44BBFF' },
            { name: 'MINI',  amount: '50',     color: '#44FF44' }
        ];

        const barY = MACHINE_Y + 168;
        const barW = (MACHINE_W - 100) / 4;

        for (let i = 0; i < jackpots.length; i++) {
            const jp = jackpots[i];
            const bx = MACHINE_X + 40 + i * barW;

            // Jackpot box background
            ctx.fillStyle = '#0a0a20';
            roundRect(bx + 4, barY, barW - 8, 28, 6, true);

            // Jackpot box border glow
            ctx.strokeStyle = jp.color + '88';
            ctx.lineWidth = 1;
            roundRect(bx + 4, barY, barW - 8, 28, 6, false, true);

            // Jackpot label and amount
            ctx.fillStyle = jp.color;
            ctx.font = 'bold 16px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(jp.name + '  $' + jp.amount, bx + barW / 2, barY + 14);
        }
    }

    // ===== SOUND EFFECTS =====
    // Generated with Web Audio API - no audio files needed, works 100% offline
    // AudioContext is created on first user interaction (browser requirement)
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    // Play a short thud/click sound when a reel lands
    function playReelStopSound(reelIndex) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        // Lower pitch for later reels - gives a satisfying cascade feel
        osc.frequency.value = 120 - reelIndex * 8;
        osc.type = 'sine';

        // Quick punch: loud then instantly silent
        const now = audioCtx.currentTime;
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);

        osc.start(now);
        osc.stop(now + 0.1);
    }

    // Play a short spin whoosh when reels start
    function playSpinStartSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.type = 'sawtooth';
        const now = audioCtx.currentTime;
        // Rising pitch whoosh
        osc.frequency.setValueAtTime(80, now);
        osc.frequency.exponentialRampToValueAtTime(300, now + 0.2);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);

        osc.start(now);
        osc.stop(now + 0.25);
    }

    // Play a celebratory rising tone when a win is detected
    function playWinSound() {
        if (!audioCtx) return;
        const notes = [523, 659, 784, 1047]; // C5, E5, G5, C6 - major chord arpeggio
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.type = 'sine';
            osc.frequency.value = freq;

            const startTime = audioCtx.currentTime + i * 0.1;
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(0.2, startTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.4);

            osc.start(startTime);
            osc.stop(startTime + 0.4);
        });
    }

    // ===== LANDING FLASH EFFECTS =====
    // White flash overlay on each reel when it lands
    const landingFlashes = [];

    // Trigger a flash on a specific reel
    function triggerLandingFlash(reelIndex) {
        landingFlashes.push({
            reel: reelIndex,
            alpha: 0.6,  // starting brightness (0-1)
            decay: 0.88  // how fast it fades each frame
        });
    }

    // Update and draw all active landing flashes
    function drawLandingFlashes() {
        const baseY = REEL_AREA_Y + (REEL_H - NUM_ROWS * SYMBOL_H) / 2;

        for (let i = landingFlashes.length - 1; i >= 0; i--) {
            const flash = landingFlashes[i];
            const reelX = REEL_AREA_X + flash.reel * (REEL_W + REEL_GAP);

            // White glow overlay on the reel column
            ctx.save();
            ctx.globalAlpha = flash.alpha;
            ctx.fillStyle = '#FFFFFF';
            roundRect(reelX + SYMBOL_PAD, baseY + SYMBOL_PAD,
                      REEL_W - SYMBOL_PAD * 2, NUM_ROWS * SYMBOL_H - SYMBOL_PAD * 2, 6, true);
            ctx.restore();

            // Fade out
            flash.alpha *= flash.decay;
            if (flash.alpha < 0.02) {
                landingFlashes.splice(i, 1);
            }
        }
    }

    // ===== PAYLINE DEFINITIONS =====
    // 10 paylines - each is an array of 5 row positions (0=top, 1=mid, 2=bot)
    // These define the patterns players can win on
    const PAYLINES = [
        [1, 1, 1, 1, 1],  // Line 1: straight middle
        [0, 0, 0, 0, 0],  // Line 2: straight top
        [2, 2, 2, 2, 2],  // Line 3: straight bottom
        [0, 1, 2, 1, 0],  // Line 4: V shape
        [2, 1, 0, 1, 2],  // Line 5: inverted V
        [0, 0, 1, 2, 2],  // Line 6: diagonal down
        [2, 2, 1, 0, 0],  // Line 7: diagonal up
        [1, 0, 0, 0, 1],  // Line 8: top hat
        [1, 2, 2, 2, 1],  // Line 9: bottom hat
        [1, 0, 1, 0, 1]   // Line 10: zigzag
    ];

    // Colors for each payline so they're easy to tell apart
    const PAYLINE_COLORS = [
        '#FF2222', '#FFD700', '#44FF44', '#FF8800', '#44DDFF',
        '#FF44FF', '#88FF44', '#FF4488', '#44FFDD', '#FFFF44'
    ];

    // ===== WIN DETECTION =====
    // After reels stop, check each payline for matching symbols
    // Returns an array of winning lines with their details
    let activeWins = [];       // list of winning paylines from last spin
    let winDisplayTimer = 0;   // timer for cycling through win displays
    let winDisplayIndex = -1;  // which win line is currently highlighted (-1 = show all)
    let showingWins = false;   // true while win celebration is active
    const WIN_CYCLE_TIME = 90; // frames to show each individual win line (about 1.5 seconds)

    function checkWins() {
        activeWins = [];
        if (isSpinning) return;

        for (let p = 0; p < PAYLINES.length; p++) {
            const line = PAYLINES[p];

            // Get the symbol on this payline for each reel
            const lineSymbols = [];
            for (let r = 0; r < NUM_REELS; r++) {
                lineSymbols.push(reelGrid[r][line[r]]);
            }

            // Check for 3, 4, or 5 matching symbols from left to right
            // WILD substitutes for anything except SEVEN
            const firstSym = lineSymbols[0];
            let matchCount = 1;

            for (let r = 1; r < NUM_REELS; r++) {
                const sym = lineSymbols[r];
                const isWild = SYMBOLS[sym].name === 'WILD';
                const firstIsWild = SYMBOLS[firstSym].name === 'WILD';

                // Skip FIREBALL and BLANK - they don't count for line wins
                if (SYMBOLS[firstSym].name === 'FIREBALL' || SYMBOLS[firstSym].name === 'BLANK') break;
                if (SYMBOLS[sym].name === 'FIREBALL' || SYMBOLS[sym].name === 'BLANK') break;

                // Match if same symbol, or if either is WILD (but WILD can't sub for SEVEN)
                const sevenInvolved = SYMBOLS[firstSym].name === 'SEVEN' || SYMBOLS[sym].name === 'SEVEN';
                if (sym === firstSym ||
                    (isWild && !sevenInvolved) ||
                    (firstIsWild && !sevenInvolved)) {
                    matchCount++;
                } else {
                    break; // chain broken
                }
            }

            // Need at least 3 in a row to win
            if (matchCount >= 3) {
                activeWins.push({
                    paylineIndex: p,
                    matchCount: matchCount,
                    symbolIndex: firstSym
                });
            }
        }

        // Start the win display cycle if we have wins
        if (activeWins.length > 0) {
            showingWins = true;
            winDisplayTimer = 0;
            winDisplayIndex = -1; // start by showing all lines briefly
            playWinSound(); // celebratory rising tone
        }
    }

    // Update the win display cycle timer each frame
    function updateWinDisplay() {
        if (!showingWins || activeWins.length === 0) return;

        winDisplayTimer++;
        if (winDisplayTimer >= WIN_CYCLE_TIME) {
            winDisplayTimer = 0;
            winDisplayIndex++;
            // Loop back to showing all after cycling through each line
            if (winDisplayIndex >= activeWins.length) {
                winDisplayIndex = -1;
            }
        }
    }

    // ===== WIN LINE DRAWING =====
    // Draw glowing lines across the reels for winning paylines
    function drawWinLines() {
        if (!showingWins || activeWins.length === 0) return;

        const baseY = REEL_AREA_Y + (REEL_H - NUM_ROWS * SYMBOL_H) / 2;

        // Pulsing glow effect - oscillates brightness over time
        const pulse = 0.6 + 0.4 * Math.sin(performance.now() / 150);

        // Decide which wins to draw this frame
        const winsToDraw = winDisplayIndex === -1 ? activeWins : [activeWins[winDisplayIndex]];

        for (const win of winsToDraw) {
            const line = PAYLINES[win.paylineIndex];
            const color = PAYLINE_COLORS[win.paylineIndex];

            // Draw the connecting line through each reel position
            ctx.save();
            ctx.globalAlpha = pulse;
            ctx.strokeStyle = color;
            ctx.lineWidth = 6;
            ctx.shadowColor = color;
            ctx.shadowBlur = 20;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            ctx.beginPath();
            for (let r = 0; r < NUM_REELS; r++) {
                const reelX = REEL_AREA_X + r * (REEL_W + REEL_GAP) + REEL_W / 2;
                const symY = baseY + line[r] * SYMBOL_H + SYMBOL_H / 2;

                if (r === 0) ctx.moveTo(reelX, symY);
                else ctx.lineTo(reelX, symY);
            }
            ctx.stroke();

            // Draw highlight boxes around winning symbols
            for (let r = 0; r < win.matchCount; r++) {
                const reelX = REEL_AREA_X + r * (REEL_W + REEL_GAP);
                const symY = baseY + line[r] * SYMBOL_H;

                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.shadowBlur = 15;
                roundRect(reelX + SYMBOL_PAD + 2, symY + SYMBOL_PAD + 2,
                          REEL_W - SYMBOL_PAD * 2 - 4, SYMBOL_H - SYMBOL_PAD * 2 - 4, 6, false, true);
            }

            ctx.restore();
        }

        // Draw win line label on the left margin
        if (winDisplayIndex >= 0 && winDisplayIndex < activeWins.length) {
            const win = activeWins[winDisplayIndex];
            const line = PAYLINES[win.paylineIndex];
            const color = PAYLINE_COLORS[win.paylineIndex];
            const symY = baseY + line[0] * SYMBOL_H + SYMBOL_H / 2;

            ctx.fillStyle = color;
            ctx.font = 'bold 20px Arial, sans-serif';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';
            ctx.fillText('LINE ' + (win.paylineIndex + 1), REEL_AREA_X - 50, symY);
        }
    }

    // ===== UTILITY FUNCTIONS =====

    // Draw a rounded rectangle (used everywhere for that polished look)
    function roundRect(x, y, w, h, r, fill, stroke) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r);
        ctx.closePath();
        if (fill) ctx.fill();
        if (stroke) ctx.stroke();
    }

    // Make a color lighter by a given amount (for gradient effects)
    function lightenColor(hex, amount) {
        const num = parseInt(hex.replace('#', ''), 16);
        const r = Math.min(255, (num >> 16) + amount);
        const g = Math.min(255, ((num >> 8) & 0x00FF) + amount);
        const b = Math.min(255, (num & 0x0000FF) + amount);
        return '#' + (r << 16 | g << 8 | b).toString(16).padStart(6, '0');
    }

    // ===== SPIN BUTTON =====
    // Big glowing button below the bottom panel
    const SPIN_BTN_X = MACHINE_X + MACHINE_W / 2 - 120;
    const SPIN_BTN_Y = REEL_AREA_Y + REEL_H + 190;
    const SPIN_BTN_W = 240;
    const SPIN_BTN_H = 70;

    function drawSpinButton() {
        // Button glow when not spinning
        if (!isSpinning) {
            ctx.shadowColor = '#44FF44';
            ctx.shadowBlur = 20;
        }

        // Button background
        const btnGrad = ctx.createLinearGradient(0, SPIN_BTN_Y, 0, SPIN_BTN_Y + SPIN_BTN_H);
        if (isSpinning) {
            btnGrad.addColorStop(0, '#333333');
            btnGrad.addColorStop(1, '#222222');
        } else {
            btnGrad.addColorStop(0, '#22AA22');
            btnGrad.addColorStop(1, '#117711');
        }
        ctx.fillStyle = btnGrad;
        roundRect(SPIN_BTN_X, SPIN_BTN_Y, SPIN_BTN_W, SPIN_BTN_H, 12, true);
        ctx.shadowBlur = 0;

        // Button border
        ctx.strokeStyle = isSpinning ? '#555555' : '#44FF44';
        ctx.lineWidth = 2;
        roundRect(SPIN_BTN_X, SPIN_BTN_Y, SPIN_BTN_W, SPIN_BTN_H, 12, false, true);

        // Button text
        ctx.fillStyle = isSpinning ? '#888888' : '#FFFFFF';
        ctx.font = 'bold 36px Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(isSpinning ? 'SPINNING...' : 'SPIN', SPIN_BTN_X + SPIN_BTN_W / 2, SPIN_BTN_Y + SPIN_BTN_H / 2);
    }

    // ===== CLICK HANDLING =====
    // Detect clicks on the spin button (works with the scaled canvas)
    canvas.addEventListener('click', function(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const clickX = (e.clientX - rect.left) * scaleX;
        const clickY = (e.clientY - rect.top) * scaleY;

        // Check if click is inside the spin button
        if (clickX >= SPIN_BTN_X && clickX <= SPIN_BTN_X + SPIN_BTN_W &&
            clickY >= SPIN_BTN_Y && clickY <= SPIN_BTN_Y + SPIN_BTN_H) {
            startSpin();
        }
    });

    // Also allow spacebar to spin (will map to JAMMA button later)
    document.addEventListener('keydown', function(e) {
        if (e.code === 'Space') {
            e.preventDefault();
            startSpin();
        }
    });

    // ===== REEL UPDATE LOGIC =====
    // Called every frame to move the reels during a spin
    function updateReels() {
        if (!isSpinning) return;

        let allStopped = true;

        for (let r = 0; r < NUM_REELS; r++) {
            const reel = reels[r];
            if (!reel.spinning) continue;

            allStopped = false;

            if (reel.stopping) {
                // ===== DECELERATION PHASE =====
                // Slow down gradually until we land on the target position
                reel.speed *= 0.92; // friction - slows down each frame

                // Move the reel by current speed
                reel.offset += reel.speed;

                // When offset passes a full symbol height, advance the position
                while (reel.offset >= SYMBOL_H) {
                    reel.offset -= SYMBOL_H;
                    reel.position = (reel.position + 1) % REEL_STRIP_LENGTH;
                }

                // When slow enough and close to target, snap to final position
                if (reel.speed < 1.5) {
                    // Snap to target
                    reel.position = reel.targetPosition;
                    reel.offset = 0;
                    reel.speed = 0;

                    // Start the bounce-back effect (overshoot then settle)
                    if (reel.bouncePhase === 0) {
                        reel.bouncePhase = 1;
                        reel.bounceBack = -12; // overshoot downward
                        // Landing effects - flash and sound
                        triggerLandingFlash(r);
                        playReelStopSound(r);
                    }
                }
            } else {
                // ===== FULL SPEED PHASE =====
                // Reel is at full speed, just keep scrolling
                reel.offset += reel.speed;

                // Advance position when we scroll past a full symbol
                while (reel.offset >= SYMBOL_H) {
                    reel.offset -= SYMBOL_H;
                    reel.position = (reel.position + 1) % REEL_STRIP_LENGTH;
                }
            }

            // ===== BOUNCE ANIMATION =====
            // After landing, do a small bounce for a satisfying stop feel
            if (reel.bouncePhase > 0) {
                // Spring back toward zero
                reel.bounceBack *= 0.7;
                if (Math.abs(reel.bounceBack) < 0.5) {
                    reel.bounceBack = 0;
                    reel.bouncePhase = 0;
                    reel.spinning = false; // this reel is done
                }
            }
        }

        // Check if all reels have fully stopped
        if (allStopped) {
            isSpinning = false;
            updateReelGrid();
            checkWins(); // look for winning paylines
        }
    }

    // ===== ANIMATION LOOP =====
    // This runs 60 times per second using requestAnimationFrame (rAF)
    // It redraws everything every frame for smooth animation
    function gameLoop() {
        // Update reel positions if spinning
        updateReels();
        // Update which win line is being highlighted
        updateWinDisplay();

        // Clear the entire canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw each layer from back to front
        drawMachineFrame();
        drawJackpotBar();
        drawReels();
        drawLandingFlashes(); // white flash when each reel stops
        drawWinLines();       // glowing lines over winning paylines
        drawPaylineMarkers();
        drawBottomPanel();
        drawSpinButton();

        // Request the next frame
        requestAnimationFrame(gameLoop);
    }

    // Start the animation loop
    gameLoop();

    </script>
</body>
