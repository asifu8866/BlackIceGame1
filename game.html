            case 'JACKPOT_SYM':
            case 'golden_marigold':
                // Glowing golden flower — JACKPOT symbol
                // Radiating glow lines
                ctx.strokeStyle = '#FFD700';
                ctx.lineWidth = 1;
                ctx.globalAlpha = 0.5;
                for (let i = 0; i < 12; i++) {
                    const angle = (i * Math.PI * 2) / 12;
                    ctx.beginPath();
                    ctx.moveTo(cx + Math.cos(angle) * 22, cy + Math.sin(angle) * 22);
                    ctx.lineTo(cx + Math.cos(angle) * 30, cy + Math.sin(angle) * 30);
                    ctx.stroke();
                }
                ctx.globalAlpha = 1.0;
                // Outer petals (bright gold)
                ctx.fillStyle = '#FFD700';
                for (let i = 0; i < 10; i++) {
                    const angle = (i * Math.PI * 2) / 10;
                    ctx.beginPath();
                    ctx.ellipse(
                        cx + Math.cos(angle) * 14,
                        cy + Math.sin(angle) * 14,
                        8, 5,
                        angle, 0, Math.PI * 2
                    );
                    ctx.fill();
                }
                // Inner petals
                ctx.fillStyle = '#FFAA00';
                for (let i = 0; i < 10; i++) {
                    const angle = (i * Math.PI * 2) / 10 + Math.PI / 10;
                    ctx.beginPath();
                    ctx.ellipse(
                        cx + Math.cos(angle) * 8,
                        cy + Math.sin(angle) * 8,
                        5, 3,
                        angle, 0, Math.PI * 2
                    );
                    ctx.fill();
                }
                // Bright center
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.arc(cx, cy, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(cx, cy, 3, 0, Math.PI * 2);
                ctx.fill();
                break;
        }

        ctx.restore();
    }

    // Draw all 5 reels with their 3 visible symbols each
    // When spinning, symbols scroll vertically with a pixel offset
    function drawReels() {
        // We need to clip the reel area so symbols don't draw outside the window
        const totalReelW = (REEL_W * NUM_REELS) + (REEL_GAP * (NUM_REELS - 1));
        const clipX = REEL_AREA_X - 4;
        const clipY = REEL_AREA_Y;
        const clipW = totalReelW + 8;
        const clipH = REEL_H;

        ctx.save();
        // Set up clipping region so symbols stay inside the reel window
        ctx.beginPath();
        ctx.rect(clipX, clipY, clipW, clipH);
        ctx.clip();

        for (let r = 0; r < NUM_REELS; r++) {
            const reelX = REEL_AREA_X + r * (REEL_W + REEL_GAP);
            const reel = reels[r];

            // Reel column background
            ctx.fillStyle = '#0a0a1a';
            roundRect(reelX, REEL_AREA_Y, REEL_W, REEL_H, 4, true);

            // Calculate the vertical start position for symbols
            // offset shifts symbols up; when offset reaches SYMBOL_H, we advance position
            const baseY = REEL_AREA_Y + (REEL_H - NUM_ROWS * SYMBOL_H) / 2;

            // Draw one extra symbol above and below for smooth scrolling
            for (let row = -1; row <= NUM_ROWS; row++) {
                const symY = baseY + row * SYMBOL_H - reel.offset + reel.bounceBack + getNudgeOffset(r);
                // Only draw if the symbol would be at least partially visible
                if (symY + SYMBOL_H > REEL_AREA_Y - SYMBOL_H && symY < REEL_AREA_Y + REEL_H + SYMBOL_H) {
                    const symbolIdx = getStripSymbol(r, reel.position + row);
                    // Apply Symbol Switch offset if this symbol is being swapped
                    const swOff = getSwitchOffset(r, row);
                    drawSymbol(symbolIdx, reelX + swOff.x, symY + swOff.y, REEL_W, SYMBOL_H);
                }
            }

            // Subtle reel divider lines
            if (r < NUM_REELS - 1) {
                ctx.strokeStyle = '#222244';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(reelX + REEL_W + REEL_GAP / 2, REEL_AREA_Y + 10);
                ctx.lineTo(reelX + REEL_W + REEL_GAP / 2, REEL_AREA_Y + REEL_H - 10);
                ctx.stroke();
            }
        }

        ctx.restore(); // remove clipping

        // Row divider lines (drawn outside clip so they're always crisp)
        for (let r = 0; r < NUM_REELS; r++) {
            const reelX = REEL_AREA_X + r * (REEL_W + REEL_GAP);
            for (let row = 1; row < NUM_ROWS; row++) {
                const lineY = REEL_AREA_Y + row * SYMBOL_H + (REEL_H - NUM_ROWS * SYMBOL_H) / 2;
                ctx.strokeStyle = '#333355';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(reelX + 10, lineY);
                ctx.lineTo(reelX + REEL_W - 10, lineY);
                ctx.stroke();
            }
        }
    }

    // Draw the payline indicator arrows on the left side
    function drawPaylineMarkers() {
        const markerX = REEL_AREA_X - 40;
        const rowLabels = ['TOP', 'MID', 'BOT', 'LOW'];
        const rowColors = ['#FF4444', '#FFD700', '#44FF44', '#4488FF'];

        for (let row = 0; row < NUM_ROWS; row++) {
            const symY = REEL_AREA_Y + row * SYMBOL_H + (REEL_H - NUM_ROWS * SYMBOL_H) / 2;
            const cy = symY + SYMBOL_H / 2;

            // Arrow triangle
            ctx.fillStyle = rowColors[row];
            ctx.beginPath();
            ctx.moveTo(markerX, cy - 12);
            ctx.lineTo(markerX + 18, cy);
            ctx.lineTo(markerX, cy + 12);
            ctx.closePath();
            ctx.fill();

            // Mirror arrow on right side
            const totalReelW = (REEL_W * NUM_REELS) + (REEL_GAP * (NUM_REELS - 1));
            const rightX = REEL_AREA_X + totalReelW + 22;
            ctx.beginPath();
            ctx.moveTo(rightX + 18, cy - 12);
            ctx.lineTo(rightX, cy);
            ctx.lineTo(rightX + 18, cy + 12);
            ctx.closePath();
            ctx.fill();
        }
    }

    // Draw the bottom panel with credits and bet info
    function drawBottomPanel() {
        const panelY = REEL_AREA_Y + REEL_H + 50;
        const panelH = 120;

        // Panel background
        const panelGrad = ctx.createLinearGradient(0, panelY, 0, panelY + panelH);
        panelGrad.addColorStop(0, '#1a0a30');
        panelGrad.addColorStop(1, '#0a0515');
        ctx.fillStyle = panelGrad;
        roundRect(MACHINE_X + 30, panelY, MACHINE_W - 60, panelH, 10, true);

        // Panel border
        ctx.strokeStyle = '#6622CC44';
        ctx.lineWidth = 2;
        roundRect(MACHINE_X + 30, panelY, MACHINE_W - 60, panelH, 10, false, true);

        // Credit display - shows real player balance
        ctx.fillStyle = '#AAAACC';
        ctx.font = '22px Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText('CREDITS', MACHINE_X + 250, panelY + 15);
        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 42px Arial, sans-serif';
        ctx.fillText(formatCredits(credits), MACHINE_X + 250, panelY + 48);

        // Bet display - shows current total bet
        ctx.fillStyle = '#AAAACC';
        ctx.font = '22px Arial, sans-serif';
        ctx.fillText('BET', MACHINE_X + MACHINE_W / 2, panelY + 15);
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 42px Arial, sans-serif';
        ctx.fillText(formatCredits(totalBet), MACHINE_X + MACHINE_W / 2, panelY + 48);

        // Win display - shows bonus total during Hold and Spin, or last spin win
        const displayWin = gameMode === 'HOLD_AND_SPIN' ? bonusTotalWin : lastWin;
        const winLabel = gameMode === 'HOLD_AND_SPIN' ? 'BONUS' : 'WIN';
        ctx.fillStyle = '#AAAACC';
        ctx.font = '22px Arial, sans-serif';
        ctx.fillText(winLabel, MACHINE_X + MACHINE_W - 250, panelY + 15);
        if (displayWin > 0) {
            ctx.shadowColor = gameMode === 'HOLD_AND_SPIN' ? '#FF6600' : '#44FF44';
            ctx.shadowBlur = 15;
        }
        ctx.fillStyle = displayWin > 0 ? (gameMode === 'HOLD_AND_SPIN' ? '#FF8800' : '#44FF44') : '#666688';
        ctx.font = 'bold 42px Arial, sans-serif';
        ctx.fillText(formatCredits(displayWin), MACHINE_X + MACHINE_W - 250, panelY + 48);
        ctx.shadowBlur = 0;
    }

    // Draw the jackpot displays at the top - shows LIVE progressive values
    function drawJackpotBar() {
        // Display order: MEGA (left) to MINI (right) - biggest first
        const jackpotOrder = ['MEGA', 'MAJOR', 'MINOR', 'MINI'];

        const barY = MACHINE_Y + 168;
        const barW = (MACHINE_W - 100) / 4;

        for (let i = 0; i < jackpotOrder.length; i++) {
            const name = jackpotOrder[i];
            const pool = jackpotPools[name];
            const jp = JACKPOT_VALUES.find(j => j.name === name);
            if (!pool || !jp) continue;
            const bx = MACHINE_X + 40 + i * barW;

            // Jackpot box background
            ctx.fillStyle = '#0a0a20';
            roundRect(bx + 4, barY, barW - 8, 28, 6, true);

            // Jackpot box border glow
            ctx.strokeStyle = jp.color + '88';
            ctx.lineWidth = 1;
            roundRect(bx + 4, barY, barW - 8, 28, 6, false, true);

            // Jackpot label and LIVE amount from the pool
            ctx.fillStyle = jp.color;
            ctx.font = 'bold 16px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(name + '  $' + formatCredits(Math.floor(pool.current)), bx + barW / 2, barY + 14);
        }
    }

    // ===== PAYTABLE (from math engine) =====
    // Paytable data now lives in BlackIceMath.pay.TABLE
    var PAYTABLE = BM.pay.TABLE;

    // ===== CREDIT SYSTEM =====
    // Track the player's balance, current bet, and last win
    // Default bet comes from the math engine
    let credits = 1000;                    // starting balance
    let betPerLine = 1;                    // credits wagered on each payline
    let totalBet = BM.pay.DEFAULT_BET();    // betPerLine x paylines (from math engine)
    let lastWin = 0;                       // total win from the most recent spin

    // Apply a new grid layout (e.g. '5x3' or '5x4') and reset bet/reels
    function applyGridLayout(layout) {
        BM.grid.set(layout);
        recalcVisualLayout();
        currentBetIndex = 0;
        var levels = BM.pay.BET_LEVELS();
        totalBet = levels[0];
        betPerLine = totalBet / BM.pay.NUM_LINES();
        loadReelStrips();
        updateReelGrid();
        activeWins = [];
        showingWins = false;
        winDisplayIndex = -1;
    }

    // Format a number with commas for display (1000 -> "1,000")
    function formatCredits(num) {
        return num.toLocaleString();
    }

    // ===== HOLD AND SPIN BONUS SYSTEM =====
    // The signature feature - modeled after Fire Link by Light & Wonder
    // When triggered, FIREBALL symbols lock on the grid with credit values.
    // Player gets 3 free respins to collect more fireballs.
    // Every new fireball resets the counter back to 3.
    // When 3 respins pass with no new fireball, bonus ends and all
    // fireball credit values are totaled and awarded to the player.

    // --- Bonus game state ---
    let gameMode = 'NORMAL';          // NORMAL = regular play, HOLD_AND_SPIN = bonus active
    let bonusGrid = [];               // 5x3 grid: null (empty cell) or { value, label, color, isJackpot }
    let bonusRespins = 3;             // remaining respins (resets to 3 when new fireball lands)
    let bonusTotalWin = 0;            // running sum of all fireball credit values
    let bonusPhase = 'IDLE';          // IDLE, TRIGGER, ACTIVE, SPINNING, AWARD
    let bonusAnimTimer = 0;           // frame counter for current animation phase
    let bonusNewLands = [];           // [{reel, row}] - positions that just got a fireball (for flash)
    let spinsSinceBonus = 0;          // counts normal spins since last bonus ended
    let nextBonusTrigger = 0;         // how many spins until next bonus (80-120)

    // Animation durations in frames (60 frames = 1 second)
    const BONUS_TRIGGER_DURATION = 120;  // 2 seconds for "HOLD & SPIN!" announcement
    const BONUS_RESPIN_DURATION = 48;    // 0.8 seconds for respin shimmer animation
    const BONUS_AWARD_DURATION = 180;    // 3 seconds for award count-up

    // --- Trigger timing (delegated to math engine) ---
    function rollNextBonusTrigger() {
        nextBonusTrigger = BM.bonus.rollNextTrigger();
    }
    rollNextBonusTrigger(); // set the first trigger target

    // --- Jackpot tiers (from math engine, used for display colors) ---
    var JACKPOT_VALUES = BM.jackpots.TIERS;

    // --- Live jackpot pools (managed by math engine) ---
    // The visual layer reads pools via BM.jackpots.getPools() for display.
    // We define a getter-based jackpotPools proxy so existing drawing code
    // (drawJackpotBar, progressive network sync) still works unchanged.
    var jackpotPools = new Proxy({}, {
        get: function(target, name) {
            var pools = BM.jackpots.getPools();
            if (name in pools) {
                // Return an object with .current so drawJackpotBar() can read pool.current
                return { current: pools[name] };
            }
            // Fall through for 'then', 'toJSON', Symbol keys, etc.
            return undefined;
        },
        ownKeys: function() {
            return Object.keys(BM.jackpots.getPools());
        },
        getOwnPropertyDescriptor: function(target, name) {
            var pools = BM.jackpots.getPools();
            if (name in pools) {
                return { configurable: true, enumerable: true, value: { current: pools[name] } };
            }
            return undefined;
        }
    });

    // Feed all jackpot pools from the current bet (delegated to math engine)
    function feedJackpots() {
        BM.jackpots.feed(totalBet);
        // If connected to progressive network, send feed to shared pool
        if (typeof sendProgressiveFeed === 'function') sendProgressiveFeed();
    }

    // Award a jackpot and reset it to the seed value (delegated to math engine)
    function awardJackpot(name) {
        var amount = BM.jackpots.award(name);
        // If connected to progressive network, notify other cabinets
        if (typeof sendProgressiveAward === 'function') sendProgressiveAward(name, amount);
        // Record in SAS meters
        if (typeof sasRecordJackpot === 'function') sasRecordJackpot(name, amount);
        return amount;
    }

    // Pick a random credit value for a fireball (delegated to math engine)
    function randomFireballValue() {
        return BM.bonus.randomFireballValue(totalBet);
    }

    // Check if the bonus should trigger after a normal spin finishes
    function checkBonusTrigger() {
        if (gameMode !== 'NORMAL') return;
        spinsSinceBonus++;

        if (spinsSinceBonus >= nextBonusTrigger) {
            triggerBonus();
        }
    }

    // Start the Hold and Spin bonus round
    function triggerBonus() {
        gameMode = 'HOLD_AND_SPIN';
        if (typeof sasRecordBonus === 'function') sasRecordBonus();
        bonusPhase = 'TRIGGER';
        bonusAnimTimer = 0;
        bonusRespins = BM.bonus.RESPINS;
        bonusTotalWin = 0;
        bonusNewLands = [];

        // Clear any win display from the triggering spin
        activeWins = [];
        showingWins = false;
        winDisplayIndex = -1;

        // Build a list of all 15 grid positions, shuffle via math engine
        const positions = [];
        for (let r = 0; r < NUM_REELS; r++) {
            for (let row = 0; row < NUM_ROWS; row++) {
                positions.push({ reel: r, row: row });
            }
        }
        const shuffled = BM.rng.shuffle(positions);

        // Pick initial fireball positions
        const fireballPositions = shuffled.slice(0, BM.bonus.INITIAL_FIREBALLS);

        // Use math engine to build the initial bonus grid with values
        bonusGrid = BM.bonus.initGrid(fireballPositions, totalBet);

        // Calculate total and record new lands for flash animation
        for (let i = 0; i < fireballPositions.length; i++) {
            const pos = fireballPositions[i];
            bonusTotalWin += bonusGrid[pos.reel][pos.row].value;
            bonusNewLands.push(pos);
        }

        playBonusTriggerSound();
    }

    // Start a bonus respin (called when player presses RESPIN button)
    function startBonusRespin() {
        if (bonusPhase !== 'ACTIVE') return;
        bonusPhase = 'SPINNING';
        bonusAnimTimer = 0;
        bonusNewLands = [];  // clear previous flash markers
        playSpinStartSound();
    }

    // Resolve the bonus respin - delegated to math engine
    function resolveBonusRespin() {
        var result = BM.bonus.resolveRespin(bonusGrid, totalBet);

        // Apply the updated grid from the math engine
        bonusGrid = result.grid;
        bonusNewLands = result.newLands;
        bonusTotalWin = result.totalValue;

        if (result.gotNewFireball) {
            bonusRespins = BM.bonus.RESPINS; // reset counter
            playBonusLandSound();
        } else {
            bonusRespins--;
        }

        if (result.isFull) {
            // Full grid = award the live MEGA jackpot on top of all collected values
            bonusTotalWin += awardJackpot('MEGA');
        }

        // End bonus if out of respins or grid is full
        if (bonusRespins <= 0 || result.isFull) {
            bonusPhase = 'AWARD';
            bonusAnimTimer = 0;
            playWinSound();
        } else {
            bonusPhase = 'ACTIVE';
            bonusAnimTimer = 0;
        }
    }

    // Update the bonus state machine each frame
    function updateBonus() {
        if (gameMode !== 'HOLD_AND_SPIN') return;

        bonusAnimTimer++;

        // Transition out of TRIGGER phase after the announcement animation
        if (bonusPhase === 'TRIGGER' && bonusAnimTimer >= BONUS_TRIGGER_DURATION) {
            bonusPhase = 'ACTIVE';
            bonusAnimTimer = 0;
            bonusNewLands = [];
        }

        // Transition out of SPINNING phase after respin animation
        if (bonusPhase === 'SPINNING' && bonusAnimTimer >= BONUS_RESPIN_DURATION) {
            resolveBonusRespin();
        }

        // Transition out of AWARD phase after count-up animation
        if (bonusPhase === 'AWARD' && bonusAnimTimer >= BONUS_AWARD_DURATION) {
            credits += bonusTotalWin;
            lastWin = bonusTotalWin;
            gameMode = 'NORMAL';
            bonusPhase = 'IDLE';
            spinsSinceBonus = 0;
            rollNextBonusTrigger();
        }
    }

    // --- Bonus Drawing Functions ---

    // Draw a single locked fireball cell with its credit value
    function drawBonusFireball(cell, x, y, w, h, reelIdx, rowIdx) {
        const isNew = bonusNewLands.some(p => p.reel === reelIdx && p.row === rowIdx);
        const pulse = 0.8 + 0.2 * Math.sin(performance.now() / 200 + reelIdx + rowIdx);

        ctx.save();

        // Fireball background - radial orange-to-red gradient
        const grad = ctx.createRadialGradient(
            x + w / 2, y + h / 2, 10,
            x + w / 2, y + h / 2, w * 0.6
        );
        grad.addColorStop(0, '#FF8800');
        grad.addColorStop(0.5, '#CC3300');
        grad.addColorStop(1, '#661100');
        ctx.fillStyle = grad;
        roundRect(x + SYMBOL_PAD, y + SYMBOL_PAD, w - SYMBOL_PAD * 2, h - SYMBOL_PAD * 2, 8, true);

        // Glowing orange border that pulses
        ctx.shadowColor = '#FF6600';
        ctx.shadowBlur = 15 * pulse;
        ctx.strokeStyle = '#FF8800';
        ctx.lineWidth = 2;
        roundRect(x + SYMBOL_PAD, y + SYMBOL_PAD, w - SYMBOL_PAD * 2, h - SYMBOL_PAD * 2, 8, false, true);
        ctx.shadowBlur = 0;

        // Draw the credit value or jackpot name
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        if (cell.isJackpot) {
            // Jackpot label with colored glow (e.g., "MINI" in green)
            ctx.shadowColor = cell.color;
            ctx.shadowBlur = 20;
            ctx.fillStyle = cell.color;
            ctx.font = 'bold 26px Arial, sans-serif';
            ctx.fillText(cell.label, x + w / 2, y + h / 2);
            ctx.shadowBlur = 0;
        } else {
            // Regular credit value in white
            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 30px Arial, sans-serif';
            ctx.fillText(cell.label, x + w / 2, y + h / 2);
        }

        // White flash on newly landed fireballs (fades over 30 frames)
        if (isNew && bonusAnimTimer < 30) {
            ctx.globalAlpha = 1 - bonusAnimTimer / 30;
            ctx.fillStyle = '#FFFFFF';
            roundRect(x + SYMBOL_PAD, y + SYMBOL_PAD, w - SYMBOL_PAD * 2, h - SYMBOL_PAD * 2, 8, true);
        }

        ctx.restore();
    }

    // Draw the entire Hold and Spin overlay on top of the reels
    function drawBonusOverlay() {
        if (gameMode !== 'HOLD_AND_SPIN') return;

        const baseY = REEL_AREA_Y + (REEL_H - NUM_ROWS * SYMBOL_H) / 2;
        const totalReelW = (REEL_W * NUM_REELS) + (REEL_GAP * (NUM_REELS - 1));

        // During TRIGGER phase: draw fireballs on top of the regular reels
        // During ACTIVE/SPINNING/AWARD: draw the full bonus grid overlay
        if (bonusPhase !== 'TRIGGER') {
            // Dark overlay covering the entire reel area
            ctx.save();
            ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
            ctx.fillRect(REEL_AREA_X - 24, REEL_AREA_Y - 24, totalReelW + 48, REEL_H + 48);
            ctx.restore();
        }

        // Draw each cell of the bonus grid
        for (let r = 0; r < NUM_REELS; r++) {
            for (let row = 0; row < NUM_ROWS; row++) {
                const cellX = REEL_AREA_X + r * (REEL_W + REEL_GAP);
                const cellY = baseY + row * SYMBOL_H;
                const cell = bonusGrid[r][row];

                if (cell) {
                    // Locked fireball with credit value
                    drawBonusFireball(cell, cellX, cellY, REEL_W, SYMBOL_H, r, row);
                } else if (bonusPhase !== 'TRIGGER') {
                    // Empty cell (only drawn during active bonus, not trigger)
                    if (bonusPhase === 'SPINNING') {
                        // Orange shimmer effect during respin animation
                        const shimmer = 0.12 + 0.08 * Math.sin(bonusAnimTimer * 0.3 + r * 1.5 + row);
                        ctx.fillStyle = `rgba(255, 102, 0, ${shimmer})`;
                    } else {
                        ctx.fillStyle = '#0a0a1a';
                    }
                    roundRect(cellX + SYMBOL_PAD, cellY + SYMBOL_PAD,
                             REEL_W - SYMBOL_PAD * 2, SYMBOL_H - SYMBOL_PAD * 2, 8, true);
                    ctx.strokeStyle = '#333355';
                    ctx.lineWidth = 1;
                    roundRect(cellX + SYMBOL_PAD, cellY + SYMBOL_PAD,
                             REEL_W - SYMBOL_PAD * 2, SYMBOL_H - SYMBOL_PAD * 2, 8, false, true);
                }
            }
        }

        // "HOLD & SPIN" title above the reels
        if (bonusPhase !== 'AWARD') {
            ctx.save();
            ctx.fillStyle = '#FF6600';
            ctx.font = 'bold 42px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.shadowColor = '#FF6600';
            ctx.shadowBlur = 20;
            ctx.fillText('HOLD & SPIN', MACHINE_X + MACHINE_W / 2, REEL_AREA_Y - 6);
            ctx.shadowBlur = 0;
            ctx.restore();
        }

        // Big flashing "HOLD & SPIN!" during trigger announcement
        if (bonusPhase === 'TRIGGER') {
            const pulse = 0.5 + 0.5 * Math.sin(bonusAnimTimer * 0.15);
            ctx.save();
            ctx.globalAlpha = pulse;
            ctx.fillStyle = '#FF6600';
            ctx.font = 'bold 72px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#FF6600';
            ctx.shadowBlur = 40;
            ctx.fillText('HOLD & SPIN!', MACHINE_X + MACHINE_W / 2, REEL_AREA_Y + REEL_H / 2);
            ctx.shadowBlur = 0;
            ctx.restore();
        }

        // Respin counter below the grid
        if (bonusPhase === 'ACTIVE' || bonusPhase === 'SPINNING') {
            const counterY = baseY + NUM_ROWS * SYMBOL_H + 15;
            ctx.save();
            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 26px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText('RESPINS: ' + bonusRespins, MACHINE_X + MACHINE_W / 2, counterY);
            ctx.restore();
        }

        // Running total during active bonus
        if (bonusPhase === 'ACTIVE' || bonusPhase === 'SPINNING') {
            const totalY = baseY + NUM_ROWS * SYMBOL_H + 50;
            ctx.save();
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 22px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText('BONUS TOTAL: ' + formatCredits(bonusTotalWin), MACHINE_X + MACHINE_W / 2, totalY);
            ctx.restore();
        }

        // Award phase - big golden total with count-up animation
        if (bonusPhase === 'AWARD') {
            const progress = Math.min(bonusAnimTimer / 90, 1); // count up over 1.5 seconds
            const displayValue = Math.floor(bonusTotalWin * progress);

            ctx.save();

            // Dark box behind the award text
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            roundRect(MACHINE_X + MACHINE_W / 2 - 220, REEL_AREA_Y + REEL_H / 2 - 70, 440, 140, 15, true);
            ctx.strokeStyle = '#FFD70088';
            ctx.lineWidth = 2;
            roundRect(MACHINE_X + MACHINE_W / 2 - 220, REEL_AREA_Y + REEL_H / 2 - 70, 440, 140, 15, false, true);

            // "BONUS WIN" label
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 32px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('BONUS WIN', MACHINE_X + MACHINE_W / 2, REEL_AREA_Y + REEL_H / 2 - 28);

            // Credit total with golden glow
            ctx.shadowColor = '#FFD700';
            ctx.shadowBlur = 25;
            ctx.font = 'bold 52px Arial, sans-serif';
            ctx.fillText(formatCredits(displayValue), MACHINE_X + MACHINE_W / 2, REEL_AREA_Y + REEL_H / 2 + 28);
            ctx.shadowBlur = 0;

            ctx.restore();
        }
    }

    // --- Bonus Sound Effects ---

    // Dramatic ascending fanfare when bonus triggers
    function playBonusTriggerSound() {
        if (!audioCtx) return;
        const notes = [262, 330, 392, 523, 660, 784]; // C4 through G5 - rising excitement
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.value = freq;
            const startTime = audioCtx.currentTime + i * 0.08;
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(0.25, startTime + 0.04);
            gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.3);
            osc.start(startTime);
            osc.stop(startTime + 0.3);
        });
    }

    // Bright "ding" when a new fireball locks during respin
    function playBonusLandSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.value = 880; // A5 - bright and clear
        const now = audioCtx.currentTime;
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        osc.start(now);
        osc.stop(now + 0.5);
    }

    // ===== NUDGE SKILL FEATURE =====
    // After reels stop, the player can shift ONE reel up or down by one position.
    // This is the skill element that qualifies the game as a COAM skill game
    // under Georgia gaming regulations. The player must actively choose which
    // reel to nudge and which direction - a genuine decision that affects outcome.
    //
    // Rules:
    // - One nudge allowed per spin (use it or lose it)
    // - Available for a few seconds after reels stop (before next spin)
    // - Nudge UP = symbols shift down (reveals symbol above top row)
    // - Nudge DOWN = symbols shift up (reveals symbol below bottom row)
    // - After nudge, wins are re-checked with the new grid
    // - Not available during Hold and Spin bonus

    let nudgeAvailable = false;      // true when player can nudge after a spin
    let nudgeUsed = false;           // true after player uses their nudge this spin
    let nudgeAnimating = false;      // true during nudge slide animation
    let nudgeReel = -1;              // which reel is being nudged (-1 = none)
    let nudgeDirection = 0;          // +1 = up (reveal above), -1 = down (reveal below)
    let nudgeProgress = 0;           // 0 to 1 animation progress

    const NUDGE_ANIM_SPEED = 0.08;  // how fast the nudge slides (per frame)

    // Arrow button dimensions for nudge UI
    const NUDGE_ARROW_W = 60;
    const NUDGE_ARROW_H = 30;

    // Enable nudge after a normal spin completes
    function enableNudge() {
        if (gameMode !== 'NORMAL') return;
        nudgeAvailable = true;
        nudgeUsed = false;
    }

    // Player chose to nudge a reel in a direction
    function performNudge(reelIndex, direction) {
        if (!nudgeAvailable || nudgeUsed || nudgeAnimating) return;
        if (gameMode !== 'NORMAL') return;
        if (isSpinning) return;

        nudgeUsed = true;
        if (typeof sasRecordNudge === 'function') sasRecordNudge();
        nudgeAnimating = true;
        nudgeReel = reelIndex;
        nudgeDirection = direction;
        nudgeProgress = 0;

        // Clear any current win display (we'll re-check after nudge)
        activeWins = [];
        showingWins = false;
        winDisplayIndex = -1;
        lastWin = 0;

        playNudgeSound();
    }

    // Update the nudge slide animation each frame
    function updateNudge() {
        if (!nudgeAnimating) return;

        nudgeProgress += NUDGE_ANIM_SPEED;

        if (nudgeProgress >= 1) {
            // Animation complete - apply the actual position change
            nudgeProgress = 0;
            nudgeAnimating = false;

            const reel = reels[nudgeReel];
            // Move the reel position on the strip
            // nudgeDirection +1 = up (subtract position to show earlier symbols)
            // nudgeDirection -1 = down (add position to show later symbols)
            reel.position = ((reel.position - nudgeDirection) % REEL_STRIP_LENGTH + REEL_STRIP_LENGTH) % REEL_STRIP_LENGTH;

            // Reset the visual offset
            reel.bounceBack = 0;

            // Rebuild the grid and check for wins with the new arrangement
            updateReelGrid();
            checkWins();

            // Disable nudge after use
            nudgeAvailable = false;
            nudgeReel = -1;
        }
    }

    // Draw the nudge arrow buttons above and below each reel
    function drawNudgeUI() {
        // Only show when nudge is available and not used yet
        if (!nudgeAvailable || nudgeUsed || gameMode !== 'NORMAL' || isSpinning) return;

        const baseY = REEL_AREA_Y + (REEL_H - NUM_ROWS * SYMBOL_H) / 2;
        const pulse = 0.6 + 0.4 * Math.sin(performance.now() / 300);

        for (let r = 0; r < NUM_REELS; r++) {
            const reelX = REEL_AREA_X + r * (REEL_W + REEL_GAP);
            const reelCX = reelX + REEL_W / 2;

            // UP arrow (above the reel)
            const upY = baseY - 38;
            ctx.save();
            ctx.globalAlpha = pulse;
            ctx.fillStyle = '#22CC88';
            ctx.beginPath();
            ctx.moveTo(reelCX - 20, upY + 24);
            ctx.lineTo(reelCX, upY + 4);
            ctx.lineTo(reelCX + 20, upY + 24);
            ctx.closePath();
            ctx.fill();
            ctx.restore();

            // DOWN arrow (below the reel)
            const downY = baseY + NUM_ROWS * SYMBOL_H + 8;
            ctx.save();
            ctx.globalAlpha = pulse;
            ctx.fillStyle = '#22CC88';
            ctx.beginPath();
            ctx.moveTo(reelCX - 20, downY + 4);
            ctx.lineTo(reelCX, downY + 24);
            ctx.lineTo(reelCX + 20, downY + 4);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        // "NUDGE" label
        ctx.save();
        ctx.fillStyle = '#22CC88';
        ctx.font = 'bold 20px Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.globalAlpha = pulse;
        ctx.fillText('TAP \u25B2 OR \u25BC TO NUDGE', MACHINE_X + MACHINE_W / 2, baseY - 42);
        ctx.restore();
    }

    // Apply visual offset to the nudging reel during animation
    function getNudgeOffset(reelIndex) {
        if (!nudgeAnimating || reelIndex !== nudgeReel) return 0;
        // Smooth ease-out animation
        const eased = 1 - Math.pow(1 - nudgeProgress, 2);
        return nudgeDirection * eased * SYMBOL_H;
    }

    // Nudge click sound - short mechanical click
    function playNudgeSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'square';
        osc.frequency.value = 200;
        const now = audioCtx.currentTime;
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        osc.start(now);
        osc.stop(now + 0.08);
    }

    // ===== SYMBOL SWITCH SKILL FEATURE =====
    // The second skill element for Georgia COAM compliance.
    // After using (or skipping) Nudge, the player can swap two adjacent
    // symbols on the grid to try to complete a winning combination.
    //
    // How it works:
    // - Player taps a symbol to select it (highlighted)
    // - Then taps an adjacent symbol (up/down/left/right) to swap them
    // - Swap animates smoothly, then wins are re-checked
    // - One swap per spin (separate from nudge - player gets both)
    // - Not available during Hold and Spin bonus

    let switchAvailable = false;     // true when player can use Symbol Switch
    let switchUsed = false;          // true after player uses their switch
    let switchAnimating = false;     // true during swap animation
    let switchSelected = null;       // {reel, row} of first selected symbol
    let switchTarget = null;         // {reel, row} of second selected symbol
    let switchProgress = 0;          // 0 to 1 animation progress

    const SWITCH_ANIM_SPEED = 0.06; // how fast the swap slides

    // Enable Symbol Switch after a normal spin completes
    function enableSwitch() {
        if (gameMode !== 'NORMAL') return;
        switchAvailable = true;
        switchUsed = false;
        switchSelected = null;
        switchTarget = null;
    }

    // Player tapped a symbol on the grid - handle selection/swap
    function handleSwitchTap(reel, row) {
        if (!switchAvailable || switchUsed || switchAnimating) return;
        if (gameMode !== 'NORMAL') return;
        if (isSpinning || nudgeAnimating) return;

        if (!switchSelected) {
            // First tap - select this symbol
            switchSelected = { reel: reel, row: row };
            playSwitchSelectSound();
        } else {
            // Second tap - check if adjacent to the first selection
            const dr = Math.abs(reel - switchSelected.reel);
            const drow = Math.abs(row - switchSelected.row);
            const isAdjacent = (dr + drow === 1); // exactly one step away

            if (isAdjacent) {
                // Valid swap target - start animation
                switchTarget = { reel: reel, row: row };
                switchAnimating = true;
                switchProgress = 0;
                switchUsed = true;
                if (typeof sasRecordSwitch === 'function') sasRecordSwitch();

                // Clear any current win display
                activeWins = [];
                showingWins = false;
                winDisplayIndex = -1;
                lastWin = 0;

                playSwitchSwapSound();
            } else if (reel === switchSelected.reel && row === switchSelected.row) {
                // Tapped same symbol again - deselect
                switchSelected = null;
            } else {
                // Not adjacent - re-select this one instead
                switchSelected = { reel: reel, row: row };
                playSwitchSelectSound();
            }
        }
    }

    // Update the swap animation each frame
    function updateSwitch() {
        if (!switchAnimating) return;

        switchProgress += SWITCH_ANIM_SPEED;

        if (switchProgress >= 1) {
            // Animation complete - actually swap the symbols in the grid
            switchProgress = 0;
            switchAnimating = false;

            const s = switchSelected;
            const t = switchTarget;
            const temp = reelGrid[s.reel][s.row];
            reelGrid[s.reel][s.row] = reelGrid[t.reel][t.row];
            reelGrid[t.reel][t.row] = temp;

            // Re-check wins with the new arrangement
            checkWins();

            // Clean up
            switchSelected = null;
            switchTarget = null;
            switchAvailable = false;
        }
    }

    // Get visual offset for a symbol during swap animation
    function getSwitchOffset(reel, row) {
        if (!switchAnimating) return { x: 0, y: 0 };
        const eased = 1 - Math.pow(1 - switchProgress, 2);

        // Check if this symbol is one of the two being swapped
        if (switchSelected && reel === switchSelected.reel && row === switchSelected.row) {
            const dx = (switchTarget.reel - switchSelected.reel) * (REEL_W + REEL_GAP) * eased;
            const dy = (switchTarget.row - switchSelected.row) * SYMBOL_H * eased;
            return { x: dx, y: dy };
        }
        if (switchTarget && reel === switchTarget.reel && row === switchTarget.row) {
            const dx = (switchSelected.reel - switchTarget.reel) * (REEL_W + REEL_GAP) * eased;
            const dy = (switchSelected.row - switchTarget.row) * SYMBOL_H * eased;
            return { x: dx, y: dy };
        }
        return { x: 0, y: 0 };
    }

    // Draw the Symbol Switch UI - highlight selected symbol, show prompt
    function drawSwitchUI() {
        if (!switchAvailable || switchUsed || gameMode !== 'NORMAL' || isSpinning) return;

        const baseY = REEL_AREA_Y + (REEL_H - NUM_ROWS * SYMBOL_H) / 2;
        const pulse = 0.5 + 0.5 * Math.sin(performance.now() / 400);

        // If nudge arrows are still showing, don't overlap the prompt
        if (nudgeAvailable && !nudgeUsed) return;

        // Show "TAP A SYMBOL TO SWITCH" prompt
        ctx.save();
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 20px Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.globalAlpha = pulse;
        ctx.fillText('TAP TWO ADJACENT SYMBOLS TO SWAP', MACHINE_X + MACHINE_W / 2, baseY - 42);
        ctx.restore();

        // Highlight the selected symbol with a gold border
        if (switchSelected) {
            const sx = REEL_AREA_X + switchSelected.reel * (REEL_W + REEL_GAP);
            const sy = baseY + switchSelected.row * SYMBOL_H;

            ctx.save();
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 4;
            ctx.shadowColor = '#FFD700';
            ctx.shadowBlur = 15;
            roundRect(sx + SYMBOL_PAD, sy + SYMBOL_PAD,
                      REEL_W - SYMBOL_PAD * 2, SYMBOL_H - SYMBOL_PAD * 2, 8, false, true);

            // Draw small arrows showing valid adjacent positions
            ctx.fillStyle = '#FFD700';
            ctx.globalAlpha = pulse;
            const cx = sx + REEL_W / 2;
            const cy = sy + SYMBOL_H / 2;
            const arrowSize = 10;

            // Up arrow (if not top row)
            if (switchSelected.row > 0) {
                ctx.beginPath();
                ctx.moveTo(cx - arrowSize, sy + SYMBOL_PAD - 4);
                ctx.lineTo(cx, sy + SYMBOL_PAD - 14);
                ctx.lineTo(cx + arrowSize, sy + SYMBOL_PAD - 4);
                ctx.fill();
            }
            // Down arrow (if not bottom row)
            if (switchSelected.row < NUM_ROWS - 1) {
                ctx.beginPath();
                ctx.moveTo(cx - arrowSize, sy + SYMBOL_H - SYMBOL_PAD + 4);
                ctx.lineTo(cx, sy + SYMBOL_H - SYMBOL_PAD + 14);
                ctx.lineTo(cx + arrowSize, sy + SYMBOL_H - SYMBOL_PAD + 4);
                ctx.fill();
            }
            // Left arrow (if not first reel)
            if (switchSelected.reel > 0) {
                ctx.beginPath();
                ctx.moveTo(sx + SYMBOL_PAD - 4, cy - arrowSize);
                ctx.lineTo(sx + SYMBOL_PAD - 14, cy);
                ctx.lineTo(sx + SYMBOL_PAD - 4, cy + arrowSize);
                ctx.fill();
            }
            // Right arrow (if not last reel)
            if (switchSelected.reel < NUM_REELS - 1) {
                ctx.beginPath();
                ctx.moveTo(sx + REEL_W - SYMBOL_PAD + 4, cy - arrowSize);
                ctx.lineTo(sx + REEL_W - SYMBOL_PAD + 14, cy);
                ctx.lineTo(sx + REEL_W - SYMBOL_PAD + 4, cy + arrowSize);
                ctx.fill();
            }

            ctx.restore();
        }
    }

    // Select sound - soft chime
    function playSwitchSelectSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.value = 660;
        const now = audioCtx.currentTime;
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.start(now);
        osc.stop(now + 0.15);
    }

    // Swap sound - two-tone whoosh
    function playSwitchSwapSound() {
        if (!audioCtx) return;
        [440, 660].forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.value = freq;
            const t = audioCtx.currentTime + i * 0.06;
            gain.gain.setValueAtTime(0.15, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
            osc.start(t);
            osc.stop(t + 0.12);
        });
    }

    // ===== SOUND EFFECTS =====
    // Generated with Web Audio API - no audio files needed, works 100% offline
    // AudioContext is created on first user interaction (browser requirement)
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    // Play a short thud/click sound when a reel lands
    function playReelStopSound(reelIndex) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        // Lower pitch for later reels - gives a satisfying cascade feel
        osc.frequency.value = 120 - reelIndex * 8;
        osc.type = 'sine';

        // Quick punch: loud then instantly silent
        const now = audioCtx.currentTime;
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);

        osc.start(now);
        osc.stop(now + 0.1);
    }

    // Play a short spin whoosh when reels start
    function playSpinStartSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.type = 'sawtooth';
        const now = audioCtx.currentTime;
        // Rising pitch whoosh
        osc.frequency.setValueAtTime(80, now);
        osc.frequency.exponentialRampToValueAtTime(300, now + 0.2);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);

        osc.start(now);
        osc.stop(now + 0.25);
    }

    // Play a celebratory rising tone when a win is detected
    function playWinSound() {
        if (!audioCtx) return;
        const notes = [523, 659, 784, 1047]; // C5, E5, G5, C6 - major chord arpeggio
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.type = 'sine';
            osc.frequency.value = freq;

            const startTime = audioCtx.currentTime + i * 0.1;
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(0.2, startTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.4);

            osc.start(startTime);
            osc.stop(startTime + 0.4);
        });
    }

    // ===== LANDING FLASH EFFECTS =====
    // White flash overlay on each reel when it lands
    const landingFlashes = [];

    // Trigger a flash on a specific reel
    function triggerLandingFlash(reelIndex) {
        landingFlashes.push({
            reel: reelIndex,
            alpha: 0.6,  // starting brightness (0-1)
            decay: 0.88  // how fast it fades each frame
        });
    }

    // Update and draw all active landing flashes
    function drawLandingFlashes() {
        const baseY = REEL_AREA_Y + (REEL_H - NUM_ROWS * SYMBOL_H) / 2;

        for (let i = landingFlashes.length - 1; i >= 0; i--) {
            const flash = landingFlashes[i];
            const reelX = REEL_AREA_X + flash.reel * (REEL_W + REEL_GAP);

            // White glow overlay on the reel column
            ctx.save();
            ctx.globalAlpha = flash.alpha;
            ctx.fillStyle = '#FFFFFF';
            roundRect(reelX + SYMBOL_PAD, baseY + SYMBOL_PAD,
                      REEL_W - SYMBOL_PAD * 2, NUM_ROWS * SYMBOL_H - SYMBOL_PAD * 2, 6, true);
            ctx.restore();

            // Fade out
            flash.alpha *= flash.decay;
            if (flash.alpha < 0.02) {
                landingFlashes.splice(i, 1);
            }
        }
    }

    // ===== PAYLINE DEFINITIONS (from math engine) =====
    // PAYLINES is aliased at the top of this file from BM.pay.LINES

    // Colors for each payline so they're easy to tell apart
    const PAYLINE_COLORS = [
        '#FF4444', '#FFD700', '#44FF44', '#4488FF', '#FF44FF',
        '#FF8800', '#00FFCC', '#FF6688', '#88AAFF', '#FFFF44',
        '#FF2222', '#22FF88', '#8844FF', '#FF6600', '#00CCFF',
        '#FFAA44', '#44FFAA', '#FF44AA', '#AAFF44', '#44AAFF',
        '#CC4444', '#CCAA00', '#44CC44', '#4466CC', '#CC44CC',
        '#CC6600', '#00CCAA', '#CC4466', '#6688CC', '#CCCC44',
        '#AA2222', '#22AA66', '#6644AA', '#AA4400', '#0088AA',
        '#AA8844', '#44AA88', '#AA4488', '#88AA44', '#4488AA',
        '#882222', '#228844', '#442288', '#882200', '#006688',
        '#886644', '#448866', '#884466', '#668844', '#446688'
    ];

    // ===== WIN DETECTION =====
    // After reels stop, check each payline for matching symbols
    // Returns an array of winning lines with their details
    let activeWins = [];       // list of winning paylines from last spin
    let winDisplayTimer = 0;   // timer for cycling through win displays
    let winDisplayIndex = -1;  // which win line is currently highlighted (-1 = show all)
    let showingWins = false;   // true while win celebration is active
    const WIN_CYCLE_TIME = 90; // frames to show each individual win line (about 1.5 seconds)

    function checkWins() {
        activeWins = [];
        if (isSpinning) return;

        // Delegate win detection to the math engine
        // Engine returns [{line, symbol, count, payout, positions}, ...]
        // Drawing code expects {paylineIndex, matchCount, paySymbol, payout}
        var engineWins = BM.spin.checkWins(reelGrid, betPerLine);
        lastWin = 0;
        for (var i = 0; i < engineWins.length; i++) {
            var ew = engineWins[i];
            activeWins.push({
                paylineIndex: ew.line,
                matchCount: ew.count,
                paySymbol: ew.symbol,
                payout: ew.payout,
                // Keep engine properties for game recall
                line: ew.line,
                symbol: ew.symbol,
                count: ew.count
            });
            lastWin += ew.payout;
        }

        // Award winnings to the player's balance
        if (lastWin > 0) {
            credits += lastWin;
            totalPaidLifetime += lastWin;
        }

        // Start the win display cycle if we have wins
        if (activeWins.length > 0) {
            showingWins = true;
            winDisplayTimer = 0;
            winDisplayIndex = -1; // start by showing all lines briefly
            playWinSound(); // celebratory rising tone
        }
    }

    // Update the win display cycle timer each frame
    function updateWinDisplay() {
        if (!showingWins || activeWins.length === 0) return;

        winDisplayTimer++;
        if (winDisplayTimer >= WIN_CYCLE_TIME) {
            winDisplayTimer = 0;
            winDisplayIndex++;
            // Loop back to showing all after cycling through each line
            if (winDisplayIndex >= activeWins.length) {
                winDisplayIndex = -1;
            }
        }
    }

    // ===== FREE SPINS BONUS =====
    // Triggered when 3+ SCATTER (Ofrenda Altar) symbols land anywhere on the reels.
    // During free spins, all wins containing a WILD get a 2x multiplier.
    // Uses BM.freeSpins.resolveSpin() for math, which applies the multiplier internally.

    let freeSpinsRemaining = 0;   // spins left in the current free spins round
    let freeSpinsTotal = 0;       // total spins awarded (for display "X of Y")
    let freeSpinsTotalWin = 0;    // cumulative winnings during free spins
    let freeSpinsActive = false;  // true while a free spins round is in progress
    let freeSpinsIntroTimer = 0;  // countdown for the intro "FREE SPINS!" banner
    let freeSpinsOutroTimer = 0;  // countdown for the outro total-win banner

    // Start a free spins round with the given number of spins
    function startFreeSpins(count) {
        freeSpinsRemaining = count;
        freeSpinsTotal = count;
        freeSpinsTotalWin = 0;
        freeSpinsActive = true;
        freeSpinsIntroTimer = 180; // 3 seconds intro banner
        freeSpinsOutroTimer = 0;
        // Play the bonus trigger sound to announce free spins
        playBonusTriggerSound();
    }

    // Check if the current spin result triggers free spins (called after reels stop)
    function checkFreeSpinsTrigger() {
        if (freeSpinsActive) return; // can't trigger during free spins (retrigger handled below)
        if (gameMode !== 'NORMAL') return; // not during Hold and Spin
        var scatterCount = BM.spin.countScatters(reelGrid);
        var spinsAwarded = BM.freeSpins.getCount(scatterCount);
        if (spinsAwarded > 0) {
            startFreeSpins(spinsAwarded);
        }
    }

    // Run a single free spin — called when the reels stop during free spins mode
    function resolveFreeSpinResult() {
        if (!freeSpinsActive || freeSpinsRemaining <= 0) return;

        // Use math engine's free spin resolver (applies 2x WILD multiplier)
        var result = BM.freeSpins.resolveSpin(betPerLine, totalBet);

        // Apply result wins to the display
        activeWins = [];
        lastWin = 0;
        for (var i = 0; i < result.wins.length; i++) {
            var ew = result.wins[i];
            activeWins.push({
                paylineIndex: ew.line,
                matchCount: ew.count,
                paySymbol: ew.symbol,
                payout: ew.payout,
                line: ew.line,
                symbol: ew.symbol,
                count: ew.count,
                multiplied: ew.multiplied || false
            });
            lastWin += ew.payout;
        }

        // Award winnings
        if (lastWin > 0) {
            credits += lastWin;
            freeSpinsTotalWin += lastWin;
            totalPaidLifetime += lastWin;
            showingWins = true;
            winDisplayTimer = 0;
            winDisplayIndex = -1;
            playWinSound();
        }

        // Decrement remaining spins
        freeSpinsRemaining--;

        // Check for retrigger (3+ scatters during free spins awards more spins)
        var retriggerCount = BM.spin.countScatters(reelGrid);
        var retriggerSpins = BM.freeSpins.getCount(retriggerCount);
        if (retriggerSpins > 0) {
            freeSpinsRemaining += retriggerSpins;
            freeSpinsTotal += retriggerSpins;
        }

        // When all free spins are done, show the total win
        if (freeSpinsRemaining <= 0) {
            freeSpinsOutroTimer = 240; // 4 seconds outro
        }
    }

    // Draw the Free Spins overlay — banner at top, 2x indicator, total win
    function drawFreeSpinsOverlay() {
        if (!freeSpinsActive) return;
        const theme = getTheme();

        // During intro banner (before spins start)
        if (freeSpinsIntroTimer > 0) {
            freeSpinsIntroTimer--;
            ctx.save();
            // Dark overlay
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // "FREE SPINS!" title
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const introScale = Math.min(1.0, (180 - freeSpinsIntroTimer) / 30);
            ctx.fillStyle = theme.accentColor;
            ctx.font = 'bold ' + Math.floor(96 * introScale) + 'px Arial, sans-serif';
            setShadow(theme.accentColor, 40);
            ctx.fillText('FREE SPINS!', 960, 400);
            clearShadow();

            // Number of spins
            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 64px Arial, sans-serif';
            ctx.fillText(freeSpinsTotal + ' SPINS AWARDED', 960, 520);

            // 2x WILD multiplier
            ctx.fillStyle = '#FF00FF';
            ctx.font = 'bold 40px Arial, sans-serif';
            setShadow('#FF00FF', 20);
            ctx.fillText('2x WILD MULTIPLIER', 960, 620);
            clearShadow();
            ctx.restore();
            return;
        }

        // During outro (showing total win)
        if (freeSpinsOutroTimer > 0) {
            freeSpinsOutroTimer--;
            ctx.save();
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = theme.accentColor;
            ctx.font = 'bold 72px Arial, sans-serif';
            setShadow(theme.accentColor, 30);
            ctx.fillText('FREE SPINS COMPLETE!', 960, 380);
            clearShadow();

            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 96px Arial, sans-serif';
            setShadow('#FFD700', 40);
            ctx.fillText('TOTAL WIN: ' + freeSpinsTotalWin, 960, 520);
            clearShadow();

            ctx.restore();

            // End free spins when outro finishes
            if (freeSpinsOutroTimer <= 0) {
                freeSpinsActive = false;
            }
            return;
        }

        // During active free spins: top banner showing remaining count
        ctx.save();

        // Banner background
        const bannerY = MACHINE_Y + 165;
        const bannerH = 36;
        ctx.fillStyle = 'rgba(26, 10, 46, 0.85)';
        ctx.fillRect(MACHINE_X + 30, bannerY, MACHINE_W - 60, bannerH);
        ctx.strokeStyle = theme.accentColor;
        ctx.lineWidth = 2;
        ctx.strokeRect(MACHINE_X + 30, bannerY, MACHINE_W - 60, bannerH);

        // "FREE SPINS" text with count
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = theme.accentColor;
        ctx.font = 'bold 20px Arial, sans-serif';
        const spinsText = 'FREE SPINS: ' + (freeSpinsTotal - freeSpinsRemaining + 1) + ' of ' + freeSpinsTotal;
        ctx.fillText(spinsText, 960 - 200, bannerY + bannerH / 2);

        // "2x WILD MULTIPLIER" indicator
        ctx.fillStyle = '#FF00FF';
        ctx.font = 'bold 18px Arial, sans-serif';
        ctx.fillText('2x WILD MULTIPLIER', 960 + 100, bannerY + bannerH / 2);

        // Total win so far (right side)
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 18px Arial, sans-serif';
        ctx.fillText('WIN: ' + freeSpinsTotalWin, 960 + 400, bannerY + bannerH / 2);

        ctx.restore();
    }

    // ===== WIN LINE DRAWING =====
    // Draw glowing lines across the reels for winning paylines
    function drawWinLines() {
        if (!showingWins || activeWins.length === 0) return;

        const baseY = REEL_AREA_Y + (REEL_H - NUM_ROWS * SYMBOL_H) / 2;

        // Pulsing glow effect - oscillates brightness over time
        const pulse = 0.6 + 0.4 * Math.sin(performance.now() / 150);

        // Decide which wins to draw this frame
        const winsToDraw = winDisplayIndex === -1 ? activeWins : [activeWins[winDisplayIndex]];

        for (const win of winsToDraw) {
            const line = PAYLINES[win.paylineIndex];
            const color = PAYLINE_COLORS[win.paylineIndex];

            // Draw the connecting line through each reel position
            ctx.save();
            ctx.globalAlpha = pulse;
            ctx.strokeStyle = color;
            ctx.lineWidth = 6;
            ctx.shadowColor = color;
            ctx.shadowBlur = 20;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            ctx.beginPath();
            for (let r = 0; r < NUM_REELS; r++) {
                const reelX = REEL_AREA_X + r * (REEL_W + REEL_GAP) + REEL_W / 2;
                const symY = baseY + line[r] * SYMBOL_H + SYMBOL_H / 2;

                if (r === 0) ctx.moveTo(reelX, symY);
                else ctx.lineTo(reelX, symY);
            }
            ctx.stroke();

            // Draw highlight boxes around winning symbols
            for (let r = 0; r < win.matchCount; r++) {
                const reelX = REEL_AREA_X + r * (REEL_W + REEL_GAP);
                const symY = baseY + line[r] * SYMBOL_H;

                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.shadowBlur = 15;
                roundRect(reelX + SYMBOL_PAD + 2, symY + SYMBOL_PAD + 2,
                          REEL_W - SYMBOL_PAD * 2 - 4, SYMBOL_H - SYMBOL_PAD * 2 - 4, 6, false, true);
            }

            ctx.restore();
        }

        // Draw win line label on the left margin
        if (winDisplayIndex >= 0 && winDisplayIndex < activeWins.length) {
            const win = activeWins[winDisplayIndex];
            const line = PAYLINES[win.paylineIndex];
            const color = PAYLINE_COLORS[win.paylineIndex];
            const symY = baseY + line[0] * SYMBOL_H + SYMBOL_H / 2;

            ctx.fillStyle = color;
            ctx.font = 'bold 20px Arial, sans-serif';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';
            ctx.fillText('LINE ' + (win.paylineIndex + 1), REEL_AREA_X - 50, symY);
        }
    }

    // ===== UTILITY FUNCTIONS =====

    // Draw a rounded rectangle (used everywhere for that polished look)
    function roundRect(x, y, w, h, r, fill, stroke) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r);
        ctx.closePath();
        if (fill) ctx.fill();
        if (stroke) ctx.stroke();
    }

    // Make a color lighter by a given amount (for gradient effects)
    function lightenColor(hex, amount) {
        const num = parseInt(hex.replace('#', ''), 16);
        const r = Math.min(255, (num >> 16) + amount);
        const g = Math.min(255, ((num >> 8) & 0x00FF) + amount);
        const b = Math.min(255, (num & 0x0000FF) + amount);
        return '#' + (r << 16 | g << 8 | b).toString(16).padStart(6, '0');
    }

    // ===== SPIN BUTTON =====
    // Big glowing button below the bottom panel
    const SPIN_BTN_X = MACHINE_X + MACHINE_W / 2 - 120;
    const SPIN_BTN_Y = REEL_AREA_Y + REEL_H + 190;
    const SPIN_BTN_W = 240;
    const SPIN_BTN_H = 70;

    function drawSpinButton() {
        // Figure out if the button is pressable and what it should say
        const isInBonus = gameMode === 'HOLD_AND_SPIN';
        const canPress = (!isSpinning && !isInBonus) ||
                         (isInBonus && bonusPhase === 'ACTIVE');
        let btnLabel = 'SPIN';
        if (isInBonus) {
            btnLabel = bonusPhase === 'ACTIVE' ? 'RESPIN' :
                       bonusPhase === 'SPINNING' ? 'SPINNING...' : 'HOLD & SPIN';
        } else if (isSpinning) {
            btnLabel = 'SPINNING...';
        }

        // Button glow when pressable
        if (canPress) {
            ctx.shadowColor = isInBonus ? '#FF6600' : '#44FF44';
            ctx.shadowBlur = 20;
        }

        // Button background - orange during bonus, green during normal play
        const btnGrad = ctx.createLinearGradient(0, SPIN_BTN_Y, 0, SPIN_BTN_Y + SPIN_BTN_H);
        if (canPress) {
            if (isInBonus) {
                btnGrad.addColorStop(0, '#CC5500');
                btnGrad.addColorStop(1, '#883300');
            } else {
                btnGrad.addColorStop(0, '#22AA22');
                btnGrad.addColorStop(1, '#117711');
            }
        } else {
            btnGrad.addColorStop(0, '#333333');
            btnGrad.addColorStop(1, '#222222');
        }
        ctx.fillStyle = btnGrad;
        roundRect(SPIN_BTN_X, SPIN_BTN_Y, SPIN_BTN_W, SPIN_BTN_H, 12, true);
        ctx.shadowBlur = 0;

        // Button border
        ctx.strokeStyle = canPress ? (isInBonus ? '#FF6600' : '#44FF44') : '#555555';
        ctx.lineWidth = 2;
        roundRect(SPIN_BTN_X, SPIN_BTN_Y, SPIN_BTN_W, SPIN_BTN_H, 12, false, true);

        // Button text
        ctx.fillStyle = canPress ? '#FFFFFF' : '#888888';
        ctx.font = 'bold 36px Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(btnLabel, SPIN_BTN_X + SPIN_BTN_W / 2, SPIN_BTN_Y + SPIN_BTN_H / 2);
    }

    // ===== CLICK HANDLING =====
    // Detect clicks on the spin button (works with the scaled canvas)
    canvas.addEventListener('click', function(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const clickX = (e.clientX - rect.left) * scaleX;
        const clickY = (e.clientY - rect.top) * scaleY;

        // If on theme menu, handle card clicks
        if (gameScreen === 'menu') {
            const cardW = 420;
            const gap = 50;
            const totalW = THEME_KEYS.length * cardW + (THEME_KEYS.length - 1) * gap;
            const startX = (canvas.width - totalW) / 2;
            for (let i = 0; i < THEME_KEYS.length; i++) {
                const cx = startX + i * (cardW + gap);
                if (clickX >= cx && clickX <= cx + cardW && clickY >= 240 && clickY <= 790) {
                    menuThemeIndex = i;
                    setTheme(THEME_KEYS[i]);
                    return;
                }
            }
            return;
        }

        // Check if click is inside the spin button
        if (clickX >= SPIN_BTN_X && clickX <= SPIN_BTN_X + SPIN_BTN_W &&
            clickY >= SPIN_BTN_Y && clickY <= SPIN_BTN_Y + SPIN_BTN_H) {
            startSpin();
            return;
        }

        // Check if click is on a nudge arrow (only when nudge is available)
        if (nudgeAvailable && !nudgeUsed && !nudgeAnimating && gameMode === 'NORMAL' && !isSpinning) {
            const baseY = REEL_AREA_Y + (REEL_H - NUM_ROWS * SYMBOL_H) / 2;
            for (let r = 0; r < NUM_REELS; r++) {
                const reelX = REEL_AREA_X + r * (REEL_W + REEL_GAP);
                const reelCX = reelX + REEL_W / 2;

                // UP arrow hit zone
                const upY = baseY - 38;
                if (clickX >= reelCX - 30 && clickX <= reelCX + 30 &&
                    clickY >= upY && clickY <= upY + 30) {
                    performNudge(r, 1); // nudge up
                    return;
                }

                // DOWN arrow hit zone
                const downY = baseY + NUM_ROWS * SYMBOL_H + 8;
                if (clickX >= reelCX - 30 && clickX <= reelCX + 30 &&
                    clickY >= downY && clickY <= downY + 30) {
                    performNudge(r, -1); // nudge down
                    return;
                }
            }
        }

        // Check if click is on a symbol for Symbol Switch
        if (switchAvailable && !switchUsed && !switchAnimating && gameMode === 'NORMAL' && !isSpinning) {
            const baseY = REEL_AREA_Y + (REEL_H - NUM_ROWS * SYMBOL_H) / 2;
            for (let r = 0; r < NUM_REELS; r++) {
                const reelX = REEL_AREA_X + r * (REEL_W + REEL_GAP);
                for (let row = 0; row < NUM_ROWS; row++) {
                    const symY = baseY + row * SYMBOL_H;
                    if (clickX >= reelX + SYMBOL_PAD && clickX <= reelX + REEL_W - SYMBOL_PAD &&
                        clickY >= symY + SYMBOL_PAD && clickY <= symY + SYMBOL_H - SYMBOL_PAD) {
                        handleSwitchTap(r, row);
                        return;
                    }
                }
            }
        }
    });

    // ===== JAMMA 36-PIN BUTTON MAPPING =====
    // JAMMA arcade cabinets use a 36-pin edge connector. Physical buttons
    // are wired through a USB encoder (I-PAC or J-PAC) which converts
    // button presses into keyboard events. This maps those keys to game actions.
    //
    // Standard JAMMA button layout mapped to I-PAC defaults:
    // Player 1 Button 1 (SPIN)      = Key "1" or Left Ctrl
    // Player 1 Button 2 (BET UP)    = Key "2" or Left Alt
    // Player 1 Button 3 (BET DOWN)  = Key "3" or Space
    // Player 1 Button 4 (CASHOUT)   = Key "4" or Left Shift
    // Player 1 Button 5 (MENU)      = Key "5" or Z
    // Player 1 Joystick UP          = Arrow Up
    // Player 1 Joystick DOWN        = Arrow Down
    // Player 1 Joystick LEFT        = Arrow Left
    // Player 1 Joystick RIGHT       = Arrow Right
    // Coin switch                   = Key "5" (directly mapped by JAMMA standard)
    // Service button                = Key "9" (opens operator menu)

    const JAMMA_MAP = {
        // Primary mappings (I-PAC defaults)
        'Digit1':      'SPIN',
        'ControlLeft':  'SPIN',
        'Space':        'SPIN',          // also spin for keyboard testing
        'Digit2':      'BET_UP',
        'AltLeft':      'BET_UP',
        'Digit3':      'BET_DOWN',
        'Digit4':      'CASHOUT',
        'ShiftLeft':    'CASHOUT',
        'Digit5':      'COIN',          // coin switch
        'KeyZ':         'MENU',
        'Digit9':      'SERVICE',        // operator service button
        // Joystick directions (for nudge and menu navigation)
        'ArrowUp':      'UP',
        'ArrowDown':    'DOWN',
        'ArrowLeft':    'LEFT',
        'ArrowRight':   'RIGHT',
        // Keyboard shortcuts for desktop testing
        'Enter':        'SPIN',
        'Equal':        'BET_UP',        // + key
        'Minus':        'BET_DOWN'       // - key
    };

    let currentBetIndex = 0;

    function betUp() {
        if (isSpinning) return;
        var levels = BM.pay.BET_LEVELS();
        currentBetIndex = Math.min(currentBetIndex + 1, levels.length - 1);
        totalBet = levels[currentBetIndex];
        betPerLine = totalBet / BM.pay.NUM_LINES();
    }

    function betDown() {
        if (isSpinning) return;
        var levels = BM.pay.BET_LEVELS();
        currentBetIndex = Math.max(currentBetIndex - 1, 0);
        totalBet = levels[currentBetIndex];
        betPerLine = totalBet / BM.pay.NUM_LINES();
    }

    // Cashout - prints a TITO ticket
    function cashout() {
        if (isSpinning) return;
        if (credits <= 0) return;
        cashoutActive = true;
        cashoutAmount = credits;
        if (typeof sasRecordCashout === 'function') sasRecordCashout(credits);
        // Send print command to TITO hardware (if bridge connected)
        printTITOTicket(credits);
        credits = 0;
        cashoutTimer = 180; // show for 3 seconds at 60fps
        playCashoutSound();
    }

    let cashoutActive = false;
    let cashoutAmount = 0;
    let cashoutTimer = 0;

    // Cashout sound - descending chime (coins paying out)
    function playCashoutSound() {
        if (!audioCtx) return;
        [880, 660, 440, 330].forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.value = freq;
            const t = audioCtx.currentTime + i * 0.12;
            gain.gain.setValueAtTime(0.2, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
            osc.start(t);
            osc.stop(t + 0.3);
        });
    }

    // Handle all JAMMA button inputs
    document.addEventListener('keydown', function(e) {
        const action = JAMMA_MAP[e.code];
        if (!action) return;
        e.preventDefault();

        // If on theme selection menu, route inputs there
        if (gameScreen === 'menu') {
            handleThemeMenuInput(action);
            return;
        }

        // If operator menu is open, route inputs there instead
        if (operatorMenuOpen && action !== 'SERVICE') {
            handleMenuInput(action);
            return;
        }

        switch (action) {
            case 'SPIN':    startSpin(); break;
            case 'BET_UP':  betUp(); break;
            case 'BET_DOWN': betDown(); break;
            case 'CASHOUT': cashout(); break;
            case 'COIN':    credits += 100; break; // coin insert adds 100 credits
            case 'SERVICE': toggleOperatorMenu(); break;
            // Joystick for nudge: UP/DOWN on the currently hovered reel
            case 'UP':
                if (nudgeAvailable && !nudgeUsed) performNudge(nudgeKeyReel, 1);
                break;
            case 'DOWN':
                if (nudgeAvailable && !nudgeUsed) performNudge(nudgeKeyReel, -1);
                break;
            case 'LEFT':
                nudgeKeyReel = Math.max(0, nudgeKeyReel - 1);
                break;
            case 'RIGHT':
                nudgeKeyReel = Math.min(NUM_REELS - 1, nudgeKeyReel + 1);
                break;
        }
    });

    // Track which reel the joystick is pointing at for nudge
    let nudgeKeyReel = 2; // start at middle reel

    // ===== OPERATOR SETTINGS MENU =====
    // Accessed by pressing Service button (key 9) - only works when not spinning.
    // Operators use this to set RTP, adjust volume, view diagnostics,
    // and run test spins. Protected behind a simple button combo in production.
    let operatorMenuOpen = false;
    let menuSelection = 0;
    const MENU_ITEMS = [
        { label: 'RTP SETTING', type: 'rtp' },
        { label: 'GRID LAYOUT', type: 'grid' },
        { label: 'VOLUME', type: 'volume' },
        { label: 'TOTAL SPINS', type: 'info' },
        { label: 'TOTAL WAGERED', type: 'info' },
        { label: 'TOTAL PAID', type: 'info' },
        { label: 'RUN 1000 TEST SPINS', type: 'action' },
        { label: 'RESET CREDITS TO 1000', type: 'action' },
        { label: 'EXIT MENU', type: 'action' }
    ];

    // Lifetime stats tracked for operator dashboard
    let totalSpinsPlayed = 0;
    let totalWageredLifetime = 0;
    let totalPaidLifetime = 0;
    let masterVolume = 1.0;

    function toggleOperatorMenu() {
        if (isSpinning) return;
        operatorMenuOpen = !operatorMenuOpen;
        menuSelection = 0;
        if (operatorMenuOpen && typeof sasRecordDoorOpen === 'function') sasRecordDoorOpen();
    }

    // Handle up/down/select in the operator menu
    function handleMenuInput(action) {
        if (!operatorMenuOpen) return;

        if (action === 'UP') {
            menuSelection = (menuSelection - 1 + MENU_ITEMS.length) % MENU_ITEMS.length;
        } else if (action === 'DOWN') {
            menuSelection = (menuSelection + 1) % MENU_ITEMS.length;
        } else if (action === 'LEFT' || action === 'RIGHT') {
            const item = MENU_ITEMS[menuSelection];
            if (item.type === 'rtp') {
                const rtpOptions = [86, 88, 92, 96];
                const idx = rtpOptions.indexOf(currentRTP);
                if (action === 'RIGHT') currentRTP = rtpOptions[Math.min(idx + 1, rtpOptions.length - 1)];
                else currentRTP = rtpOptions[Math.max(idx - 1, 0)];
                // loadReelStrips() called automatically by currentRTP setter
            } else if (item.type === 'grid') {
                var gridOptions = ['5x3', '5x4'];
                var gIdx = gridOptions.indexOf(BM.grid.get());
                var newGrid;
                if (action === 'RIGHT') {
                    newGrid = gridOptions[Math.min(gIdx + 1, gridOptions.length - 1)];
                    applyGridLayout(newGrid);
                } else if (action === 'LEFT') {
                    newGrid = gridOptions[Math.max(gIdx - 1, 0)];
                    applyGridLayout(newGrid);
                }
            } else if (item.type === 'volume') {
                if (action === 'RIGHT') masterVolume = Math.min(1.0, masterVolume + 0.1);
                else masterVolume = Math.max(0.0, masterVolume - 0.1);
            }
        } else if (action === 'SPIN' || action === 'SELECT') {
            const item = MENU_ITEMS[menuSelection];
            if (item.label === 'EXIT MENU') toggleOperatorMenu();
            else if (item.label === 'RESET CREDITS TO 1000') credits = 1000;
            else if (item.label === 'RUN 1000 TEST SPINS') {
                // Quick inline test - not the full simulation
                let testWins = 0;
                for (let i = 0; i < 1000; i++) {
                    // simplified test spin logic
                }
            }
        }
    }

    // Draw the operator settings menu overlay
    function drawOperatorMenu() {
        if (!operatorMenuOpen) return;

        // Dark overlay
        ctx.save();
        ctx.fillStyle = 'rgba(0, 0, 10, 0.92)';
        ctx.fillRect(MACHINE_X + 50, MACHINE_Y + 30, MACHINE_W - 100, MACHINE_H - 60);

        // Border
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 3;
        ctx.strokeRect(MACHINE_X + 50, MACHINE_Y + 30, MACHINE_W - 100, MACHINE_H - 60);

        // Title
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 36px Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText('OPERATOR SETTINGS', MACHINE_X + MACHINE_W / 2, MACHINE_Y + 60);

        // Subtitle
        ctx.fillStyle = '#888899';
        ctx.font = '18px Arial, sans-serif';
        ctx.fillText('Use UP/DOWN to navigate, LEFT/RIGHT to change values', MACHINE_X + MACHINE_W / 2, MACHINE_Y + 105);

        // Menu items
        const startY = MACHINE_Y + 160;
        const itemH = 55;

        for (let i = 0; i < MENU_ITEMS.length; i++) {
            const item = MENU_ITEMS[i];
            const y = startY + i * itemH;
            const isSelected = (i === menuSelection);

            // Highlight selected row
            if (isSelected) {
                ctx.fillStyle = '#1a1a40';
                ctx.fillRect(MACHINE_X + 80, y - 5, MACHINE_W - 160, itemH - 5);
                ctx.strokeStyle = '#FFD700';
                ctx.lineWidth = 1;
                ctx.strokeRect(MACHINE_X + 80, y - 5, MACHINE_W - 160, itemH - 5);
            }

            // Label
            ctx.fillStyle = isSelected ? '#FFD700' : '#AAAACC';
            ctx.font = isSelected ? 'bold 26px Arial, sans-serif' : '24px Arial, sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(item.label, MACHINE_X + 120, y + 15);

            // Value display
            ctx.textAlign = 'right';
            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 26px Arial, sans-serif';

            if (item.type === 'rtp') {
                const valStr = isSelected ? '\u25C0 ' + currentRTP + '% \u25B6' : currentRTP + '%';
                ctx.fillText(valStr, MACHINE_X + MACHINE_W - 120, y + 15);
            } else if (item.type === 'grid') {
                var config = BM.grid.config();
                var valStr = isSelected ? '\u25C0 ' + config.description + ' \u25B6' : config.description;
                ctx.fillText(valStr, MACHINE_X + MACHINE_W - 120, y + 15);
            } else if (item.type === 'volume') {
                const volPct = Math.round(masterVolume * 100);
                const valStr = isSelected ? '\u25C0 ' + volPct + '% \u25B6' : volPct + '%';
                ctx.fillText(valStr, MACHINE_X + MACHINE_W - 120, y + 15);
            } else if (item.label === 'TOTAL SPINS') {
                ctx.fillText(formatCredits(totalSpinsPlayed), MACHINE_X + MACHINE_W - 120, y + 15);
            } else if (item.label === 'TOTAL WAGERED') {
                ctx.fillText(formatCredits(totalWageredLifetime), MACHINE_X + MACHINE_W - 120, y + 15);
            } else if (item.label === 'TOTAL PAID') {
                ctx.fillText(formatCredits(totalPaidLifetime), MACHINE_X + MACHINE_W - 120, y + 15);
            }
        }

        // Footer
        ctx.fillStyle = '#666677';
